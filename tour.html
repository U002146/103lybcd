          { query: '八仙洞', stay: 40, zh: '八仙洞', en: 'Baxian Cave', ja: '八仙洞', ko: '팔선동' },
          { query: '三仙台', stay: 50, zh: '三仙台', en: 'Sanxiantai', ja: '三仙台', ko: '싼셴타이' },
          { query: '加路蘭', stay: 40, zh: '加路蘭', en: 'Jialulan', ja: '加路蘭', ko: '지아루란' },
          { query: '太麻里', stay: 30, zh: '太麻里', en: 'Taimali', ja: '太麻里', ko: '타이마리' },
          { query: '墾丁大街', stay: 60, zh: '墾丁大街', en: 'Kenting Street', ja: '墾丁通り', ko: '컨딩 야시장' }
        ]
      },
      'valley': { 
        name: { zh: '花東縱谷慢活', en: 'Rift Valley', ja: '花東縦谷', ko: '화동종구' }, 
        extendText: { zh: '解鎖：延伸至國境之南(墾丁)', en: 'Unlock: Extend to Kenting', ja: '解放：墾丁へ延長', ko: '잠금 해제: 컨딩 연장' },
        extendRouteName: { zh: '縱谷-墾丁線', en: 'Valley-Kenting Route', ja: '縦谷-墾丁線', ko: '종구-컨딩 코스' },
        base: [
          { query: '鯉魚潭', stay: 60, zh: '鯉魚潭', en: 'Liyu Lake', ja: '鯉魚潭', ko: '리위탄' }, 
          { query: '雲山水', stay: 60, zh: '雲山水', en: 'Yunshan Shui', ja: '雲山水', ko: '운산수' }, 
          { query: '山姆先生', stay: 40, zh: '山姆先生', en: 'Mr. Sam Cafe', ja: 'Mr. Sam', ko: '미스터 샘' }, 
          { query: '光復糖廠', stay: 40, zh: '光復糖廠', en: 'Guangfu Sugar Factory', ja: '光復糖廠', ko: '광푸 설탕공장' }, 
          { query: '大農大富', stay: 60, zh: '大農大富', en: 'Danongdafu', ja: '大農大富', ko: '대농대부' }
        ],
        extend: [
          { query: '瑞穗牧場', stay: 60, zh: '瑞穗牧場', en: 'Ruisui Pasture', ja: '瑞穂牧場', ko: '루이수이 목장' },
          { query: '富里農會', stay: 40, zh: '富里稻草藝術', en: 'Fuli Rice Art', ja: '富里農協', ko: '푸리 농협' },
          { query: '伯朗大道', stay: 60, zh: '池上伯朗大道', en: 'Mr. Brown Avenue', ja: '伯朗大道', ko: '보랑대도' },
          { query: '鹿野高台', stay: 60, zh: '鹿野高台', en: 'Luye Highland', ja: '鹿野高台', ko: '루예고대' },
          { query: '多良車站', stay: 30, zh: '多良車站', en: 'Duoliang Station', ja: '多良駅', ko: '두량역' },
          { query: '墾丁大街', stay: 60, zh: '墾丁大街', en: 'Kenting Street', ja: '墾丁通り', ko: '컨딩 야시장' }
        ]
      }
    };

    window.onload = function() {
      if(typeof google !== 'undefined') { initMap(); }
      liff.init({ liffId: TOUR_LIFF_ID }).catch(err => console.log('LIFF Error:', err));
      setLang('zh');
      handleRouteSelection(); // 初始化開關文字
    };

    function setLang(lang) {
      currLang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`btn-lang-${lang}`).classList.add('active');
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (I18N[lang][key]) el.innerHTML = I18N[lang][key];
      });
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const key = el.getAttribute('data-i18n-ph');
        if (I18N[lang][key]) el.placeholder = I18N[lang][key];
      });
      document.querySelectorAll('[data-i18n-opt]').forEach(el => {
        const key = el.getAttribute('data-i18n-opt');
        if (I18N[lang][key]) el.innerText = I18N[lang][key];
      });
      
      handleRouteSelection(); // 重新渲染開關文字與景點
    }

    // 🚀 處理主線切換與開關文字動態變化
    function handleRouteSelection() {
      const routeId = document.getElementById('tourRoute').value;
      const data = TOUR_DATA[routeId];
      // 移除開關的 checked 狀態（切換路線時還原）
      document.getElementById('extendToggle').checked = false;
      document.getElementById('extendRouteText').innerText = data.extendText[currLang];
      renderPOIs();
    }

    function addCustomPoiInput() {
      const container = document.getElementById('customPoiContainer');
      const div = document.createElement('div');
      div.className = 'flex gap-2 mt-2';
      div.innerHTML = `
        <input type="text" class="custom-poi-input flex-1 border-0 bg-slate-50 rounded-xl p-3 text-slate-800 outline-none font-bold shadow-inner" placeholder="${I18N[currLang].wishPlace}" oninput="resetFormCalculation()">
        <button onclick="this.parentElement.remove(); resetFormCalculation();" class="bg-rose-100 text-rose-600 w-12 rounded-xl active:scale-95 transition-transform flex items-center justify-center shadow-sm"><i class="fa-solid fa-minus"></i></button>
      `;
      container.appendChild(div);
      resetFormCalculation();
    }

    function setSameAsPickup() {
      const pickupVal = document.getElementById('pickup-input').value.trim();
      if (!pickupVal) return;
      document.getElementById('dropoff-input').value = pickupVal;
      resetFormCalculation();
    }

    function formatTimeText(mins) {
      if (mins < 60) return `${mins} ${I18N[currLang].min}`;
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return m > 0 ? `${h} ${I18N[currLang].hour} ${m} ${I18N[currLang].min}` : `${h} ${I18N[currLang].hour}`;
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), { center: { lat: 23.991, lng: 121.601 }, zoom: 12, disableDefaultUI: true, gestureHandling: 'cooperative' });
      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer({ map: map, suppressMarkers: false, preserveViewport: true, polylineOptions: { strokeColor: '#10b981', strokeWeight: 5 } });
      const options = { componentRestrictions: { country: "tw" } };
      new google.maps.places.Autocomplete(document.getElementById('pickup-input'), options).addListener('place_changed', resetFormCalculation);
      new google.maps.places.Autocomplete(document.getElementById('dropoff-input'), options).addListener('place_changed', resetFormCalculation);
    }

    function useMyLocation() {
      if (navigator.geolocation) {
        Swal.fire({ title: 'GPS...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
        navigator.geolocation.getCurrentPosition((pos) => {
          const lat = pos.coords.latitude, lng = pos.coords.longitude;
          new google.maps.Geocoder().geocode({ location: { lat, lng } }, (res, status) => {
            Swal.close();
            if (status === "OK" && res[0]) {
              const addr = res[0].formatted_address.replace("台灣", "").replace(/[0-9]{3}/, "");
              document.getElementById('pickup-input').value = addr;
              if(map) map.panTo({lat, lng});
              resetFormCalculation();
            }
          });
        }, () => { Swal.close(); }, { enableHighAccuracy: true, timeout: 10000 });
      }
    }

    function renderPOIs() {
      const routeId = document.getElementById('tourRoute').value;
      const data = TOUR_DATA[routeId];
      const isExtended = document.getElementById('extendToggle').checked;
      
      // 🚀 根據開關狀態決定陣列長度
      let pointsToRender = [...data.base];
      if (isExtended) {
          pointsToRender = pointsToRender.concat(data.extend);
      }

      document.getElementById('poiContainer').innerHTML = pointsToRender.map((pt) => {
        let isChecked = pt.status === 'closed' ? '' : 'checked';
        let badgeHtml = '';
        if (pt.status === 'closed') {
            badgeHtml = `<span class="text-[10px] bg-rose-100 text-rose-600 px-1.5 py-0.5 rounded ml-1.5 whitespace-nowrap shadow-sm">${I18N[currLang].statusClosed}</span>`;
        } else if (pt.status === 'partial') {
            badgeHtml = `<span class="text-[10px] bg-amber-100 text-amber-600 px-1.5 py-0.5 rounded ml-1.5 whitespace-nowrap shadow-sm">${I18N[currLang].statusPartial}</span>`;
        }

        return `
          <label class="custom-checkbox block cursor-pointer active:scale-95 transition-transform">
            <input type="checkbox" class="poi-check hidden" value="${pt.query}" data-zh="${pt.zh}" data-stay="${pt.stay}" data-disp="${pt[currLang]}" onchange="resetFormCalculation()" ${isChecked}>
            <div class="border border-slate-200 rounded-xl p-3 flex items-center gap-2 bg-white h-full shadow-sm">
              <span class="font-bold leading-tight flex-1 text-slate-700 text-xs flex items-center flex-wrap">${pt[currLang]} ${badgeHtml}</span>
            </div>
          </label>
        `;
      }).join('');
      resetFormCalculation();
    }

    function resetFormCalculation() {
      currentCalcResult = null;
      let count = document.querySelectorAll('.poi-check:checked').length;
      document.querySelectorAll('.custom-poi-input').forEach(input => { if(input.value.trim() !== '') count++; });
      document.getElementById('poiCount').innerHTML = `<span data-i18n="selected">${I18N[currLang].selected}</span> ${count}`;
    }

    function resetCalculation() {
      document.getElementById('top-dashboard').style.transform = 'translateY(-100%)';
      document.body.style.overflow = 'auto';
    }

    function calculateFareWithGoogle() {
      const pickup = document.getElementById('pickup-input').value.trim();
      const dropoff = document.getElementById('dropoff-input').value.trim();
      const date = document.getElementById('tourDate').value;
      const checkedBoxes = document.querySelectorAll('.poi-check:checked');
      const customInputs = document.querySelectorAll('.custom-poi-input');

      let hasValidPoi = (checkedBoxes.length > 0);
      customInputs.forEach(input => { if(input.value.trim() !== '') hasValidPoi = true; });

      if (!date || !pickup || !dropoff || !hasValidPoi) {
        Swal.fire('Warning', 'Please check all inputs', 'warning'); return;
      }

      Swal.fire({ title: 'Google Maps...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      const waypoints = [];
      const originalPois = [];
      let totalStay = 0;

      checkedBoxes.forEach(cb => {
        waypoints.push({ location: cb.value, stopover: true });
        originalPois.push({ dispName: cb.dataset.disp, zhName: cb.dataset.zh, stay: parseInt(cb.dataset.stay) });
        totalStay += parseInt(cb.dataset.stay);
      });

      customInputs.forEach(input => {
        const val = input.value.trim();
        if (val) {
          waypoints.push({ location: val, stopover: true });
          originalPois.push({ dispName: val, zhName: val, stay: 50 }); 
          totalStay += 50;
        }
      });

      directionsService.route({
        origin: pickup, destination: dropoff, waypoints: waypoints, optimizeWaypoints: true, travelMode: 'DRIVING'
      }, (res, status) => {
        Swal.close();
        if (status === 'OK') {
          directionsRenderer.setDirections(res);
          let driveMins = Math.floor(res.routes[0].legs.reduce((acc, leg) => acc + leg.duration.value, 0) / 60);
          let totalKm = Math.floor(res.routes[0].legs.reduce((acc, leg) => acc + leg.distance.value, 0) / 1000);
          
          const optimizedOrder = res.routes[0].waypoint_order;
          let currentLabelCode = 65; 
          const originLabel = String.fromCharCode(currentLabelCode++); 
          
          let routeHtml = `
            <div class="relative pl-10 mb-4">
              <span class="absolute left-0 top-0 bg-emerald-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-[13px] font-black shadow-md z-10">${originLabel}</span>
              <div class="absolute left-[11px] top-6 bottom-[-16px] w-[2px] bg-slate-600 z-0"></div>
              <div class="truncate font-bold text-emerald-400 text-base leading-6">${pickup}</div>
            </div>`;
          
          let backendList = `${originLabel}. 上車：${pickup}\n`;

          optimizedOrder.forEach(index => {
            const poi = originalPois[index];
            const label = String.fromCharCode(currentLabelCode++);
            backendList += `${label}. ${poi.zhName} (停 ${poi.stay}分)\n`;
            routeHtml += `
              <div class="relative pl-10 mb-4 pr-1">
                <span class="absolute left-0 top-0 bg-rose-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-[13px] font-black shadow-md z-10">${label}</span>
                <div class="absolute left-[11px] top-6 bottom-[-16px] w-[2px] bg-slate-600 z-0"></div>
                <div class="flex justify-between items-center leading-6">
                  <span class="truncate flex-1 font-bold text-slate-100 text-base">${poi.dispName}</span>
                  <span class="text-[12px] text-amber-400 font-bold shrink-0 bg-amber-400/15 px-2 py-0.5 rounded ml-2">${poi.stay}${I18N[currLang].min}</span>
                </div>
              </div>`;
          });
          
          const destLabel = String.fromCharCode(currentLabelCode);
          backendList += `${destLabel}. 下車：${dropoff}`;
          routeHtml += `
            <div class="relative pl-10 mb-2">
              <span class="absolute left-0 top-0 bg-blue-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-[13px] font-black shadow-md z-10">${destLabel}</span>
              <div class="truncate font-bold text-blue-400 text-base leading-6">${dropoff}</div>
            </div>`;
          
          document.getElementById('routeDetails').innerHTML = routeHtml;
          document.getElementById('rawDriveDisplay').innerText = `${totalKm}km / ${formatTimeText(driveMins)}`;
          document.getElementById('rawStayDisplay').innerText = formatTimeText(totalStay);

          document.body.style.overflow = 'hidden';
          document.getElementById('top-dashboard').style.transform = 'translateY(0)';
          processPrice(driveMins + totalStay, totalKm, backendList);

          setTimeout(() => {
              google.maps.event.trigger(map, 'resize');
              map.fitBounds(res.routes[0].bounds, { top: 30, bottom: 30, left: 30, right: 30 });
          }, 300);
        } else {
          Swal.fire('Error', 'Google Maps Error', 'error');
        }
      });
    }

    function processPrice(totalMinutes, actualKm, backendList) {
      const carType = document.querySelector('input[name="carType"]:checked').value;
      let basePrice = carType === '5' ? 1500 : (carType === '7' ? 2000 : 2500);
      const routeId = document.getElementById('tourRoute').value;
      
      // 🚀 動態判定：如果解鎖開關 ON，就視為長程防禦模式 (至少8H)
      const isLong = document.getElementById('extendToggle').checked;

      if (isLong && totalMinutes < 480) totalMinutes = 480;
      else if (totalMinutes < 180) totalMinutes = 180;

      let extraMins = totalMinutes - 180;
      let extraH = 0;
      if (extraMins > 0) {
        extraH = Math.floor(extraMins / 60);
        if (extraMins % 60 > 30) extraH += 1.0;
        else if (extraMins % 60 > 15) extraH += 0.5;
      }

      let finalH = 3.0 + extraH;
      let isOT = false;
      if (finalH > 12) { finalH = 12; isOT = true; }

      let finalP = basePrice + (extraH * 500);
      let limitK = 75 + (extraH * 25);
      let isOverK = actualKm > limitK;

      document.getElementById('priceDisplay').innerText = `$${finalP.toLocaleString()}`;
      document.getElementById('timeDisplay').innerHTML = `${finalH.toFixed(1)} <span class="text-lg">${I18N[currLang].hour}</span>`;
      document.getElementById('kmDisplay').innerHTML = `${I18N[currLang].limit}：${limitK}km`;

      currentCalcResult = { 
        hours: finalH.toFixed(1), price: finalP, limitKm: limitK, 
        actualKm, isOvertime: isOT, isOverKm: isOverK, 
        isLongDistance: isLong, backendPoiText: backendList,
        routeId: routeId
      };
    }

    function submitForm() {
      if (!currentCalcResult) return;
      const carVal = document.querySelector('input[name="carType"]:checked').value;
      let carZh = carVal === '5' ? '五人座' : (carVal === '7' ? '七人座' : '九人座');
      const isLong = document.getElementById('extendToggle').checked;
      
      // 動態抓取送單的主題名稱 (判斷是否有解鎖)
      let finalRouteZh = TOUR_DATA[currentCalcResult.routeId].name.zh;
      let finalRouteEn = TOUR_DATA[currentCalcResult.routeId].name.en;
      if (isLong) {
          finalRouteZh = TOUR_DATA[currentCalcResult.routeId].extendRouteName.zh;
          finalRouteEn = TOUR_DATA[currentCalcResult.routeId].extendRouteName.en;
      }

      const payload = {
        date: document.getElementById('tourDate').value,
        pickup: document.getElementById('pickup-input').value,
        dropoff: document.getElementById('dropoff-input').value,
        routeNameZh: finalRouteZh,
        routeNameEn: finalRouteEn,
        carTypeZh: carZh,
        ...currentCalcResult
      };
      sendFlex(payload);
    }

    async function sendFlex(data) {
      if (!liff.isInClient()) { Swal.fire('Error', 'Please run inside LINE', 'warning'); return; }
      Swal.fire({ title: 'Sending...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      const flex = {
        type: "flex", altText: `📅 收到諮詢：${data.routeNameZh}`,
        contents: {
          type: "bubble", size: "mega",
          header: { type: "box", layout: "vertical", backgroundColor: "#0f172a", paddingAll: "16px", contents: [{ type: "text", text: "🌐 國際客製包車單", weight: "bold", color: "#34d399", size: "xl" }, { type: "text", text: "Google Maps 路線精算引擎", color: "#94a3b8", size: "xs", margin: "sm" }] },
          body: { type: "box", layout: "vertical", spacing: "md", paddingAll: "20px", contents: [
            { type: "box", layout: "horizontal", contents: [{ type: "text", text: "Date / 日期", color: "#64748b", size: "sm", flex: 2 }, { type: "text", text: data.date, weight: "bold", size: "sm", flex: 5 }] },
            { type: "box", layout: "horizontal", contents: [{ type: "text", text: "Type / 車型", color: "#64748b", size: "sm", flex: 2 }, { type: "text", text: data.carTypeZh, weight: "bold", size: "sm", flex: 5 }] },
            { type: "separator", margin: "md" },
            { type: "text", text: `📍 最佳化路徑 (${data.routeNameZh} / ${data.routeNameEn})`, weight: "bold", size: "sm", margin: "md" },
            { type: "text", text: data.backendPoiText, wrap: true, size: "sm", color: "#475569" },
            { type: "separator", margin: "lg" },
            { type: "box", layout: "horizontal", contents: [{ type: "text", text: "系統精算", size: "sm", flex: 2 }, { type: "text", text: `${data.hours} 小時`, weight: "bold", size: "sm", flex: 5, color: data.isOvertime ? "#f43f5e" : "#0284c7" }] },
            { type: "box", layout: "horizontal", contents: [{ type: "text", text: "預估里程", size: "sm", flex: 2 }, { type: "text", text: `${data.actualKm}km ${data.isOverKm ? '(超程另計)' : ''}`, weight: "bold", size: "sm", flex: 5, color: data.isOverKm ? "#f43f5e" : "#64748b" }] },
            { type: "box", layout: "horizontal", contents: [{ type: "text", text: "基準車資", size: "sm", flex: 2 }, { type: "text", text: `$${data.price.toLocaleString()} 起`, weight: "bold", size: "xl", flex: 5, color: "#10b981" }] }
          ] },
          footer: { type: "box", layout: "vertical", paddingAll: "16px", backgroundColor: "#f8fafc", contents: [{ type: "text", text: "*最終報價以老司機確認為準", size: "xs", color: "#94a3b8", align: "center" }] }
        }
      };
      try {
        await liff.sendMessages([flex]);
        Swal.fire({ icon: 'success', title: 'Success', text: 'Request sent.' }).then(() => liff.closeWindow());
      } catch (err) { Swal.fire('Error', 'LINE API Error', 'error'); }
    }
  </script>
