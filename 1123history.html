<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的行程</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* 🚀 靛藍色未來手帳漸層配色 */
        .header-bg { background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%); border-bottom-left-radius: 32px; border-bottom-right-radius: 32px; padding: 24px 20px 40px 20px; color: white; position: relative; overflow: hidden; box-shadow: 0 10px 25px rgba(30, 58, 138, 0.2); }
        .header-icon { position: absolute; right: -20px; top: -10px; font-size: 120px; opacity: 0.08; transform: rotate(-10deg); color: #fff;}
        
        .main-container { flex: 1; padding: 0 20px 40px 20px; max-width: 600px; margin: -20px auto 0 auto; width: 100%; z-index: 10; position: relative; }
        
        .history-card { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); padding: 18px 16px; margin-bottom: 16px; border: 1px solid #e2e8f0; transition: transform 0.2s; }
        .history-card:active { transform: scale(0.98); }
        
        .status-badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: bold; letter-spacing: 0.5px; }
        .status-active { background-color: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; } /* 綠色：已預約 */
        .status-cancelled { background-color: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; text-decoration: line-through; } /* 灰色：已取消 */
        .status-taken { background-color: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; } /* 藍色：已接單 */
        .status-dispatch { background-color: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; } /* 橘色：派發中 */
        
        .loader-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .swal2-popup { border-radius: 24px !important; font-family: 'Noto Sans TC', sans-serif !important; }
    </style>
</head>
<body>

    <div id="app-header" class="header-bg">
        <i class="fa-solid fa-calendar-check header-icon"></i>
        <div class="flex items-center justify-between relative z-10">
            <div>
                <h1 class="text-2xl font-black tracking-wide flex items-center">
                    <img id="user-avatar" src="https://via.placeholder.com/50" class="w-10 h-10 rounded-full border-2 border-white mr-3 hidden shadow-md">
                    <span id="user-name-display">載入中...</span>
                </h1>
                <p class="text-blue-200 text-sm mt-1 font-bold">未來專屬行程手帳</p> 
            </div>
            <div id="total-count-badge" class="hidden flex-col items-center bg-white/20 px-3 py-1.5 rounded-xl backdrop-blur-sm border border-white/30">
                <span class="text-[10px] text-blue-100 font-bold uppercase">Total</span>
                <span id="total-trips" class="text-xl font-black text-white leading-none">0</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div id="loading-state" class="loader-container bg-white rounded-3xl shadow-sm border border-gray-100 mt-2">
            <div class="loader mb-4"></div>
            <p class="text-slate-500 font-bold text-sm tracking-widest animate-pulse">撈取行程資料中...</p>
        </div>

        <div id="empty-state" class="hidden flex-col items-center justify-center bg-white rounded-3xl shadow-sm border border-gray-100 p-8 mt-2 text-center">
            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mb-4 text-blue-400 text-4xl">
                <i class="fa-solid fa-car-side"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-700 mb-1">尚無行程紀錄</h3>
            <p class="text-sm text-slate-400 mb-6">您的專屬行程手帳目前還是空白的喔！</p>
            <button onclick="goToBooking()" class="bg-blue-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg active:scale-95 transition-transform flex items-center">
                <i class="fa-solid fa-taxi mr-2"></i> 立刻預約叫車
            </button>
        </div>

        <div id="history-list" class="hidden flex-col gap-3">
            </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const VERSION = "v6.8"; // 🚀 品牌升級：更名為「我的行程」
        
        const LIFF_ID = '2008907691-WHXiIAeb'; 
        const BOOKING_LIFF_URL = 'https://liff.line.me/2008907691-3P676tTN'; 
        const BOOKING_GAS_URL = 'https://script.google.com/macros/s/AKfycbzVTtBzYxPy9g-WnaJPS_Q_8GnzmWDf4Kaw7nA8VeDfe6ykM5rV3C2MmMddMh3AG6c9/exec'; 

        let userId = "";

        window.onload = function() {
            liff.init({ liffId: LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
                liff.getProfile().then(profile => {
                    userId = profile.userId;
                    
                    document.getElementById('user-name-display').innerText = profile.displayName + " 的行程";
                    if(profile.pictureUrl) {
                        const avatar = document.getElementById('user-avatar');
                        avatar.src = profile.pictureUrl;
                        avatar.classList.remove('hidden');
                    }
                    
                    fetchHistory();
                }).catch(err => showError('無法取得使用者資料'));
            }).catch(err => showError('LIFF 初始化失敗'));
        };

        function fetchHistory() {
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('history-list').classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('flex');
            
            const url = `${BOOKING_GAS_URL}?action=getHistory&userId=${userId}`;
            
            fetch(url)
                .then(response => response.json())
                .then(result => {
                    document.getElementById('loading-state').classList.add('hidden');
                    
                    if (result.status === 'success' && result.data && result.data.length > 0) {
                        renderHistory(result.data);
                    } else {
                        document.getElementById('empty-state').classList.remove('hidden');
                        document.getElementById('empty-state').classList.add('flex');
                    }
                })
                .catch(error => {
                    document.getElementById('loading-state').classList.add('hidden');
                    showError('無法連線至資料庫，請稍後再試。');
                });
        }

        function renderHistory(data) {
            const listContainer = document.getElementById('history-list');
            const countBadge = document.getElementById('total-count-badge');
            const countText = document.getElementById('total-trips');
            
            listContainer.innerHTML = '';
            
            // 🚀 修正點：將「未到」的任務排除於 Active Trips 計算之外
            const activeTrips = data.filter(item => !item.status.includes('取消') && !item.status.includes('未到')).length;
            countText.innerText = activeTrips;
            countBadge.classList.remove('hidden');
            countBadge.classList.add('flex');

            data.forEach(item => {
                let badgeClass = 'status-active';
                let statusIcon = '<i class="fa-solid fa-check mr-1"></i>';
                
                let rawStatus = item.status;
                let driverPhone = "";
                const phoneMatch = rawStatus.match(/📞([\d\-]+)/);
                if (phoneMatch) {
                    driverPhone = phoneMatch[1]; 
                    rawStatus = rawStatus.replace(phoneMatch[0], ''); 
                }

                let displayText = rawStatus.replace(/✅|❌|📡|🔄/g, '').trim(); 

                // 🚀 修正點：將「客人未到」視同取消狀態處理（灰底、刪除線）
                const isCancelled = rawStatus.includes('取消') || rawStatus.includes('未到');
                const isTaken = rawStatus.includes('已接');
                const isDispatched = rawStatus.includes('派發大廳');

                if (isCancelled) {
                    badgeClass = 'status-cancelled';
                    statusIcon = '<i class="fa-solid fa-xmark mr-1"></i>';
                } else if (isTaken) {
                    badgeClass = 'status-taken'; 
                    statusIcon = '<i class="fa-solid fa-taxi mr-1"></i>';
                } else if (isDispatched) {
                    badgeClass = 'status-dispatch'; 
                    statusIcon = '<i class="fa-solid fa-satellite-dish mr-1"></i>';
                    displayText = '尋找車輛中';
                } else if (rawStatus.includes('新預約') || rawStatus.includes('已修改')) {
                    displayText = '已預約';
                }

                const cardOpacity = isCancelled ? 'opacity-60' : 'opacity-100';
                
                let actionButtonsHtml = '';
                
                if (isTaken && driverPhone) {
                    actionButtonsHtml = `
                        <div class="mt-4 pt-3 border-t border-slate-100">
                            <a href="tel:${driverPhone}" class="w-full bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-600 font-bold py-2.5 rounded-xl transition-colors text-sm flex items-center justify-center active:scale-95 shadow-sm">
                                <i class="fa-solid fa-phone-volume mr-2"></i> 聯絡司機 (${driverPhone})
                            </a>
                        </div>
                     `;
                } else if (!isCancelled && !isTaken) {
                    actionButtonsHtml = `
                        <div class="mt-4 pt-3 border-t border-slate-100 flex gap-3">
                            <button onclick="modifyOrder('${item.orderId}')" class="flex-1 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 font-bold py-2.5 rounded-xl transition-colors text-sm active:scale-95 shadow-sm flex items-center justify-center">
                                <i class="fa-solid fa-pen mr-2"></i> 修改
                            </button>
                            <button onclick="cancelOrder('${item.orderId}', '${item.bookingTime}')" class="flex-1 bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-500 font-bold py-2.5 rounded-xl transition-colors text-sm active:scale-95 shadow-sm flex items-center justify-center">
                                <i class="fa-solid fa-trash-can mr-2"></i> 取消
                            </button>
                        </div>
                    `;
                }

                const cardHtml = `
                    <div class="history-card ${cardOpacity}">
                        <div class="flex justify-between items-start mb-3 border-b border-slate-100 pb-3">
                            <div>
                                <div class="text-[10px] text-slate-400 font-mono mb-1">單號：${item.orderId}</div>
                                <div class="text-lg font-black text-slate-800">${item.bookingTime}</div>
                            </div>
                            <span class="status-badge ${badgeClass}">${statusIcon}${displayText}</span>
                        </div>
                        
                        <div class="flex items-center text-sm font-bold text-slate-700 mb-2">
                            <i class="fa-solid fa-circle-dot text-emerald-500 w-5 text-center mr-2"></i> ${item.pickup}
                        </div>
                        <div class="flex items-center text-sm font-bold text-slate-700 mb-4">
                            <i class="fa-solid fa-location-dot text-rose-500 w-5 text-center mr-2"></i> ${item.dropoff}
                        </div>
                        
                        <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg text-xs font-bold text-slate-500 mb-1 border border-slate-100">
                            <div><i class="fa-solid fa-user mr-1 text-slate-400"></i> ${item.phone}</div>
                            <div><i class="fa-solid fa-wallet mr-1 text-slate-400"></i> ${item.payment}</div>
                        </div>
                        
                        ${actionButtonsHtml}
                    </div>
                `;
                listContainer.innerHTML += cardHtml;
            });
            
            listContainer.classList.remove('hidden');
            listContainer.classList.add('flex');
        }

        window.modifyOrder = function(orderId) {
            window.location.href = `${BOOKING_LIFF_URL}?orderId=${orderId}`;
        }

        window.cancelOrder = function(orderId, displayTime) {
            Swal.fire({
                title: '確定取消預約？',
                text: '取消後將同步通知司機。',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e3242b',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: '確定取消',
                cancelButtonText: '保留預約'
            }).then((res) => {
                if (res.isConfirmed) {
                    Swal.fire({ title: '處理中', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                    
                    fetch(BOOKING_GAS_URL, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ orderId: orderId, status: 'cancelled', timestamp: new Date().toISOString() })
                    }).then(() => {
                        if (liff.isInClient()) {
                            liff.sendMessages([{ type: 'text', text: `❌ 已取消預約\n(原定時間：${displayTime})` }]).then(() => {
                                Swal.fire('已取消', '預約已成功取消。', 'success').then(() => fetchHistory());
                            });
                        } else {
                            Swal.fire('已取消', '預約已成功取消。', 'success').then(() => fetchHistory());
                        }
                    }).catch(e => {
                        Swal.fire('發生錯誤', '取消失敗，請稍後再試。', 'error');
                    });
                }
            });
        }

        function goToBooking() {
            window.location.href = BOOKING_LIFF_URL;
        }

        function showError(msg) {
            Swal.fire({
                icon: 'error', title: '讀取失敗', text: msg,
                confirmButtonColor: '#3b82f6', confirmButtonText: '確定'
            });
        }
    </script>
</body>
</html>
