                points.push({ name: Object.keys(f.properties)[0], lat: f.geometry.coordinates[1], lng: f.geometry.coordinates[0] });
            } else if (f.geometry.type === "Polygon") {
                const paths = f.geometry.coordinates[0].map(c => ({ lat: c[1], lng: c[0] }));

                for(let p of points) {
                    if(google.maps.geometry.poly.containsLocation(new google.maps.LatLng(p.lat, p.lng), googlePoly)) {

            }

            let trackColor = '#00B0FF'; 
            if (trackStep === '1.5' || workStatus === 'arrived') trackColor = '#FF9800'; 
            else if (trackStep === '2') trackColor = '#00C853'; 
            return { path: "M0-48c-9.8 0-17.7 7.8-17.7 17.4 0 15.5 17.7 30.6 17.7 30.6s17.7-15.4 17.7-30.6c0-9.6-7.9-17.4-17.7-17.4z", fillColor: trackColor, fillOpacity: 1, strokeColor: "#fff", strokeWeight: 3, scale: 1.3, labelOrigin: new google.maps.Point(0, -28) };
        }
        const isQueue = type === 'queue';
        const color = isQueue ? '#00B0FF' : '#00C853';
        return { path: "M0-48c-9.8 0-17.7 7.8-17.7 17.4 0 15.5 17.7 30.6 17.7 30.6s17.7-15.4 17.7-30.6c0-9.6-7.9-17.4-17.7-17.4z", fillColor: color, fillOpacity: 1, strokeColor: "#fff", strokeWeight: 2, scale: 1.1, labelOrigin: new google.maps.Point(0, -28) };

    async function fetchDriverRating(driverId) {
        if (driverRatingsCache[driverId] !== undefined) return driverRatingsCache[driverId];
        try {
            const snapshot = await firestoreDb.collection('trips').where('driverId', '==', driverId).where('status', '==', 'completed').get();
            let totalStars = 0, count = 0;
            snapshot.forEach(doc => { const data = doc.data(); if (data.rating) { totalStars += data.rating; count++; } });
            driverRatingsCache[driverId] = count === 0 ? "NEW" : (totalStars / count).toFixed(1);
            return driverRatingsCache[driverId];
        } catch (e) {
            return "NEW";
        }
    }

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 23.991, lng: 121.601 }, zoom: 15, disableDefaultUI: true, styles: [ { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] } ]
        });
        if(navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                myLat = pos.coords.latitude; myLng = pos.coords.longitude;
                const p = { lat: myLat, lng: myLng };
                
                // 🚀 核心更新：判斷乘客目前在哪一個排班戰區
                myCurrentZone = null;
                const userLatLng = new google.maps.LatLng(myLat, myLng);
                for (let zoneName in zonePolygons) {
                    if (google.maps.geometry.poly.containsLocation(userLatLng, zonePolygons[zoneName])) {
                        myCurrentZone = zoneName; break;
                    }
                }

                if(!userMarker) {
                    userMarker = new google.maps.Marker({ position: p, map: map, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 8, fillColor: "#4285F4", fillOpacity: 1, strokeColor: "white", strokeWeight: 2 }, title: "我" });
                    map.panTo(p);
                } else { userMarker.setPosition(p); }
                
                if (myTrackedDriverId) { updateStatusUI(); } else {
                    const currentGooglePos = new google.maps.LatLng(myLat, myLng);
                    if (!lastGeocodePos || google.maps.geometry.spherical.computeDistanceBetween(lastGeocodePos, currentGooglePos) > 100) {
                        getAddress(myLat, myLng); lastGeocodePos = currentGooglePos;
                    }
                }
                if (Object.keys(markers).length > 0) processDriversData(lastDriversData);
            }, (err) => console.log(err), { enableHighAccuracy: true });
        }
    }

    function handleOrderRejected() {

    async function processDriversData(data) {
        if (!data) return;
        const activeIds = new Set();
        let trackedDrivers = [];
        let queueDrivers = [];
        let emptyDrivers = [];

        if (myTrackedDriverId) {
            const trackedData = data[myTrackedDriverId];
            if (!trackedData || trackedData.status !== 'online') {
                exitTrackingMode(true, isAppJustLoaded); 
            } else {
                const req = trackedData.request; const wasBusy = localStorage.getItem('wasBusy') === 'true';
                if (req && req.status === 'rejected') { handleOrderRejected(); return; }
                if (!req || req.userId !== passengerId) {
                    if (wasBusy) { 
                        localStorage.removeItem('wasBusy'); 
                        exitTrackingMode(true, isAppJustLoaded); 
                    } else { 
                        handleOrderRejected(); 
                    }
                    return; 
                }
                if (trackedData.workStatus === 'arrived') {
                    if (currentTrackStep !== '1.5') { currentTrackStep = '1.5'; localStorage.setItem('trackStep', '1.5'); updateStatusUI(); }
                } else if (trackedData.workStatus === 'busy') {
                    localStorage.setItem('wasBusy', 'true');
                    if (currentTrackStep === '1.5') { currentTrackStep = '2'; localStorage.setItem('trackStep', '2'); updateStatusUI(); }
                }
            }
        }

        Object.keys(data).forEach(key => {
            const d = data[key]; if (d.status !== 'online') return;
            let isTracked = false;
            
            if (myTrackedDriverId) { 
                if (key !== myTrackedDriverId) return; 
                isTracked = true; 
            } else { 
                if (d.workStatus === 'busy' || d.workStatus === 'arrived') return; 
            }

            activeIds.add(key); const pos = { lat: d.lat, lng: d.lng };
            const dLatLng = new google.maps.LatLng(d.lat, d.lng);
            const iconType = d.workStatus === 'queue' ? 'queue' : 'empty';
            let labelText = isTracked ? '專車' : (d.workStatus === 'queue' ? '排' : '空');
            
            if (isTracked) {
                if (currentTrackStep === '1.5' || d.workStatus === 'arrived') labelText = '抵達';
                else if (currentTrackStep === '2') labelText = '載客'; else labelText = '前往';
            }

            if (!markers[key]) {
                markers[key] = new google.maps.Marker({ position: pos, map: map, icon: getPinIcon(iconType, isTracked, d.workStatus, currentTrackStep), label: { text: labelText, color: "white", fontSize: "14px", fontWeight: "bold" }, title: d.name, zIndex: isTracked ? 999 : 1 });
                markers[key].addListener('click', () => { const card = document.getElementById(`card-${key}`); if(card) card.scrollIntoView({ behavior: 'smooth', inline: 'center' }); });
            } else {
                markers[key].setPosition(pos); markers[key].setIcon(getPinIcon(iconType, isTracked, d.workStatus, currentTrackStep)); markers[key].setLabel({ text: labelText, color: "white", fontSize: "14px", fontWeight: "bold" }); markers[key].setZIndex(isTracked ? 999 : 1);
            }

            let distUser = 999;
            if(myLat && myLng) distUser = google.maps.geometry.spherical.computeDistanceBetween(new google.maps.LatLng(myLat, myLng), dLatLng) / 1000;
            
            d.id = key; d.distUser = distUser; d.isTracked = isTracked; 

            // 🚀 核心更新：分流與強制鎖定邏輯
            if (isTracked) {
                trackedDrivers.push(d);
            } else {
                if (myCurrentZone && d.workStatus === 'queue') {
                    if (zonePolygons[myCurrentZone] && google.maps.geometry.poly.containsLocation(dLatLng, zonePolygons[myCurrentZone])) {
                        queueDrivers.push(d);
                    }
                } else if (d.workStatus === 'empty' && distUser <= 3) { // 3公里內空車備援
                    emptyDrivers.push(d);
                }
            }
        });

        // 🚀 核心更新：排班依時間排序，空車依距離排序
        queueDrivers.sort((a, b) => {
            let timeA = a.queueTime || a.lastUpdate || 0;
            let timeB = b.queueTime || b.lastUpdate || 0;
            return timeA - timeB;
        });
        emptyDrivers.sort((a, b) => a.distUser - b.distUser);

        let finalDrivers = [];
        if (queueDrivers.length > 0) {
            // 加入順位標記
            for (let i = 0; i < queueDrivers.length; i++) {
                queueDrivers[i].queueRank = i + 1;
                queueDrivers[i].ratingStr = await fetchDriverRating(queueDrivers[i].id);
                finalDrivers.push(queueDrivers[i]);
            }
        } else {
            // 無排班車，啟動智能降級使用附近空車
            for (let d of emptyDrivers) {
                d.ratingStr = await fetchDriverRating(d.id);
                finalDrivers.push(d);
            }
        }

        // 追蹤中的司機優先加入
        for (let d of trackedDrivers) {
            d.ratingStr = await fetchDriverRating(d.id);
            finalDrivers.unshift(d);
        }

        for(let k in markers) { if(!activeIds.has(k)) { markers[k].setMap(null); delete markers[k]; } }
        
        updateCarousel(finalDrivers);
        isAppJustLoaded = false;
    }

                    }
                };
                liff.sendMessages([orderFlexMessage]).catch(err => console.log('LIFF 置頂訊息發送失敗', err));
            }
        };

        try {
            const writePromise = db.ref('drivers/' + driverId + '/request').set({ 
                lat: myLat, lng: myLng, userId: passengerId, userName: passengerName, userPhone: passengerPhone, 
                pickup: currentAddress, dropoff: "依乘客指示", timestamp: firebase.database.ServerValue.TIMESTAMP 
            });
            const pushPromise = fetch(GAS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ source: 'web_app', driverId: driverId }) });
            await Promise.race([Promise.all([writePromise, pushPromise]), new Promise(r => setTimeout(r, 2000))]);
        } catch (error) {} finally { makeCallAndTrack(); }
    }

    async function exitTrackingMode(isAuto, skipRating = false) {
        if (!isAuto && myTrackedDriverId) {
            const confirm = await Swal.fire({ title: '確定要取消叫車嗎？', text: "取消後將立即通知司機", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#3085d6', confirmButtonText: '是的，取消叫車', cancelButtonText: '按錯了' });
            if (!confirm.isConfirmed) return; 
            try { await db.ref('drivers/' + myTrackedDriverId + '/request').remove(); } catch (e) {}
            
            if (liff.isInClient()) {
                const lockedAddress = localStorage.getItem('lastPickupAddress') || document.getElementById('loc-text').innerText;
                const timeObj = getTaipeiTime();
                const cancelTextMsg = {
                    "type": "text",
                    "text": `❌ 已取消叫車\n(時間：${timeObj.short})\n📍 上車點：${lockedAddress}`
                };
                liff.sendMessages([cancelTextMsg]).catch(err => console.log('LIFF 取消訊息發送失敗', err));
            }

            resetTrackingState();
            Swal.fire({ icon: 'info', title: '已取消叫車', text: '已同步通知司機', timer: 2000, showConfirmButton: false });
            
            if (liff.isInClient()) {
                setTimeout(() => { liff.closeWindow(); }, 1500);
            }
            return;
        }

        if (isAuto) {
            if (skipRating) {
                resetTrackingState();
                return;
            }

            Swal.fire({ title: '同步行程資料中...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
            let targetTripId = null;
            try {
                const snapshot = await firestoreDb.collection('trips')
                    .where('passengerId', '==', passengerId).orderBy('timestamp', 'desc').limit(1).get();
                if (!snapshot.empty) targetTripId = snapshot.docs[0].id;
            } catch(e) { console.error(e); }

            resetTrackingState();

            let selectedRating = 0;
            const { isConfirmed } = await Swal.fire({
                title: '行程已結束',
                html: `
                    <p style="color:#666; margin-bottom:15px; font-weight:bold;">感謝您的搭乘！請為司機打個分數：</p>
                    <div id="star-rating-container" style="display:flex; justify-content:center; gap:10px; font-size:40px; color:#ddd; cursor:pointer;">
                        <i class="fa-solid fa-star star-btn" data-val="1"></i>
                        <i class="fa-solid fa-star star-btn" data-val="2"></i>
                        <i class="fa-solid fa-star star-btn" data-val="3"></i>
                        <i class="fa-solid fa-star star-btn" data-val="4"></i>
                        <i class="fa-solid fa-star star-btn" data-val="5"></i>
                    </div>
                `,
                showCancelButton: true, confirmButtonColor: '#00C853', cancelButtonColor: '#94a3b8', confirmButtonText: '送出評價', cancelButtonText: '略過並關閉', allowOutsideClick: false,
                didOpen: () => {
                    const stars = document.querySelectorAll('.star-btn');
                    stars.forEach(star => {
                        star.addEventListener('click', function() {
                            selectedRating = parseInt(this.getAttribute('data-val'));
                            stars.forEach(s => { s.style.color = parseInt(s.getAttribute('data-val')) <= selectedRating ? '#FFC107' : '#ddd'; });
                        });
                    });
                },
                preConfirm: () => { if (selectedRating === 0) { Swal.showValidationMessage('請點擊星星進行評分喔！'); return false; } return selectedRating; }
            });

            if (isConfirmed && selectedRating > 0) {
                Swal.fire({ title: '送出中...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
                try {
                    if (targetTripId) {
                        await firestoreDb.collection('trips').doc(targetTripId).update({ rating: selectedRating, ratingTime: firebase.firestore.FieldValue.serverTimestamp() });
                    }
                } catch(e) {}
            }

            if (liff.isInClient()) { liff.closeWindow(); } else { Swal.fire({ icon: 'success', title: '感謝搭乘', text: '您可以關閉此網頁了', showConfirmButton: false }); }
        }
    }

    function resetTrackingState() {
        myTrackedDriverId = null; localStorage.removeItem('trackedDriverId'); localStorage.removeItem('wasBusy'); localStorage.removeItem('trackStep'); currentTrackStep = '1';
        lastGeocodePos = null; if (myLat && myLng) getAddress(myLat, myLng); updateStatusUI();
        if (lastDriversData) processDriversData(lastDriversData); 
    }

    function centerMap(){ if(userMarker) { map.panTo(userMarker.getPosition()); map.setZoom(15); } }
    
    function getAddress(lat, lng) {
        document.getElementById('loc-text').innerText = "定位中...";
        const geocoder = new google.maps.Geocoder();
        geocoder.geocode({ location: { lat: lat, lng: lng } }, (results, status) => {
            if (myTrackedDriverId) return;
            if (status === "OK" && results[0]) {
                const route = results[0].address_components.find(c => c.types.includes('route'))?.short_name || "";
                const streetNum = results[0].address_components.find(c => c.types.includes('street_number'))?.short_name || "";
                let addr = (route + " " + streetNum).trim();
                if (!addr) addr = results[0].address_components.find(c => c.types.includes('neighborhood'))?.short_name || "您的位置";
                document.getElementById('loc-text').innerText = addr;
            } else { document.getElementById('loc-text').innerText = "請稍候..."; }
        });
    }
  </script>
