  <style>
    body { background-color: #0f172a; margin: 0; font-family: 'Noto Sans TC', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
    #top-radar { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); overflow: hidden;}
    
    .radar-pulse { position: absolute; width: 150px; height: 150px; background: rgba(16, 185, 129, 0.15); border-radius: 50%; z-index: 1; animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
    .radar-pulse:nth-child(2) { animation-delay: 0.8s; }
    .radar-pulse:nth-child(3) { animation-delay: 1.6s; }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }
    
    .status-badge { z-index: 10; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); color: white; display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 20px;}
    
    #bottom-control { height: 45vh; background: white; border-top-left-radius: 32px; border-top-right-radius: 32px; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; padding: 40px 24px 30px 24px; position: relative; z-index: 20; }
    
    /* 巨大盲操按鈕三段變形 */
    .btn-call { width: 100%; height: 100px; border-radius: 24px; border: none; outline: none; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; transition: transform 0.1s; cursor: pointer; flex-direction: column; gap: 4px; }
    .btn-call:active { transform: scale(0.96); }
    
    /* 狀態 A: 本區有車 (翠綠發光) */
    .btn-state-a { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 15px 35px rgba(16, 185, 129, 0.4), inset 0 2px 0 rgba(255,255,255,0.2); }
    /* 狀態 B: 鄰近支援 (深海藍發光) */
    .btn-state-b { background: linear-gradient(135deg, #3b82f6, #1d4ed8); box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4), inset 0 2px 0 rgba(255,255,255,0.2); }
    /* 狀態 C: 無車調度 (曜石黑) */
    .btn-state-c { background: linear-gradient(135deg, #334155, #0f172a); box-shadow: 0 15px 35px rgba(15, 23, 42, 0.4), inset 0 2px 0 rgba(255,255,255,0.2); }
    /* 狀態 D: 鎖定中 (灰階) */
    .btn-state-disabled { background: linear-gradient(135deg, #94a3b8, #64748b); box-shadow: none; pointer-events: none; }

    .btn-title { font-size: 26px; font-weight: 900; color: white; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); line-height: 1.1; }
    .btn-subtitle { font-size: 14px; font-weight: bold; color: rgba(255,255,255,0.9); }

    .book-tour-link { margin-top: 20px; font-size: 15px; font-weight: bold; color: #64748b; text-decoration: underline; text-underline-offset: 4px; cursor: pointer; transition: color 0.2s; }

    let zonePolygons = {};

    let currentState = 'DISABLED';

    let ignoredDrivers = []; 

    function processPolygons() {
        const points = [];
        GEO_RAW.features.forEach(f => {
            if(f.geometry.type === "Point") {
                points.push({ name: Object.keys(f.properties)[0], lat: f.geometry.coordinates[1], lng: f.geometry.coordinates[0] });
            } else if (f.geometry.type === "Polygon") {
                const paths = f.geometry.coordinates[0].map(c => ({ lat: c[1], lng: c[0] }));
                const googlePoly = new google.maps.Polygon({ paths: paths });
                for(let p of points) {
                    if(google.maps.geometry.poly.containsLocation(new google.maps.LatLng(p.lat, p.lng), googlePoly)) {
                        zonePolygons[p.name] = googlePoly; break; 
                    }
                }
            }
        });
    }

    function locateUser() {
        if (!navigator.geolocation) {
            Swal.fire({icon: 'error', title: 'GPS 失敗', text: '您的裝置不支援定位', confirmButtonColor: '#10b981'});
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                myLat = pos.coords.latitude;
                myLng = pos.coords.longitude;
                const userLatLng = new google.maps.LatLng(myLat, myLng);
                
                myCurrentZone = null;
                for (let zoneName in zonePolygons) {
                    if (google.maps.geometry.poly.containsLocation(userLatLng, zonePolygons[zoneName])) {
                        myCurrentZone = zoneName; break;
                    }
                }

                if (myCurrentZone) {
                    document.getElementById('zone-name').innerText = myCurrentZone;
                    document.getElementById('loc-status').innerHTML = '<i class="fa-solid fa-location-dot text-emerald-400 mr-1"></i> 定位成功';
                    startListeningDrivers();
                } else {
                    Swal.fire({icon: 'error', title: '超出服務區', text: '您目前不在排班服務區內', confirmButtonColor: '#10b981'});
                    document.getElementById('zone-name').innerText = "未在服務區";
                    document.getElementById('loc-status').innerHTML = '<i class="fa-solid fa-triangle-exclamation text-rose-500 mr-1"></i> 定位失敗';
                }
            },
            () => { Swal.fire({icon: 'error', title: '定位權限遭拒', text: '請開啟 GPS 定位權限', confirmButtonColor: '#10b981'}); },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function startListeningDrivers() {
        if (!myCurrentZone) return;

        db.ref('drivers').on('value', snapshot => {
            const data = snapshot.val();
            if (!data) return;

            let zoneQueueCars = [];
            let nearbyEmptyCars = [];
            const userLatLng = new google.maps.LatLng(myLat, myLng);

            Object.keys(data).forEach(key => {
                if (ignoredDrivers.includes(key)) return; 
                const d = data[key];
                if (d.status !== 'online') return;

                d.id = key;
                const dLatLng = new google.maps.LatLng(d.lat, d.lng);

                if (d.workStatus === 'queue') {
                    if (zonePolygons[myCurrentZone] && google.maps.geometry.poly.containsLocation(dLatLng, zonePolygons[myCurrentZone])) {
                        zoneQueueCars.push(d);
                    }
                }
                else if (d.workStatus === 'empty') {
                    let dist = google.maps.geometry.spherical.computeDistanceBetween(userLatLng, dLatLng);
                    if (dist <= 3000) { 
                        d.dist = dist;
                        nearbyEmptyCars.push(d);
                    }
                }
            });

            if (zoneQueueCars.length > 0) {
                zoneQueueCars.sort((a, b) => (a.queueTime || Date.now()) - (b.queueTime || Date.now()));
                bestDriver = zoneQueueCars[0];
                updateUI('A', zoneQueueCars.length);
            } 
            else if (nearbyEmptyCars.length > 0) {
                nearbyEmptyCars.sort((a, b) => a.dist - b.dist);
                bestDriver = nearbyEmptyCars[0];
                updateUI('B', nearbyEmptyCars.length);
            } 
            else {
                bestDriver = null;
                updateUI('C', 0);
            }
        });
    }

    function updateUI(state, count) {
        currentState = state;
        const btn = document.getElementById('main-btn');
        const title = document.getElementById('btn-title');
        const sub = document.getElementById('btn-subtitle');
        const display = document.getElementById('vehicle-count-display');
        
        btn.className = 'btn-call'; 

        if (state === 'A') {
            btn.classList.add('btn-state-a');
            title.innerHTML = '<i class="fa-solid fa-bolt text-yellow-300 mr-1"></i> 呼叫首部排班車';
            sub.innerText = `🟢 本區有 ${count} 台專車待命，秒速接駕`;
            display.innerHTML = `<span class="text-emerald-400 font-black text-lg">${count}</span> 台車輛待命中`;
        } 
        else if (state === 'B') {
            btn.classList.add('btn-state-b');
            title.innerHTML = '<i class="fa-solid fa-truck-fast text-sky-300 mr-1"></i> 呼叫鄰近支援車';
            sub.innerText = `🔵 正在為您從市區調派，預計 5-8 分鐘`;
            display.innerHTML = `<span class="text-sky-400 font-black text-lg">${count}</span> 台鄰近空車可支援`;
        } 
        else if (state === 'C') {
            btn.classList.add('btn-state-c');
            title.innerHTML = '<i class="fa-solid fa-phone-volume text-rose-400 mr-1"></i> 撥打總台專線';
            sub.innerText = `🔴 目前全線滿載，由總台人工為您派車`;
            display.innerHTML = `<span class="text-rose-400 font-bold">目前現場車輛較多，建議使用預約功能</span>`;
        }
    }

    async function triggerDispatch() {
        if (currentState === 'DISABLED') return;
        
        if (currentState === 'C') {
            window.location.href = 'tel:+886976981123';
            return;
        }

        if (!passengerPhone) {
            const { value: phone } = await Swal.fire({
                title: '📱 輸入手機號碼',
                text: '僅需填寫一次，方便司機抵達時聯繫您',
                input: 'tel',
                inputPlaceholder: '例如：0912345678',
                confirmButtonColor: '#10b981',
                confirmButtonText: '確定',
                allowOutsideClick: false,
                inputValidator: (value) => {
                    if (!/^09\d{8}$/.test(value.replace(/\D/g, ''))) return '請輸入正確的 10 碼手機號碼';
                }
            });
            if (phone) {
                passengerPhone = phone.replace(/\D/g, '');
                localStorage.setItem('passengerPhone', passengerPhone);
            } else {
                return; 
            }
        }

        executeDispatchLoop();
    }

    let dispatchInterval;
    let dispatchTimeout;
    
    function executeDispatchLoop() {
        if (!bestDriver) {
            Swal.fire({icon: 'warning', title: '目前無車', text: '請撥打總台專線調度', confirmButtonColor: '#10b981'});
            return;
        }

        const targetId = bestDriver.id;
        const requestRef = db.ref(`drivers/${targetId}/request`);

        document.getElementById('lock-overlay').style.display = 'flex';
        let sec = 15;
        document.getElementById('lock-countdown').innerText = sec;
        
        dispatchInterval = setInterval(() => {
            sec--;
            document.getElementById('lock-countdown').innerText = sec;
        }, 1000);

        // 寫入任務
        requestRef.set({
            lat: myLat, lng: myLng,
            userId: passengerId,
            userName: "排班區乘客",
            userPhone: passengerPhone,
            pickup: myCurrentZone + " (排班叫車)",
            dropoff: "依乘客指示",
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });

        // 🚀 關鍵修復 A：補回 GAS 觸發器，讓後台知道有這筆單，負責建立 Firestore 乘車紀錄與預約總表
        fetch(GAS_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ source: 'web_app', driverId: targetId }) 
        }).catch(err => console.log('GAS Trigger Error:', err));

        const driverRef = db.ref(`drivers/${targetId}`);
        let requestSent = false;

        // 監聽司機動態
        driverRef.on('value', snap => {
            const dData = snap.val();
            if(!dData) return;

            // 司機接單
            if (dData.workStatus === 'busy' || dData.workStatus === 'arrived') {
                clearTimeout(dispatchTimeout);
                clearInterval(dispatchInterval);
                driverRef.off('value');
                
                document.getElementById('lock-overlay').innerHTML = `
                    <i class="fa-solid fa-circle-check text-emerald-400 text-7xl mb-4"></i>
                    <div class="lock-text">司機已接單</div>
                    <div class="text-white text-lg mt-2">車牌號碼：<b class="text-yellow-400 text-2xl ml-2">${dData.carNo || '專車'}</b></div>
                    <div class="text-rose-400 font-bold mt-6 text-sm bg-rose-900/30 px-4 py-2 rounded-lg border border-rose-500/50">⚠️ 請在原地等候，勿關閉此網頁或離開現場</div>
                `;
            }
            // 🚀 關鍵修復 B：防呆拒接判定。當司機按下「無法承接」時，request 節點會直接消失。
            else {
                if (requestSent && (!dData.request || dData.request.status === 'rejected')) {
                    handleMissedOrder(targetId, requestRef, driverRef);
                }
            }
            requestSent = true;
        });

        dispatchTimeout = setTimeout(() => {
            handleMissedOrder(targetId, requestRef, driverRef);
        }, 15000);
    }

    function handleMissedOrder(targetId, requestRef, driverRef) {
        clearTimeout(dispatchTimeout);
        clearInterval(dispatchInterval);
        driverRef.off('value');
        
        requestRef.remove();
        
        db.ref(`drivers/${targetId}`).update({ workStatus: 'offline', status: 'offline' });
        ignoredDrivers.push(targetId);

        setTimeout(() => {
            if (currentState === 'C' || !bestDriver) {
                document.getElementById('lock-overlay').style.display = 'none';
                Swal.fire({
                    icon: 'warning', 
                    title: '現場車輛忙碌中', 
                    html: '目前前線車輛皆未能及時接單<br>建議您撥打總台專線由人工調派。',
                    confirmButtonColor: '#10b981',
                    confirmButtonText: '撥打總機'
                }).then(() => { window.location.href = 'tel:+886976981123'; });
            } else {
                executeDispatchLoop();
            }
        }, 1000); 
    }

    window.addEventListener('load', () => {
        if(typeof google !== 'undefined') {
            processPolygons();
            locateUser();
        }
    });

  </script>
