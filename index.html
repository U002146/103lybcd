<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>學銘專車：花蓮敬老愛心接送 // v10.0 終極形象官網版</title>
  
  <!-- SEO 與分享標籤 -->
  <meta name="description" content="花蓮敬老愛心車隊 - 免報路名、一鍵定位、在地長輩最安心的選擇！提供即時叫車與預約接送服務。">
  <meta property="og:title" content="學銘專車：花蓮敬老愛心接送">
  <meta property="og:description" content="給長輩最安心的乘車體驗！一鍵叫車、免報路名，立刻點擊開啟雷達！">
  
  <!-- UI 套件 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { background-color: #f3f4f6; font-family: -apple-system, 'Noto Sans TC', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
    
    /* 隱藏捲軸但保持順滑滾動 */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    html { scroll-behavior: smooth; }
    
    /* 底部安全區 (iOS) */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    
    /* 呼吸燈特效：吸引點擊 */
    @keyframes pulse-shadow {
      0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(22, 163, 74, 0); }
      100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
    }
    .btn-pulse { animation: pulse-shadow 2s infinite; }
    
    /* 圖片防破圖美化 */
    img { position: relative; }
    img::after {
      content: "圖片載入中..."; display: flex; justify-content: center; align-items: center;
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #f3f4f6; color: #9ca3af; font-weight: bold; font-size: 14px;
    }
    
    .swal2-popup { border-radius: 24px !important; font-family: 'Noto Sans TC', sans-serif !important; }
  </style>
</head>
<body class="bg-gray-100 pb-28">

  <!-- 📱 手機版面容器 (維持 App 體驗感) -->
  <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative overflow-hidden">
    
    <!-- 🟢 頂部導航列 -->
    <header class="bg-green-600 text-white p-4 sticky top-0 z-40 shadow-md flex justify-between items-center">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-taxi text-2xl"></i>
        <h1 class="text-xl font-black tracking-wide">學銘專車</h1>
      </div>
      <button onclick="shareWebsite()" class="bg-white/20 hover:bg-white/30 rounded-full w-10 h-10 flex justify-center items-center transition-colors">
        <i class="fa-solid fa-share-nodes"></i>
      </button>
    </header>

    <!-- 🎯 Hero 區塊：第一眼行銷轉換 -->
    <div class="p-6 text-center bg-gradient-to-b from-green-50 to-white">
      <h2 class="text-2xl font-black text-gray-800 mb-2 leading-snug">花蓮敬老愛心接送服務</h2>
      <p class="text-gray-600 font-bold mb-5 text-sm">免報路名 ‧ 一鍵定位 ‧ 長輩最安心</p>
      
      <!-- 主力轉換按鈕 -->
      <a href="https://liff.line.me/2008907691-CzDqd7mm" class="inline-flex items-center justify-center w-full bg-green-500 text-white font-black text-xl py-4 rounded-2xl shadow-lg border-2 border-green-400 active:scale-95 transition-transform btn-pulse">
        <i class="fa-solid fa-location-crosshairs mr-2 text-2xl"></i> 立即開啟叫車雷達
      </a>
      <p class="text-xs text-gray-400 mt-3 font-bold"><i class="fa-solid fa-shield-halved"></i> 系統將透過 LINE 安全登入</p>
    </div>

    <!-- 📖 圖文型錄展示區 (000.jpg ~ 006.jpg) -->
    <div class="px-4 pb-6 space-y-5">
      
      <div class="flex items-center justify-center gap-3 mb-6 mt-2">
        <div class="h-1 w-12 bg-gray-200 rounded-full"></div>
        <div class="text-gray-400 font-black text-sm tracking-widest">服務亮點介紹</div>
        <div class="h-1 w-12 bg-gray-200 rounded-full"></div>
      </div>

      <!-- 圖片容器 (加入圓角與陰影，提升質感) -->
      <img src="https://u002146.github.io/103lybcd/photos/000.jpg" alt="智慧預約與定位服務" class="w-full rounded-2xl shadow-[0_8px_20px_rgba(0,0,0,0.1)] border border-gray-100 object-cover" onerror="imgError(this)">
      <img src="https://u002146.github.io/103lybcd/photos/001.jpg" alt="規劃行程與確認送出" class="w-full rounded-2xl shadow-[0_8px_20px_rgba(0,0,0,0.1)] border border-gray-100 object-cover" onerror="imgError(this)">
      <img src="https://u002146.github.io/103lybcd/photos/002.jpg" alt="輕鬆預約指南" class="w-full rounded-2xl shadow-[0_8px_20px_rgba(0,0,0,0.1)] border border-gray-100 object-cover" onerror="imgError(this)">
      <img src="https://u002146.github.io/103lybcd/photos/003.jpg" alt="定期接送預約" class="w-full rounded-2xl shadow-[0_8px_20px_rgba(0,0,0,0.1)] border border-gray-100 object-cover" onerror="imgError(this)">
      <img src="https://u002146.github.io/103lybcd/photos/004.jpg" alt="專屬司機資訊" class="w-full rounded-2xl shadow-[0_8px_20px_rgba(0,0,0,0.1)] border border-gray-100 object-cover" onerror="imgError(this)">
      <img src="https://u002146.github.io/103lybcd/photos/005.jpg" alt="隨時隨地輕鬆叫車" class="w-full rounded-2xl shadow-[0_8px_20px_rgba(0,0,0,0.1)] border border-gray-100 object-cover" onerror="imgError(this)">
    
    </div>

    <!-- 底部品牌宣告 -->
    <div class="text-center py-6 bg-gray-50 text-gray-400 text-xs font-bold border-t border-gray-100">
      <p>Copyright © 花蓮敬老愛心車隊 (劉學銘)</p>
      <p class="mt-1">Designed for AgeTech & Easy Booking</p>
    </div>

  </div>

  <!-- 🚨 黏性轉換區 (Sticky CTA) - 永遠浮動在畫面最下方 -->
  <div class="fixed bottom-0 left-0 right-0 w-full z-50 bg-white/95 backdrop-blur-md border-t border-gray-200 shadow-[0_-10px_30px_rgba(0,0,0,0.1)] pb-safe">
    <div class="max-w-md mx-auto px-4 py-3 flex gap-3">
      
      <!-- 客服按鈕 (左側，佔比 1) -->
      <a href="https://lin.ee/9Davl6e" class="flex-1 bg-gradient-to-br from-orange-400 to-orange-500 text-white flex flex-col items-center justify-center py-2.5 rounded-2xl font-bold shadow-md active:scale-95 transition-transform border border-orange-300">
        <i class="fa-solid fa-headset text-xl mb-1"></i>
        <span class="text-xs">線上客服</span>
      </a>
      
      <!-- 叫車按鈕 (右側，佔比 2，最具吸引力) -->
      <a href="https://liff.line.me/2008907691-CzDqd7mm" class="flex-[2.5] bg-gradient-to-br from-green-500 to-green-600 text-white flex flex-col items-center justify-center py-2.5 rounded-2xl font-black shadow-[0_4px_15px_rgba(22,163,74,0.4)] border-2 border-green-400 active:scale-95 transition-transform btn-pulse">
        <div class="flex items-center gap-2">
          <i class="fa-solid fa-bolt text-2xl text-yellow-300"></i>
          <span class="text-xl tracking-wider">立即叫車</span>
        </div>
        <span class="text-[10px] text-green-100 font-normal mt-0.5">免下載APP ‧ LINE直接叫車</span>
      </a>
      
    </div>
  </div>

  <script>
    // 圖片載入失敗時的美化處理
    function imgError(image) {
      image.onerror = null;
      image.src = "https://placehold.co/800x500/f3f4f6/9ca3af?text=圖片準備中\\n(請確認檔名為 "+ image.src.split('/').pop() +")";
    }

    // Web Share API 分享功能
    function shareWebsite() {
      const shareData = {
        title: '學銘專車：花蓮敬老愛心接送',
        text: '給長輩最安心的乘車體驗！免報路名、一鍵定位，點擊網址立即叫車🚕',
        url: window.location.href
      }

      if (navigator.share) {
        navigator.share(shareData)
          .catch((error) => console.log('分享取消或失敗', error));
      } else {
        // 若瀏覽器不支援，使用 SweetAlert 提示複製網址
        Swal.fire({
          title: '分享給親朋好友',
          text: '請點擊下方按鈕複製本站網址',
          icon: 'info',
          confirmButtonText: '<i class="fa-solid fa-copy"></i> 複製網址',
          confirmButtonColor: '#00C853',
        }).then((result) => {
          if (result.isConfirmed) {
            navigator.clipboard.writeText(window.location.href);
            Swal.fire({ icon: 'success', title: '複製成功！', timer: 1500, showConfirmButton: false });
          }
        });
      }
    }

    // 進站歡迎提示 (非侵入式，滑動一段距離後才顯示，或停留 10 秒後顯示)
    let hasShownWelcome = false;
    window.addEventListener('scroll', () => {
      if (!hasShownWelcome && window.scrollY > 300) {
        hasShownWelcome = true;
        const Toast = Swal.mixin({
          toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
          timerProgressBar: true, customClass: { popup: 'rounded-xl' }
        });
        Toast.fire({ icon: 'info', title: '滑到底部，隨時可以點擊「立即叫車」喔！' });
      }
    });
  </script>
</body>
</html>
