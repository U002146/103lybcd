<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>敬老愛心計程車 - 人事管理後台 // v7.2 一鍵編輯快充版</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  
  <!-- UI 套件 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { background-color: #f3f4f6; font-family: -apple-system, Roboto, sans-serif; padding-bottom: 50px; }
    .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    /* 隱藏捲軸但保持可滑動 */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    
    /* 編輯提示閃爍效果 */
    @keyframes highlight-form {
      0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
      50% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
      100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }
    .highlight-active { animation: highlight-form 1s ease-out; }
  </style>
</head>
<body class="p-4">

  <div class="max-w-md mx-auto space-y-6">
    
    <!-- 🏆 區塊一：營運排行榜 (含封鎖數與歷史快照車號) -->
    <div class="bg-white rounded-2xl p-5 card-shadow">
      <h2 class="text-xl font-black text-gray-800 mb-4 border-b pb-2 flex items-center">
        <i class="fa-solid fa-trophy text-amber-500 mr-2"></i>本月營運排行榜
      </h2>
      <div class="overflow-hidden rounded-xl border border-gray-200">
        <table class="w-full text-center text-sm">
          <thead class="bg-gray-50 text-gray-600 font-bold border-b">
            <tr>
              <th class="py-3 px-2 w-12">排名</th>
              <th class="py-3 px-2 text-left">司機資訊</th>
              <th class="py-3 px-1"><i class="fa-solid fa-check-square text-green-500 text-lg"></i><br>成功</th>
              <th class="py-3 px-1"><i class="fa-solid fa-xmark-square text-red-500 text-lg"></i><br>取消</th>
              <th class="py-3 px-1"><i class="fa-solid fa-ban text-gray-500 text-lg"></i><br>封鎖</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body" class="divide-y divide-gray-100 bg-white">
            <tr><td colspan="5" class="py-4 text-gray-400"><i class="fa-solid fa-spinner fa-spin"></i> 數據載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 🚫 區塊二：黑名單解鎖中心 -->
    <div class="bg-white rounded-2xl p-5 card-shadow border-t-4 border-red-500">
      <h2 class="text-xl font-black text-red-600 mb-4 border-b pb-2">
        <i class="fa-solid fa-ban mr-2"></i>黑名單解鎖中心
      </h2>
      <div id="blacklist-container" class="space-y-3">
        <div class="text-center text-green-600 font-bold py-4"><i class="fa-solid fa-face-smile text-xl mb-2"></i><br>目前沒有任何黑名單乘客</div>
      </div>
    </div>

    <!-- 👮‍♂️ 區塊三：新增/修改司機 -->
    <div id="form-container" class="bg-white rounded-2xl p-5 card-shadow border-t-4 border-blue-500 rounded-lg transition-all">
      <h2 class="text-xl font-black text-gray-800 mb-4 border-b pb-2">
        <i class="fa-solid fa-user-plus text-blue-500 mr-2"></i>新增 / 編輯司機
      </h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">LINE ID (系統唯一識別碼)</label>
          <input type="text" id="input-id" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 font-bold focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例如: U1234567890abcdef...">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">姓名 (暱稱)</label>
          <input type="text" id="input-name" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 font-bold focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例如: 學銘">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">車牌號碼</label>
            <input type="text" id="input-car" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 font-bold focus:ring-2 focus:ring-blue-500 outline-none" placeholder="TDP-1123">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">手機號碼</label>
            <input type="tel" id="input-phone" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 font-bold focus:ring-2 focus:ring-blue-500 outline-none" placeholder="09XX-XXX-XXX">
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">大頭照網址 (URL)</label>
          <input type="text" id="input-photo" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 font-bold focus:ring-2 focus:ring-blue-500 outline-none" placeholder="https://...">
        </div>
        <button onclick="saveDriver()" class="w-full bg-blue-600 text-white font-black text-lg py-4 rounded-xl shadow-lg active:scale-95 transition-transform mt-2">
          <i class="fa-solid fa-save mr-2"></i>儲存司機資料
        </button>
      </div>
    </div>

    <!-- 📋 區塊四：現有司機名單 (含停權機制) -->
    <div class="bg-white rounded-2xl p-5 card-shadow">
      <h2 class="text-xl font-black text-gray-800 mb-4 border-b pb-2 flex justify-between items-center">
        <span><i class="fa-solid fa-clipboard-list text-amber-600 mr-2"></i>現有司機名單</span>
        <span id="driver-count-badge" class="bg-amber-100 text-amber-800 text-sm py-1 px-3 rounded-full font-bold">載入中</span>
      </h2>
      <div id="driver-list-container" class="space-y-3">
        <!-- 司機卡片動態載入區 -->
      </div>
    </div>

  </div>

  <script>
    const VERSION = "v7.2"; // 🚀 一鍵編輯快充版
    
    // 🔥 Firebase 設定 
    const firebaseConfig = { 
        databaseURL: "https://hualientaxi-bb32f-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "hualientaxi-bb32f" 
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    const firestoreDb = firebase.firestore();

    let globalDriversData = {}; // 🚀 用來暫存司機資料，供編輯帶入使用

    window.onload = () => {
      fetchLeaderboard();
      listenToBlacklist();
      listenToDrivers();
    };

    // ==========================================
    // 1. 🏆 營運排行榜邏輯 
    // ==========================================
    async function fetchLeaderboard() {
      const now = new Date();
      const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
      const startTimestamp = firebase.firestore.Timestamp.fromDate(startOfMonth);

      try {
        const snapshot = await firestoreDb.collection('trips')
            .where('timestamp', '>=', startTimestamp)
            .get();

        const stats = {};
        
        snapshot.forEach(doc => {
          const data = doc.data();
          const dId = data.driverId;
          if(!dId) return;
          
          if(!stats[dId]) {
            stats[dId] = { 
                id: dId, 
                name: data.driverName || '未知司機', 
                car: data.carNo || '', 
                success: 0, 
                cancel: 0, 
                block: 0 
            };
          } else {
             if (!stats[dId].name || stats[dId].name === '未知司機') stats[dId].name = data.driverName || stats[dId].name;
             if (!stats[dId].car) stats[dId].car = data.carNo || '';
          }
          
          if (data.isBlacklist === true || data.status === 'blacklisted') {
            stats[dId].block += 1;
          } else if (data.status === 'completed') {
            stats[dId].success += 1;
          } else if (data.status === 'cancelled' || data.status === 'rejected') {
            stats[dId].cancel += 1;
          }
        });

        const dbSnap = await db.ref('drivers').once('value');
        const rtdbData = dbSnap.val() || {};
        
        let sortedDrivers = Object.values(stats).map(s => {
          if (rtdbData[s.id]) {
            s.name = rtdbData[s.id].name || s.name;
            s.car = rtdbData[s.id].carNo || rtdbData[s.id].car || s.car;
          }
          return s;
        });

        sortedDrivers.sort((a, b) => b.success - a.success);
        renderLeaderboard(sortedDrivers);

      } catch (e) {
        console.error("抓取排行榜失敗", e);
        document.getElementById('leaderboard-body').innerHTML = `<tr><td colspan="5" class="py-4 text-red-500 font-bold">權限錯誤或尚未建立索引</td></tr>`;
      }
    }

    function renderLeaderboard(drivers) {
      const tbody = document.getElementById('leaderboard-body');
      if(drivers.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="py-6 text-gray-500 font-bold">本月尚無任何訂單紀錄</td></tr>`;
        return;
      }

      let html = '';
      const medals = ['🥇', '🥈', '🥉'];
      
      drivers.forEach((d, index) => {
        const rankStr = index < 3 ? `<span class="text-2xl">${medals[index]}</span>` : `<span class="font-bold text-gray-500 text-lg">${index + 1}</span>`;
        const carStr = d.car ? `<div class="text-xs text-gray-500 font-bold mt-1 bg-gray-100 rounded px-1 inline-block">${d.car}</div>` : `<div class="text-xs text-gray-400 mt-1">無車號紀錄</div>`;
        
        html += `
          <tr class="hover:bg-amber-50 transition-colors border-b border-gray-100">
            <td class="py-3">${rankStr}</td>
            <td class="py-3 text-left pl-2">
                <div class="font-black text-gray-800 text-base">${d.name}</div>
                ${carStr}
            </td>
            <td class="py-3 font-black text-green-600 text-lg">${d.success}</td>
            <td class="py-3 font-bold text-red-400">${d.cancel}</td>
            <td class="py-3 font-bold text-gray-400">${d.block}</td>
          </tr>
        `;
      });
      tbody.innerHTML = html;
    }

    // ==========================================
    // 2. 🚫 黑名單中心邏輯
    // ==========================================
    function listenToBlacklist() {
      firestoreDb.collection('blacklists').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
        const container = document.getElementById('blacklist-container');
        if (snapshot.empty) {
          container.innerHTML = `<div class="text-center text-green-600 font-bold py-4 bg-green-50 rounded-xl border border-green-200"><i class="fa-solid fa-face-smile text-2xl mb-2"></i><br>目前沒有任何黑名單乘客</div>`;
          return;
        }

        let html = '';
        snapshot.forEach(doc => {
          const id = doc.id;
          const data = doc.data();
          const dateStr = data.timestamp ? data.timestamp.toDate().toLocaleString('zh-TW', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '未知時間';
          
          html += `
            <div class="flex justify-between items-center bg-red-50 p-3 rounded-xl border border-red-100">
              <div class="overflow-hidden">
                <div class="font-bold text-red-800 text-sm truncate">ID: ${id}</div>
                <div class="text-xs text-red-500 mt-1"><i class="fa-regular fa-clock"></i> 封鎖時間: ${dateStr}</div>
              </div>
              <button onclick="unlockBlacklist('${id}')" class="ml-2 bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg shadow-sm whitespace-nowrap active:scale-95 transition-transform">
                特赦解鎖
              </button>
            </div>
          `;
        });
        container.innerHTML = html;
      });
    }

    function unlockBlacklist(userId) {
      Swal.fire({
        title: '確定要特赦此乘客？',
        text: "解鎖後，該乘客將可以再次使用敬老愛心計程車系統。",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#10B981',
        cancelButtonColor: '#6B7280',
        confirmButtonText: '是的，解除封鎖',
        cancelButtonText: '取消'
      }).then((result) => {
        if (result.isConfirmed) {
          firestoreDb.collection('blacklists').doc(userId).delete().then(() => {
            Swal.fire({icon: 'success', title: '已特赦', text: '該乘客已從黑名單移除', timer: 1500, showConfirmButton: false});
          });
        }
      });
    }

    // ==========================================
    // 3. 👮‍♂️ 司機資料管理 (新增編輯與帶入機制)
    // ==========================================
    
    // 🚀 載入資料到編輯框
    function loadDriverToForm(driverId) {
      const d = globalDriversData[driverId];
      if (!d) return;

      // 填入資料
      document.getElementById('input-id').value = driverId;
      document.getElementById('input-name').value = d.name || '';
      document.getElementById('input-car').value = d.carNo || d.car || '';
      document.getElementById('input-phone').value = d.phone || '';
      document.getElementById('input-photo').value = d.photo || '';

      // 滑動到編輯區並閃爍提示
      const formContainer = document.getElementById('form-container');
      formContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
      
      formContainer.classList.add('highlight-active');
      setTimeout(() => {
        formContainer.classList.remove('highlight-active');
      }, 1000);
    }

    function saveDriver() {
      const id = document.getElementById('input-id').value.trim();
      const name = document.getElementById('input-name').value.trim();
      const car = document.getElementById('input-car').value.trim();
      const phone = document.getElementById('input-phone').value.trim();
      const photo = document.getElementById('input-photo').value.trim();

      if(!id || !name) {
        Swal.fire({ icon: 'error', title: '資料不完整', text: '請至少輸入 LINE ID 與姓名' });
        return;
      }

      db.ref('drivers/' + id).update({
        name: name,
        carNo: car,
        phone: phone,
        photo: photo || 'https://cdn-icons-png.flaticon.com/512/3237/3237472.png',
        isSuspended: firebase.database.ServerValue.increment(0)
      }).then(() => {
        db.ref('drivers/' + id + '/isSuspended').transaction(current => {
          return current === null ? false : current;
        });

        Swal.fire({ icon: 'success', title: '儲存成功', text: '司機資料已同步更新', timer: 1500, showConfirmButton: false });
        
        document.getElementById('input-id').value = '';
        document.getElementById('input-name').value = '';
        document.getElementById('input-car').value = '';
        document.getElementById('input-phone').value = '';
        document.getElementById('input-photo').value = '';
      });
    }

    function listenToDrivers() {
      db.ref('drivers').on('value', snapshot => {
        const container = document.getElementById('driver-list-container');
        const badge = document.getElementById('driver-count-badge');
        
        if (!snapshot.exists()) {
          container.innerHTML = `<div class="text-center text-gray-500 font-bold py-4">目前沒有建立任何司機資料</div>`;
          badge.innerText = `0 人`;
          globalDriversData = {}; // 清空全域資料
          return;
        }

        const data = snapshot.val();
        globalDriversData = data; // 🚀 更新全域資料庫，供一鍵帶入使用

        let html = '';
        let count = 0;

        Object.keys(data).forEach(id => {
          const d = data[id];
          if(!d.name) return; 
          count++;
          
          const photoUrl = d.photo || 'https://cdn-icons-png.flaticon.com/512/3237/3237472.png';
          const isSuspended = d.isSuspended === true;
          
          const cardClass = isSuspended ? 'bg-gray-100 border-2 border-orange-400 opacity-80' : 'bg-white border border-gray-100';
          const nameTag = isSuspended ? `<span class="text-orange-600 bg-orange-100 text-xs px-2 py-1 rounded ml-2">已停權</span>` : '';

          html += `
            <div class="flex items-center p-3 rounded-xl shadow-sm ${cardClass}">
              <img src="${photoUrl}" class="w-14 h-14 rounded-full border-2 border-gray-200 object-cover flex-shrink-0" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3237/3237472.png'">
              <div class="ml-3 flex-1 overflow-hidden">
                <div class="font-black text-lg text-gray-800 flex items-center">${d.name} ${nameTag}</div>
                <div class="text-sm font-bold text-gray-600">${d.carNo || d.car || '無車牌'} | ${d.phone || '無電話'}</div>
                <div class="text-xs text-gray-400 truncate mt-1">ID: ${id}</div>
              </div>
              
              <div class="flex flex-col gap-2 ml-2">
                ${isSuspended 
                  ? `<button onclick="toggleSuspend('${id}', false, '${d.name}')" class="bg-green-500 text-white text-xs font-bold py-1.5 px-3 rounded-lg shadow active:scale-95"><i class="fa-solid fa-unlock mr-1"></i>復權</button>`
                  : `<button onclick="toggleSuspend('${id}', true, '${d.name}')" class="bg-orange-500 text-white text-xs font-bold py-1.5 px-3 rounded-lg shadow active:scale-95"><i class="fa-solid fa-lock mr-1"></i>停權</button>`
                }
                <!-- 🚀 編輯按鈕 -->
                <button onclick="loadDriverToForm('${id}')" class="bg-blue-100 text-blue-600 hover:bg-blue-500 hover:text-white text-xs font-bold py-1.5 px-3 rounded-lg transition-colors"><i class="fa-solid fa-pen"></i> 編輯</button>
                <button onclick="confirmDelete('${id}', '${d.name}')" class="bg-red-100 text-red-600 hover:bg-red-500 hover:text-white text-xs font-bold py-1.5 px-3 rounded-lg transition-colors"><i class="fa-solid fa-trash"></i> 刪除</button>
              </div>
            </div>
          `;
        });
        
        badge.innerText = `共 ${count} 人`;
        container.innerHTML = html;
      });
    }

    function toggleSuspend(driverId, toSuspend, driverName) {
      const actionText = toSuspend ? "停權" : "復權";
      const iconType = toSuspend ? "warning" : "info";
      
      Swal.fire({
        title: `確定要將 [${driverName}] ${actionText}？`,
        text: toSuspend ? "停權後，該司機將立即被強制下線且無法接單。" : "復權後，該司機可重新登入 APP 上線接單。",
        icon: iconType,
        showCancelButton: true,
        confirmButtonColor: toSuspend ? '#F97316' : '#10B981',
        cancelButtonColor: '#6B7280',
        confirmButtonText: `是的，執行${actionText}`,
        cancelButtonText: '取消'
      }).then((result) => {
        if (result.isConfirmed) {
          const updates = { isSuspended: toSuspend };
          if (toSuspend) {
            updates.status = 'offline';
            updates.workStatus = 'empty';
          }
          
          db.ref('drivers/' + driverId).update(updates).then(() => {
            Swal.fire({icon: 'success', title: `已成功${actionText}`, timer: 1500, showConfirmButton: false});
          });
        }
      });
    }

    function confirmDelete(driverId, driverName) {
      Swal.fire({
        title: `真的要徹底刪除 [${driverName}] 嗎？`,
        text: "這通常用於司機離職。這將刪除他所有基本資料，且動作不可復原！建議優先使用「停權」功能。",
        icon: 'error',
        showCancelButton: true,
        confirmButtonColor: '#EF4444',
        cancelButtonColor: '#9CA3AF',
        confirmButtonText: '確定離職刪除',
        cancelButtonText: '取消保留'
      }).then((result) => {
        if (result.isConfirmed) {
          db.ref('drivers/' + driverId).remove().then(() => {
            Swal.fire({icon: 'success', title: '已刪除', timer: 1500, showConfirmButton: false});
          });
        }
      });
    }
  </script>
</body>
</html>
