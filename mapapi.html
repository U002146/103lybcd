<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>定位叫車</title> 
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        input, select, textarea { font-size: 17px !important; }
        
        #edit-mode-banner { display: none; background: #FEF3C7; color: #D97706; text-align: center; padding: 8px; font-size: 13px; font-weight: bold; border-bottom: 1px solid #FDE68A; z-index: 40; position: relative; }

        #map-container { height: 45%; width: 100%; position: relative; z-index: 10; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        #map { width: 100%; height: 100%; }

        .center-marker { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%); z-index: 20; pointer-events: none; transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .center-marker.lifting { transform: translate(-50%, -120%); }
        .target-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 6px; height: 6px; background-color: rgba(0,0,0,0.3); border-radius: 50%; z-index: 19; pointer-events: none; }

        #control-panel { flex: 1; background-color: white; position: relative; z-index: 20; display: flex; flex-direction: column; overflow: hidden; border-top-left-radius: 24px; border-top-right-radius: 24px; margin-top: -20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); }
        .scroll-content { flex: 1; overflow-y: auto; padding: 24px; padding-bottom: 100px; }

        .input-group { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 12px 16px; transition: all 0.2s; display: flex; align-items: center; }
        .input-group:focus-within { border-color: #10b981; background-color: #fff; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        .input-icon { color: #64748b; font-size: 1.2rem; margin-right: 12px; width: 24px; text-align: center; }

        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #10B981; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .swal2-popup { border-radius: 24px !important; font-family: 'Noto Sans TC', sans-serif !important; padding-bottom: 20px !important;}
        .location-grid { max-height: 50vh; overflow-y: auto; padding: 4px; }
        .fa-spin-fast { animation: spin 1s linear infinite; }

        /* Google Maps Autocomplete 樣式 */
        .pac-container { border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); font-family: 'Noto Sans TC'; border: none; margin-top: 5px; padding: 5px; z-index: 1050; }
        .pac-item { padding: 12px 15px; cursor: pointer; font-size: 15px; border-top: 1px solid #f1f5f9; }
        .pac-item:hover { background-color: #f8fafc; }

        /* Time Picker CSS */
        #time-selector-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: flex-end; opacity: 0; transition: opacity 0.3s; }
        #time-selector-content { background: white; width: 100%; max-width: 500px; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 20px; padding-bottom: 40px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); max-height: 100vh; display: flex; flex-direction: column; }
        .date-tabs-container { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; }
        .date-tabs-container::-webkit-scrollbar { display: none; }
        .date-tab { flex: 0 0 auto; padding: 8px 16px; border-radius: 99px; background: #f1f5f9; color: #64748b; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .date-tab.active { background: #0f172a; color: white; box-shadow: 0 4px 10px rgba(15, 23, 42, 0.2); }
        .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-height: 300px; overflow-y: auto; }
        .time-btn { appearance: none; padding: 12px 0; border-radius: 12px; background: #ffffff; border: 1px solid #e2e8f0; color: #334155; font-weight: bold; text-align: center; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; justify-content: center; width: 100%; }
        .time-btn:active { transform: scale(0.95); background: #f8fafc; border-color: #94a3b8; }
        .time-btn.selected { background: #e0f2fe; border-color: #3b82f6; color: #1d4ed8; }
        .time-btn.disabled { opacity: 0.3; background: #f1f5f9; pointer-events: none; color: #94a3b8; }
        #minute-selection-view { flex-direction: column; }
    </style>
</head>
<body>

    <div id="loading-overlay" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="loader mb-4 w-12 h-12 border-4 text-emerald-500"></div>
        <p id="loading-text" class="text-gray-500 font-bold text-lg animate-pulse tracking-widest">系統連線中...</p>
        <button onclick="forceRemoveLoading()" class="mt-8 text-sm text-gray-300 underline">若卡住請點此</button>
    </div>

    <div id="edit-mode-banner"><i class="fa-solid fa-pen-to-square"></i> 訂單修改模式 <span id="order-id-display" class="font-mono text-[10px] opacity-50 ml-2 hidden"></span></div>

    <div id="map-container">
        <div id="map"></div>
        <div id="center-marker" class="center-marker flex flex-col items-center">
            <div id="marker-label" class="bg-slate-800 text-white text-[10px] font-bold px-3 py-1 rounded-full mb-1 shadow-lg tracking-wide opacity-90 transition-opacity">移動定位</div>
            <i class="fa-solid fa-location-dot text-5xl text-emerald-600 drop-shadow-xl filter contrast-125"></i>
        </div>
        <div class="target-crosshair"></div>
        <button id="btn-my-loc" onclick="panToCurrentLocation()" class="absolute bottom-8 right-4 bg-white w-12 h-12 rounded-full shadow-lg z-30 text-slate-700 active:bg-slate-100 active:scale-95 transition-all flex items-center justify-center border border-gray-100">
            <i id="icon-my-loc" class="fa-solid fa-crosshairs text-xl"></i>
        </button>
        <div id="liff-status-dot" class="absolute bottom-5 left-5 w-3 h-3 rounded-full bg-red-500 border-2 border-white shadow-md z-30" title="LIFF Status"></div>
    </div>

    <div id="control-panel">
        <div class="w-full flex justify-center pt-3 pb-1"><div class="w-12 h-1.5 bg-gray-200 rounded-full"></div></div>

        <div class="scroll-content space-y-5">
            <div class="text-center mb-2">
                <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mb-1">PICKUP LOCATION</p>
                <div class="flex items-center justify-center space-x-2">
                    <h2 id="address-text" class="text-xl font-bold text-slate-800 truncate max-w-[80%]">定位中...</h2>
                    <span class="text-xs bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-bold">上車</span>
                </div>
            </div>

            <div class="border-t border-gray-100 my-4"></div>

            <div class="space-y-4">
                <div class="input-group">
                    <i class="fa-solid fa-location-dot input-icon text-rose-500"></i>
                    <div class="flex-1">
                        <label class="block text-[10px] text-slate-400 font-bold uppercase">Drop-off (選填)</label>
                        <input type="text" id="dropoff" autocomplete="off" placeholder="未填則顯示：上車告知" class="w-full bg-transparent font-bold text-slate-800 outline-none text-lg">
                    </div>
                    <button onclick="estimateFare()" class="ml-2 bg-amber-50 text-amber-600 p-2 rounded-lg border border-amber-200 active:bg-amber-100 transition-colors shadow-sm flex items-center justify-center" style="min-width: 38px;" title="預估車資">
                        <i class="fa-solid fa-calculator text-sm"></i>
                    </button>
                    <button onclick="openPresetLocations()" class="ml-2 bg-slate-100 text-slate-500 p-2 rounded-lg active:bg-slate-200 transition-colors flex items-center justify-center" style="min-width: 38px;" title="常用地址">
                        <i class="fa-solid fa-star text-sm"></i>
                    </button>
                </div>

                <div class="input-group cursor-pointer relative" onclick="openModernTimeSelector()">
                    <i id="time-icon" class="fa-solid fa-clock input-icon text-blue-600"></i>
                    <div class="flex-1">
                        <label class="block text-[10px] text-slate-400 font-bold uppercase">Pickup Time</label>
                        <div class="flex items-center justify-between">
                            <span id="time-display" class="font-bold text-slate-800 text-lg">現在 (即時叫車)</span>
                            <div class="flex items-center space-x-2" onclick="event.stopPropagation(); openPaymentPicker();">
                                <span class="w-[1px] h-4 bg-gray-300"></span>
                                <div class="flex items-center bg-gray-100 px-2 py-1 rounded-md active:bg-gray-200 transition-colors">
                                    <i id="payment-icon-small" class="fa-solid fa-coins text-slate-500 text-xs mr-1"></i>
                                    <span id="payment-text-small" class="text-xs font-bold text-slate-600">現金</span>
                                    <i class="fa-solid fa-caret-down text-[10px] text-gray-400 ml-1"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" id="booking-mode" value="NOW">
                    <input type="hidden" id="booking-time-val" value="">
                    <input type="hidden" id="payment-value" value="現金">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-phone input-icon"></i>
                    <div class="flex-1">
                        <label class="block text-[10px] text-slate-400 font-bold uppercase">Phone Number</label>
                        <input type="tel" id="phone" placeholder="09xx-xxx-xxx" class="w-full bg-transparent font-bold text-slate-800 outline-none text-lg">
                    </div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 p-5 bg-white/90 backdrop-blur-sm border-t border-gray-100 flex gap-3 z-30">
            <button id="cancelOrderBtn" onclick="cancelOrder()" class="hidden w-[80px] bg-rose-50 text-rose-600 font-bold py-4 rounded-2xl active:scale-[0.95] transition-all text-lg border border-rose-100 flex-shrink-0 flex items-center justify-center">
                <i class="fa-solid fa-trash-can"></i>
            </button>
            <button id="submitBtn" onclick="submitOrder()" class="flex-1 w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl shadow-slate-300 active:scale-[0.98] transition-all text-xl flex items-center justify-center space-x-3">
                <i class="fa-solid fa-taxi"></i>
                <span id="submit-btn-text">確認叫車</span>
            </button>
        </div>
    </div>

    <div id="time-selector-modal" onclick="closeModernTimeSelector(event)">
        <div id="time-selector-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-100">
                <div class="flex items-baseline"><h3 class="text-xl font-bold text-slate-800 mr-2">選擇預約時間</h3></div>
                <button type="button" onclick="closeModernTimeSelector()" class="w-8 h-8 rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <button type="button" onclick="selectNowAndClose()" id="btn-quick-now" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold mb-4 flex items-center justify-center shadow-md active:scale-[0.98] transition-transform"><i class="fa-solid fa-bolt mr-2 text-yellow-400"></i> 現在出發 (即時)</button>
            
            <div class="text-xs text-gray-400 font-bold mb-2 uppercase tracking-wide">Or Schedule For Later</div>
            <div id="hour-selection-view"><div class="date-tabs-container" id="date-tabs-list"></div><div class="text-sm text-gray-500 mb-2 font-bold">選擇小時 (24H)</div><div class="time-grid" id="hour-grid"></div></div>
            <div id="minute-selection-view" class="hidden h-64"><div class="flex items-center mb-4"><button type="button" onclick="backToHourView()" class="mr-3 w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center text-gray-600 active:bg-gray-100"><i class="fa-solid fa-arrow-left"></i></button><span class="text-lg font-bold text-slate-800"><span id="selected-date-display" class="text-slate-500 mr-1 text-base"></span><span id="selected-hour-display" class="text-blue-600 text-2xl"></span><span class="text-slate-400">點</span></span></div><div class="text-sm text-gray-500 mb-2 font-bold">選擇分鐘 (5分間隔)</div><div class="grid grid-cols-4 gap-3" id="minute-grid-container"></div></div>
        </div>
    </div>

    <script>
        const VERSION = "v4.13"; // 🚀 軌跡對焦修復版：解決世界地圖 Bug
        const API_KEY = 'AIzaSyAIxc6PEhHgUs_A9lyRUg8dNbmwOpSamY8'; 
        const LIFF_ID = '2008907691-MAdAtfyf'; 
        const PROJECT_B_URL = 'https://liff.line.me/2008907691-1mAjwojZ'; 
        const BOOKING_GAS_URL = 'https://script.google.com/macros/s/AKfycbzVTtBzYxPy9g-WnaJPS_Q_8GnzmWDf4Kaw7nA8VeDfe6ykM5rV3C2MmMddMh3AG6c9/exec'; 

        const FARE_DAILY_LIMIT = 3;

        const PRESET_LOCATIONS = [
            {name:'常用地址 A',icon:'⭐',value:'FAV_ADDR_A'},
            {name:'常用地址 B',icon:'⭐',value:'FAV_ADDR_B'},
            {name:'花蓮前站',icon:'🚉',value:'花蓮火車站前站'},
            {name:'花蓮後站',icon:'🚉',value:'花蓮火車站後站'},
            {name:'慈濟醫院',icon:'🏥',value:'花蓮慈濟醫院'},
            {name:'門諾醫院',icon:'🏥',value:'花蓮門諾醫院'},
            {name:'花蓮縣政府',icon:'🏢',value:'花蓮縣政府'},
            {name:'遠東百貨',icon:'🛍️',value:'花蓮遠東百貨'}
        ];
        
        const PAYMENT_METHODS = [{id:'現金',label:'現金',icon:'fa-coins',color:'text-slate-600'},{id:'敬老卡',label:'敬老卡',sub:'(65歲+)',icon:'fa-person-cane',color:'text-orange-500'},{id:'愛心卡',label:'愛心卡',sub:'(身障)',icon:'fa-heart',color:'text-rose-500'},{id:'乘車券',label:'乘車券',icon:'fa-ticket',color:'text-blue-500'},{id:'TWRQ',label:'TWRQ',icon:'fa-qrcode',color:'text-purple-500'},{id:'LINE PAY',label:'LINE Pay',icon:'fa-brands fa-line',color:'text-green-500'},{id:'APPLE PAY',label:'Apple Pay',icon:'fa-brands fa-apple',color:'text-black'}];

        let map, geocoder, cachedPosition = null;
        let directionsService, directionsRenderer, dropoffAutocomplete;
        let currentCenter = { lat: 23.991, lng: 121.601 };
        let pickerState = { dateIndex: 0, hour: null, minute: null, dates: [] };
        const MAP_STYLES = [{ "featureType": "poi", "elementType": "labels.icon", "stylers": [{ "visibility": "off" }] }, { "featureType": "poi", "elementType": "labels.text.fill", "stylers": [{ "color": "#757575" }] }, { "featureType": "road", "elementType": "geometry.fill", "stylers": [{ "color": "#ffffff" }] }, { "featureType": "road", "elementType": "geometry.stroke", "stylers": [{ "color": "#e0e0e0" }] }];
        
        let userName = "乘客"; 
        let passengerId = "unknown";

        const urlParams = new URLSearchParams(window.location.search);
        const editOrderId = urlParams.get('orderId');

        window.onload = function() {
            setTimeout(forceRemoveLoading, 5000); 
            
            if (navigator.geolocation && !editOrderId) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        cachedPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        if (map) { map.setCenter(cachedPosition); currentCenter = cachedPosition; }
                    },
                    () => console.warn("GPS Pending"), { enableHighAccuracy: true, timeout: 5000 }
                );
            }
            
            const savedPhone = localStorage.getItem('taxi_user_phone');
            if(savedPhone) document.getElementById('phone').value = savedPhone;
            const savedPayment = localStorage.getItem('taxi_selected_payment');
            if(savedPayment) { const method = PAYMENT_METHODS.find(m => m.label === savedPayment); if(method) updatePaymentUI(method.label, method.icon, method.color); }

            initLiff();
            loadGoogleMaps();
        };

        function forceRemoveLoading() { 
            const overlay = document.getElementById('loading-overlay'); 
            if (overlay && overlay.style.display !== 'none') {
                overlay.style.opacity = '0'; 
                setTimeout(() => { if(overlay) overlay.style.display = 'none'; }, 500); 
            }
        }

        function loadGoogleMaps() {
            if (API_KEY.includes('請在此填入') || API_KEY === '') { Swal.fire({ icon: 'error', title: '系統設定錯誤', text: '請填入 API KEY', confirmButtonColor: '#10b981' }); forceRemoveLoading(); return; }
            const mapScript = document.createElement('script');
            mapScript.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&language=zh-TW&libraries=places,geometry&callback=initMap`;
            mapScript.async = true; mapScript.defer = true;
            mapScript.onerror = () => { Swal.fire({ icon: 'error', title: '連線錯誤', text: '地圖載入失敗，請檢查網路連線', confirmButtonColor: '#10b981' }); forceRemoveLoading(); };
            document.head.appendChild(mapScript);
        }

        window.initMap = function() {
            geocoder = new google.maps.Geocoder();
            directionsService = new google.maps.DirectionsService();
            // 🚀 核心修復 1：preserveViewport 設為 true，禁止 Google 亂縮放
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map, suppressMarkers: false, preserveViewport: true,
                polylineOptions: { strokeColor: '#00C853', strokeWeight: 5, strokeOpacity: 0.8 }
            });

            const startPos = cachedPosition || currentCenter;
            map = new google.maps.Map(document.getElementById("map"), { center: startPos, zoom: 17, disableDefaultUI: true, clickableIcons: false, styles: MAP_STYLES, gestureHandling: 'greedy' });
            directionsRenderer.setMap(map);

            const options = { componentRestrictions: { country: "tw" } };
            dropoffAutocomplete = new google.maps.places.Autocomplete(document.getElementById('dropoff'), options);
            dropoffAutocomplete.setFields(['formatted_address', 'geometry']);

            if (!editOrderId) {
                if (!cachedPosition) panToCurrentLocation(); else { geocodePosition(startPos); forceRemoveLoading(); }
            }

            map.addListener('dragstart', () => { 
                if(directionsRenderer) directionsRenderer.set('directions', null);
                document.getElementById('center-marker').style.display = 'flex';
                
                document.getElementById('center-marker').classList.add('lifting'); 
                document.getElementById('marker-label').style.opacity = '0'; 
                document.getElementById('address-text').innerHTML = '<span class="text-gray-400">定位中...</span>'; 
                if (navigator.vibrate) navigator.vibrate(5); 
            });
            
            map.addListener('idle', () => { 
                document.getElementById('center-marker').classList.remove('lifting'); 
                document.getElementById('marker-label').style.opacity = '1'; 
                if (navigator.vibrate) navigator.vibrate(10); 
                const center = map.getCenter(); 
                currentCenter = { lat: center.lat(), lng: center.lng() }; 
                geocodePosition(map.getCenter()); 
            });
        };

        function geocodePosition(pos) {
            geocoder.geocode({ location: pos }, (results, status) => {
                if (status === "OK" && results[0]) {
                    let addr = results[0].formatted_address.replace(/^\d+\s*/, '').replace(/台灣/, '').replace(/.*?區/, (m) => m + ' ');
                    document.getElementById('address-text').innerText = addr;
                }
            });
        }

        function panToCurrentLocation() {
            const icon = document.getElementById('icon-my-loc'); icon.classList.add('fa-spin-fast');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const newPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    if(map) { 
                        if(directionsRenderer) directionsRenderer.set('directions', null);
                        document.getElementById('center-marker').style.display = 'flex';
                        map.panTo(newPos); map.setZoom(17); 
                    }
                    currentCenter = newPos;
                    icon.classList.remove('fa-spin-fast'); if (navigator.vibrate) navigator.vibrate([20, 50, 20]);
                }, (e) => { 
                    icon.classList.remove('fa-spin-fast');
                    Swal.fire({
                        icon: 'warning', title: '⚠️ 無法取得位置',
                        html: '系統目前抓不到您的所在位置。<br><br>請前往手機設定，確認 LINE 或瀏覽器的<b>【位置資訊 (GPS)】</b>已設為<b>「使用期間允許」</b>，否則司機無法找到您喔！<br><br>設定完成後請重新整理網頁。',
                        confirmButtonColor: '#10b981', confirmButtonText: '我知道了'
                    });
                }, { enableHighAccuracy: true, timeout: 5000 });
            } else { 
                icon.classList.remove('fa-spin-fast');
                Swal.fire({ icon: 'error', title: '不支援 GPS', text: '您的裝置不支援 GPS 定位功能。', confirmButtonColor: '#10b981' }); 
            }
        }

        async function initLiff() {
            try { 
                await liff.init({ liffId: LIFF_ID }); 
                if(liff.isLoggedIn()) {
                    document.getElementById('liff-status-dot').classList.remove('bg-red-500'); 
                    document.getElementById('liff-status-dot').classList.add('bg-green-500');
                    const profile = await liff.getProfile();
                    userName = profile.displayName;
                    passengerId = profile.userId;
                } else {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }
                
                checkEditModeAndLoad();
                
            } catch (e) { 
                console.error('LIFF Init Failed:', e); 
                checkEditModeAndLoad();
            }
        }

        function checkEditModeAndLoad() {
            if (editOrderId) {
                document.getElementById('edit-mode-banner').style.display = 'block';
                document.getElementById('submit-btn-text').innerText = '儲存修改';
                document.getElementById('cancelOrderBtn').classList.remove('hidden');
                document.getElementById('btn-quick-now').style.display = 'none'; 
                document.getElementById('loading-text').innerText = '載入訂單資料中...';

                fetch(BOOKING_GAS_URL + "?orderId=" + editOrderId)
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'success' && data.data) {
                            const d = data.data;
                            
                            if (d.orderStatus === '❌ 已取消' || d.orderStatus === 'cancelled') {
                                forceRemoveLoading();
                                Swal.fire({
                                    icon: 'warning', title: '⚠️ 此預約已取消', text: '這筆預約先前已經取消囉！如有需要請重新叫車。',

        function getRemainingQuota() {
            const today = new Date().toISOString().split('T')[0]; 
            let usageData = JSON.parse(localStorage.getItem('fareCalcUsage_Map')) || { date: today, count: 0 };
            if (usageData.date !== today) { usageData = { date: today, count: 0 }; localStorage.setItem('fareCalcUsage_Map', JSON.stringify(usageData)); }
            return Math.max(0, FARE_DAILY_LIMIT - usageData.count);
        }

        function recordUsage() {
            const today = new Date().toISOString().split('T')[0];
            let usageData = JSON.parse(localStorage.getItem('fareCalcUsage_Map')) || { date: today, count: 0 };
            usageData.count++; localStorage.setItem('fareCalcUsage_Map', JSON.stringify(usageData));
        }

        function calculateOfficialFare(meters, seconds, isNight) {
            let fare = 100; 
            const idleSeconds = seconds * 0.2; 
            if (isNight) {
                if (meters > 834) { fare += Math.ceil((meters - 834) / 192) * 5; }
                fare += Math.floor(idleSeconds / 100) * 5;
            } else {
                if (meters > 1000) { fare += Math.ceil((meters - 1000) / 230) * 5; }
                fare += Math.floor(idleSeconds / 120) * 5;
            }
            return Math.round(fare / 5) * 5;
        }

        function estimateFare() {
            if (typeof google === 'undefined' || !directionsService) {
                Swal.fire('系統載入中', '地圖服務尚未準備好，請稍後再試。', 'warning'); return;
            }

            const remaining = getRemainingQuota();
            if (remaining <= 0) {
                Swal.fire({ icon: 'warning', title: '今日額度用盡', text: `您今日的預估次數已達 ${FARE_DAILY_LIMIT} 次上限。請直接確認叫車，司機會按跳錶為您服務！`, confirmButtonColor: '#10b981' }); 
                return;
            }

            const dropoff = document.getElementById('dropoff').value.trim();
            if (!dropoff || dropoff === "上車告知 / 未指定") {
                Swal.fire({ icon: 'warning', title: '缺少下車點', text: '請輸入目的地才能計算路線與車資喔！', confirmButtonColor: '#10b981' }); 
                return;
            }

            Swal.fire({ title: '路線繪製與計算中...', text: `今日剩餘 ${remaining} 次估算額度`, allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

            const request = { origin: currentCenter, destination: dropoff, travelMode: 'DRIVING' };

            directionsService.route(request, (result, status) => {
                if (status == 'OK') {
                    recordUsage(); 
                    
                    directionsRenderer.setDirections(result);
                    document.getElementById('center-marker').style.display = 'none';

                    // 🚀 核心修復 2：手動抓取路線邊界，並完美置中聚焦，上下左右各留 40px 的安全距離
                    const bounds = result.routes[0].bounds;
                    map.fitBounds(bounds, { top: 40, bottom: 40, left: 40, right: 40 });

                    const route = result.routes[0].legs[0];
                    const distanceMeters = route.distance.value; 
                    const durationSeconds = route.duration.value; 
                    
                    const currentHour = new Date().getHours();
                    const isNight = (currentHour >= 22 || currentHour < 6);
                    const modeTag = isNight ? '(夜間費率)' : '(日間費率)';
                    
                    const yellowFare = calculateOfficialFare(distanceMeters, durationSeconds, isNight);

                    Swal.fire({
                        title: '💰 預估車資結果',
                        html: `
                            <div style="text-align: left; background: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 10px;">
                                <div style="margin-bottom: 12px; color: #64748b; font-size: 14px; font-weight: bold;">
                                    行車距離與時間<br>
                                    <span style="color: #1e293b; font-size: 18px;">${route.distance.text} / ${route.duration.text}</span>
                                </div>
                                <div style="border-top: 1px solid #e2e8f0; padding-top: 12px;">
                                    <div style="display: flex; justify-content: space-between; align-items: center; color: #d97706; font-weight: bold; font-size: 16px;">
                                        <span><i class="fa-solid fa-taxi"></i> 標準小黃 ${modeTag}</span>
                                        <span style="font-size: 22px;">~NT$ ${yellowFare}</span>
                                    </div>
                                </div>
                                <div style="margin-top: 10px; font-size: 11px; color: #94a3b8; text-align: center;">
                                    此為參考金額，實際收費以跳表為準<br>今日剩餘估算次數：${getRemainingQuota()} 次
                                </div>
                            </div>
                        `,
                        confirmButtonColor: '#0f172a',
                        confirmButtonText: '確定',
                        customClass: { popup: 'rounded-[24px]' }
                    });

                } else {
                    Swal.fire('找不到路線', '無法計算此路線，請嘗試輸入更完整的目的地（例如加上縣市）。', 'error');
                }
            });
        }

        function generateDates() { 
            const dates = []; const today = new Date(); const weekDays = ['日','一','二','三','四','五','六']; 
            for(let i=0; i<7; i++) { 
                const d = new Date(today); d.setDate(today.getDate() + i); 
                const m = (d.getMonth()+1).toString(); const day = d.getDate().toString(); 
                const w = weekDays[d.getDay()]; 
                const label = i === 0 ? '今天' : (i === 1 ? '明天' : `${m}/${day}`); 
                dates.push({ val: i, label: label, sub: i > 1 ? `週${w}` : '', fullDate: `${m}月${day}日`, gasDate: `${m}/${day}` }); 
            } return dates; 
        }

                    await liff.sendMessages([flexMsg]);
                    liff.closeWindow(); 
                } else {
                    Swal.fire({ icon: 'info', title: '外部測試', text: `訂單已送出，請在 LINE 內開啟。` });
                    btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-taxi mr-2"></i>確認叫車';
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: '發送失敗', text: e.message });
                btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-taxi mr-2"></i>確認叫車';
            }
        }
    </script>
</body>
</html>
