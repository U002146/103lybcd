<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>常用地址預約</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        input, select, textarea { font-size: 17px !important; }
        
        .main-container { flex: 1; padding: 16px 20px 120px 20px; max-width: 600px; margin: 0 auto; width: 100%; }
        
        .booking-card { background: white; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); padding: 20px; margin-bottom: 20px; border: 1px solid #f1f5f9; }
        
        .location-inputs { position: relative; border: 1px solid #e2e8f0; border-radius: 20px; background: #f8fafc; }
        .loc-row { display: flex; align-items: center; padding: 16px; transition: all 0.2s; }
        .loc-row:focus-within { background: #ffffff; box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2); border-radius: 20px; }
        .loc-divider { height: 1px; background: #e2e8f0; margin: 0 16px; }
        
        .btn-swap { position: absolute; top: 50%; right: 16px; transform: translateY(-50%); width: 40px; height: 40px; background: white; border: 1px solid #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #64748b; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.2s; z-index: 10; }
        .btn-swap:active { transform: translateY(-50%) scale(0.9); background: #f1f5f9; }

        .input-group { background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 12px 16px; transition: all 0.2s; display: flex; align-items: center; margin-bottom: 16px; }
        .input-group:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .input-icon { width: 24px; text-align: center; margin-right: 12px; }

        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #10B981; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .swal2-popup { border-radius: 24px !important; font-family: 'Noto Sans TC', sans-serif !important; padding-bottom: 20px !important;}
        .location-grid { max-height: 50vh; overflow-y: auto; padding: 4px; }

        #time-selector-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: flex-end; opacity: 0; transition: opacity 0.3s; }
        
        #time-selector-content { 
            background: white; width: 100%; max-width: 600px; height: 100dvh; 
            padding: 20px; padding-top: max(20px, env(safe-area-inset-top)); padding-bottom: max(20px, env(safe-area-inset-bottom)); 
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); 
            display: flex; flex-direction: column; 
        }

        .date-tabs-container { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; scrollbar-width: none; }
        .date-tabs-container::-webkit-scrollbar { display: none; }
        .date-tab { flex: 0 0 auto; padding: 10px 18px; border-radius: 16px; background: #f1f5f9; color: #64748b; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .date-tab.active { background: #eff6ff; color: #1d4ed8; border-color: #3b82f6; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.15); }
        
        .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .time-btn { appearance: none; padding: 14px 0; border-radius: 12px; background: #ffffff; border: 1px solid #e2e8f0; color: #334155; font-weight: bold; text-align: center; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; justify-content: center; width: 100%; font-size: 16px; }
        .time-btn:active { transform: scale(0.95); background: #f8fafc; border-color: #94a3b8; }
        .time-btn.selected { background: #e0f2fe; border-color: #3b82f6; color: #1d4ed8; box-shadow: 0 2px 8px rgba(59,130,246,0.2); }
        .time-btn.disabled { opacity: 0.35; background: #f8fafc; pointer-events: none; color: #94a3b8; border-color: #e2e8f0; }
        
        #edit-mode-banner { display: none; background: #FEF3C7; color: #D97706; text-align: center; padding: 8px; font-size: 13px; font-weight: bold; border-bottom: 1px solid #FDE68A; }
    </style>
</head>
<body>

    <div id="loading-overlay" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center">
        <div class="loader mb-4 w-12 h-12 border-4 text-emerald-500"></div>
        <p id="loading-text" class="text-slate-600 font-bold text-lg tracking-widest animate-pulse">系統連線中...</p>
    </div>

    <div id="edit-mode-banner"><i class="fa-solid fa-pen-to-square"></i> 訂單修改模式</div>

    <div id="app" class="hidden flex-col min-h-screen">
        <div class="main-container">
            <div class="booking-card !mt-2">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest flex items-center">
                        📍 行程設定
                        <div id="liff-status-dot" class="ml-2 w-2 h-2 rounded-full bg-red-500 transition-colors duration-300"></div>
                    </h2>
                    <span id="order-id-display" class="text-xs text-slate-400 font-mono hidden"></span>
                </div>
                
                <div class="location-inputs">
                    <div class="loc-row relative">
                        <i class="fa-solid fa-circle-dot text-emerald-500 text-lg mr-4 w-5 text-center"></i>
                        <div class="flex-1 mr-12">
                            <label class="block text-[10px] text-slate-400 font-bold uppercase mb-1">Pickup (上車點)</label>
                            <input type="text" id="pickup" placeholder="請輸入或選擇上車地址" class="w-full bg-transparent font-bold text-slate-800 outline-none text-lg">
                        </div>
                        <button onclick="openPresetLocations('pickup')" class="absolute right-4 p-3 -mr-3 text-yellow-400 active:scale-90 transition-transform"><i class="fa-solid fa-star text-xl drop-shadow-sm"></i></button>
                    </div>

                    <div class="loc-divider"></div>

                    <button onclick="swapLocations()" class="btn-swap" title="起訖點對調">
                        <i class="fa-solid fa-arrow-right-arrow-left rotate-90 text-slate-500"></i>
                    </button>

                    <div class="loc-row relative">
                        <i class="fa-solid fa-location-dot text-rose-500 text-xl mr-4 w-5 text-center"></i>
                        <div class="flex-1 mr-12">
                            <label class="block text-[10px] text-slate-400 font-bold uppercase mb-1">Drop-off (下車點 • 選填)</label>
                            <input type="text" id="dropoff" placeholder="未填則顯示：上車告知" class="w-full bg-transparent font-bold text-slate-800 outline-none text-lg">
                        </div>
                        <button onclick="openPresetLocations('dropoff')" class="absolute right-4 p-3 -mr-3 text-yellow-400 active:scale-90 transition-transform"><i class="fa-solid fa-star text-xl drop-shadow-sm"></i></button>
                    </div>
                </div>
            </div>

            <div class="booking-card">
                <div class="input-group cursor-pointer relative !bg-blue-50/50 !border-blue-100" onclick="openModernTimeSelector()">
                    <i id="time-icon" class="fa-solid fa-calendar-check input-icon text-blue-600 text-xl"></i>
                    <div class="flex-1">
                        <label class="block text-[10px] text-blue-500 font-bold uppercase">Pickup Time (用車時間)</label>
                        <div class="flex items-center justify-between mt-1">
                            <span id="time-display" class="font-bold text-slate-400 text-lg">請點擊選擇時間</span>
                            
                            <div class="flex items-center space-x-2" onclick="event.stopPropagation(); openPaymentPicker();">
                                <span class="w-[1px] h-5 bg-blue-200"></span>
                                <div class="flex items-center bg-white px-2 py-1.5 rounded-md border border-blue-100 shadow-sm active:bg-blue-50 transition-colors">
                                    <i id="payment-icon-small" class="fa-solid fa-coins text-slate-600 text-xs mr-1.5"></i>
                                    <span id="payment-text-small" class="text-xs font-bold text-slate-700">現金</span>
                                    <i class="fa-solid fa-caret-down text-[10px] text-gray-400 ml-1.5"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" id="booking-time-val" value="">
                    <input type="hidden" id="payment-value" value="現金">
                </div>

                <div class="input-group !mb-0">
                    <i class="fa-solid fa-phone input-icon text-slate-400"></i>
                    <div class="flex-1">
                        <label class="block text-[10px] text-slate-400 font-bold uppercase">Phone (聯絡電話)</label>
                        <input type="tel" id="phone" placeholder="09xx-xxx-xxx" class="w-full bg-transparent font-bold text-slate-800 outline-none text-lg">
                    </div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-5 bg-white/95 backdrop-blur-md border-t border-gray-100 z-30 max-w-[600px] mx-auto flex gap-3">
            <button id="cancelOrderBtn" onclick="cancelOrder()" class="hidden w-[80px] bg-rose-50 text-rose-600 font-bold py-4 rounded-2xl active:scale-[0.95] transition-all text-lg border border-rose-100 flex-shrink-0 flex items-center justify-center">
                <i class="fa-solid fa-trash-can"></i>
            </button>
            <button id="submitBtn" onclick="submitOrder()" class="flex-1 bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl shadow-slate-300 active:scale-[0.98] transition-all text-xl flex items-center justify-center space-x-3">
                <i class="fa-solid fa-paper-plane"></i>
                <span id="submit-btn-text">確認送出預約</span>
            </button>
        </div>
    </div>

    <!-- 滿版時間選擇器 Modal -->
    <div id="time-selector-modal" onclick="closeModernTimeSelector(event)">
        <div id="time-selector-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-5 flex-shrink-0">
                <h3 class="text-2xl font-black text-slate-800 tracking-wide">選擇用車時間</h3>
                <button type="button" onclick="closeModernTimeSelector()" class="w-10 h-10 rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 flex items-center justify-center text-lg"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div id="hour-selection-view" class="flex-1 flex flex-col min-h-0 overflow-y-auto pr-1">
                <div class="mb-5 flex-shrink-0">
                    <div class="text-xs text-emerald-600 font-bold mb-2 uppercase tracking-wide flex items-center"><i class="fa-solid fa-calendar-day mr-1"></i> 1. 選擇日期</div>
                    <div class="date-tabs-container" id="date-tabs-list"></div>
                </div>

                <div class="mb-5 flex-shrink-0">
                    <div class="text-xs text-emerald-600 font-bold mb-2 uppercase tracking-wide flex items-center"><i class="fa-solid fa-clock mr-1"></i> 2. 選擇小時 (24H)</div>
                    <div class="time-grid pb-10" id="hour-grid"></div>
                </div>
            </div>

            <div id="minute-selection-view" class="hidden flex-1 flex-col min-h-0 overflow-y-auto pr-1">
                <div class="flex items-center mb-6 flex-shrink-0 border-b border-gray-100 pb-4">
                    <button type="button" onclick="backToHourView()" class="mr-4 w-12 h-12 rounded-full border border-gray-200 flex items-center justify-center text-gray-600 active:bg-gray-100 transition-colors shadow-sm">
                        <i class="fa-solid fa-arrow-left text-xl"></i>
                    </button>
                    <div>
                        <div class="text-xs text-slate-400 font-bold mb-0.5 uppercase tracking-wider">已選日期 / 小時</div>
                        <div class="text-xl font-bold text-blue-600">
                            <span id="selected-date-display"></span> 
                            <span id="selected-hour-display"></span> 點
                        </div>
                    </div>
                </div>

                <div class="mb-4 flex-shrink-0">
                    <div class="text-xs text-emerald-600 font-bold mb-2 uppercase tracking-wide flex items-center"><i class="fa-solid fa-stopwatch mr-1"></i> 3. 選擇出發分鐘</div>
                    <div class="time-grid pb-10" id="minute-grid-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const VERSION = "v4.5"; // 🚀 時間格式統一對齊版 (AI 秘書友善)
        const LIFF_ID = '2008907691-3P676tTN'; 
        const PROJECT_B_URL = 'https://liff.line.me/2008907691-1mAjwojZ'; 
        
        // 🚀 對接最新的 GAS 後端大腦
        const BOOKING_GAS_URL = 'https://script.google.com/macros/s/AKfycbzVTtBzYxPy9g-WnaJPS_Q_8GnzmWDf4Kaw7nA8VeDfe6ykM5rV3C2MmMddMh3AG6c9/exec'; 

        const PRESET_LOCATIONS = [
            {name:'我的最愛 A', icon:'⭐', value:'FAV_ADDR_A'}, {name:'我的最愛 B', icon:'⭐', value:'FAV_ADDR_B'},
            {name:'花蓮前站', icon:'🚉'}, {name:'花蓮後站', icon:'🚉'}, {name:'慈濟醫院', icon:'🏥'},
            {name:'門諾醫院', icon:'🏥'}, {name:'遠東百貨', icon:'🛍️'}, {name:'東大門夜市', icon:'🌭'}
        ];

        const PAYMENT_METHODS = [
            {id:'現金',label:'現金',icon:'fa-coins',color:'text-slate-600'}, {id:'敬老卡',label:'敬老卡',icon:'fa-person-cane',color:'text-orange-500'},
            {id:'愛心卡',label:'愛心卡',icon:'fa-heart',color:'text-rose-500'}, {id:'悠遊卡',label:'悠遊卡',icon:'fa-id-card',color:'text-blue-400'},
            {id:'信用卡',label:'信用卡',icon:'fa-credit-card',color:'text-indigo-500'}, {id:'LINE PAY',label:'LINE PAY',icon:'fa-brands fa-line',color:'text-green-500'},
            {id:'APPLE PAY',label:'APPLE PAY',icon:'fa-brands fa-apple',color:'text-black'}, {id:'TWQR',label:'TWQR',icon:'fa-qrcode',color:'text-purple-500'}
        ];

        let pickerState = { dateIndex: 0, hour: null, minute: null, dates: [] };
        let currentTargetInput = 'pickup';
        let userName = "乘客"; 
        let passengerId = "unknown";

        const urlParams = new URLSearchParams(window.location.search);
        const editOrderId = urlParams.get('orderId');

        window.onload = function() {
            const savedPhone = localStorage.getItem('taxi_user_phone');
            if(savedPhone) document.getElementById('phone').value = savedPhone;
            const savedPayment = localStorage.getItem('taxi_selected_payment');
            if(savedPayment) { 
                const method = PAYMENT_METHODS.find(m => m.label === savedPayment); 
                if(method) updatePaymentUI(method.label, method.icon, method.color); 
            }

            liff.init({ liffId: LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return; 
                }
                liff.getProfile().then(profile => {
                    userName = profile.displayName;
                    passengerId = profile.userId;
                    checkEditModeAndLoad();
                }).catch(err => { checkEditModeAndLoad(); });
            }).catch(err => {
                Swal.fire({ icon: 'error', title: '連線失敗', text: '無法連結 LINE 伺服器，請重新開啟。' });
            });
        };

        function checkEditModeAndLoad() {
            if (editOrderId) {
                document.getElementById('edit-mode-banner').style.display = 'block';
                document.getElementById('submit-btn-text').innerText = '儲存修改預約';
                document.getElementById('cancelOrderBtn').classList.remove('hidden');
                document.getElementById('loading-text').innerText = '載入訂單資料中...';

                fetch(BOOKING_GAS_URL + "?orderId=" + editOrderId)
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'success' && data.data) {
                            const d = data.data;
                            
                            if (d.orderStatus === '❌ 已取消' || d.orderStatus === 'cancelled') {
                                document.getElementById('loading-overlay').style.display = 'none'; 
                                
                                Swal.fire({
                                    icon: 'warning',
                                    title: '⚠️ 此預約已取消',
                                    text: '這筆預約先前已經取消囉！如有需要請回到聊天室重新建立新的預約。',
                                    confirmButtonColor: '#94a3b8',
                                    confirmButtonText: '我知道了',
                                    allowOutsideClick: false
                                }).then(() => {
                                    if (liff.isInClient()) {
                                        liff.closeWindow();
                                    } else {
                                        document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#94a3b8;font-weight:bold;background:#f8fafc;">此訂單已失效，請關閉視窗。</div>';
                                    }
                                });
                                return; 
                            }

                            document.getElementById('pickup').value = d.pickup;
                            document.getElementById('dropoff').value = d.dropoff === "上車告知 / 未指定" ? "" : d.dropoff;
                            
                            let loadedPhone = String(d.phone);
                            if (loadedPhone.length === 9 && loadedPhone.startsWith('9')) loadedPhone = '0' + loadedPhone;
                            document.getElementById('phone').value = loadedPhone;
                            
                            // 這裡載入的通常是後台紀錄的數字格式
                            let loadedTime = String(d.bookingTime);
                            
                            document.getElementById('booking-time-val').value = loadedTime;
                            const display = document.getElementById('time-display');
                            display.innerText = loadedTime;
                            display.classList.remove('text-slate-400');
                            display.classList.add('text-blue-700');
                            document.getElementById('time-icon').className = "fa-solid fa-calendar-check input-icon text-blue-600 text-xl";
                            
                            const method = PAYMENT_METHODS.find(m => m.label === d.payment) || PAYMENT_METHODS[0];
                            updatePaymentUI(method.label, method.icon, method.color);

                            unlockUI();
                        } else {
                            document.getElementById('loading-overlay').style.display = 'none';
                            Swal.fire('讀取失敗', '找不到該筆訂單或已被刪除', 'error').then(() => {
                                if(liff.isInClient()) liff.closeWindow();
                            });
                        }
                    })
                    .catch(err => {
                        document.getElementById('loading-overlay').style.display = 'none';
                        Swal.fire('連線錯誤', '無法讀取訂單資料', 'error').then(() => {
                            if(liff.isInClient()) liff.closeWindow();
                        });
                    });
            } else {
                unlockUI();
            }
        }

        function unlockUI() {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('app').classList.add('flex');
            document.getElementById('liff-status-dot').classList.replace('bg-red-500', 'bg-green-500');
        }

        function swapLocations() {
            const pickupEl = document.getElementById('pickup');
            const dropoffEl = document.getElementById('dropoff');
            const temp = pickupEl.value; pickupEl.value = dropoffEl.value; dropoffEl.value = temp;
            const inputs = document.querySelectorAll('.loc-row');
            inputs.forEach(el => { el.style.transform = 'scale(0.98)'; setTimeout(() => el.style.transform = 'scale(1)', 150); });
        }

        function openPresetLocations(target) { 
            currentTargetInput = target; 
            const targetName = target === 'pickup' ? '上車點' : '下車點';
            let html = '<div class="grid grid-cols-2 gap-3 mt-2 location-grid">'; 
            PRESET_LOCATIONS.forEach(loc => { 
                let bgClass = (loc.value && loc.value.includes('FAV')) ? 'bg-yellow-50 hover:bg-yellow-100 border-yellow-200' : 'bg-gray-50 hover:bg-slate-100 border-gray-100'; 
                html += `<button type="button" onclick="selectPreset('${loc.value || loc.name}', '${loc.name}')" class="flex flex-col items-center justify-center p-3 border rounded-xl transition-all active:scale-95 ${bgClass}"><span class="text-2xl mb-1">${loc.icon}</span><span class="text-sm font-bold text-slate-700">${loc.name}</span></button>`; 
            }); 
            html += '</div>'; 
            Swal.fire({ title: `快速選擇${targetName}`, html: html, showConfirmButton: false, showCloseButton: true, customClass: {popup: 'rounded-[24px]'} }); 
        }

        window.selectPreset = function(val, label) { 
            const input = document.getElementById(currentTargetInput); 
            if (val.includes('FAV')) { 
                const key = val === 'FAV_ADDR_A' ? 'taxi_fav_a' : 'taxi_fav_b'; 
                const savedAddr = localStorage.getItem(key); 
                if (savedAddr) { 
                    Swal.fire({ title: `📍 使用「${label}」？`, text: savedAddr, showDenyButton: true, confirmButtonText: '填入', denyButtonText: '修改地址', confirmButtonColor: '#10b981', denyButtonColor: '#94a3b8' }).then((r) => { 
                        if (r.isConfirmed) { input.value = savedAddr; Swal.close(); } else if (r.isDenied) { promptSave(key, label, input); } 
                    }); 
                } else { promptSave(key, label, input); } 
            } else { input.value = val; Swal.close(); } 
        };

        function promptSave(key, label, input) { 
            Swal.fire({ title: `設定${label}`, input: 'text', inputPlaceholder: '請輸入完整地址...', showCancelButton: true, confirmButtonText: '記憶並套用', confirmButtonColor: '#0f172a' }).then((r) => { 
                if (r.isConfirmed && r.value) { localStorage.setItem(key, r.value); input.value = r.value; Swal.fire({ icon: 'success', title: '已記憶！', timer: 1000, showConfirmButton: false }); } 
            }); 
        }

        function openPaymentPicker() { 
            let html = '<div class="grid grid-cols-2 gap-3 mt-2 location-grid">'; 
            const currentVal = document.getElementById('payment-value').value; 
            PAYMENT_METHODS.forEach(m => { 
                let activeClass = m.label === currentVal ? 'border-slate-800 bg-slate-900 text-white ring-2 ring-slate-200' : 'bg-white border-gray-200 text-slate-600 hover:bg-gray-50'; 
                let iconColor = m.label === currentVal ? 'text-white' : m.color; 
                html += `<button type="button" onclick="selectPaymentMethod('${m.label}', '${m.icon}', '${m.color}')" class="flex flex-col items-center justify-center p-4 border rounded-2xl transition-all active:scale-95 ${activeClass}"><i class="fa-solid ${m.icon} ${iconColor} text-2xl mb-2"></i><span class="text-sm font-bold">${m.label}</span></button>`; 
            }); 
            html += '</div>'; 
            Swal.fire({ title: '選擇付款方式', html: html, showConfirmButton: false, showCloseButton: true, customClass: {popup: 'rounded-[24px]'} }); 
        }
        
        window.selectPaymentMethod = function(label, iconClass, colorClass) { 
            updatePaymentUI(label, iconClass, colorClass); 
            localStorage.setItem('taxi_selected_payment', label); 
            Swal.close(); 
        }
        
        function updatePaymentUI(label, iconClass, colorClass) { 
            document.getElementById('payment-value').value = label; 
            document.getElementById('payment-text-small').innerText = label; 
            const iconElem = document.getElementById('payment-icon-small'); 
            iconElem.className = `fa-solid ${iconClass} text-xs mr-1.5`; 
            if(label !== '現金') iconElem.classList.add(colorClass.split(' ')[0]); 
        }

        function generateDates() { 
            const dates = []; const today = new Date(); const weekDays = ['日','一','二','三','四','五','六']; 
            for(let i=0; i<7; i++) { 
                const d = new Date(today); d.setDate(today.getDate() + i); d.setHours(0,0,0,0);
                const m = (d.getMonth()+1).toString(); const day = d.getDate().toString(); const w = weekDays[d.getDay()]; 
                const label = i === 0 ? '今天' : (i === 1 ? '明天' : `${m}/${day}`); 
                // 🚀 加入 gasDate 給 AI 秘書判讀
                dates.push({ val: i, label: label, sub: i > 1 ? `週${w}` : '', fullDate: `${m}月${day}日`, gasDate: `${m}/${day}`, rawDate: d }); 
            } return dates; 
        }
        
        function openModernTimeSelector() { 
            const modal = document.getElementById('time-selector-modal'); 
            const content = document.getElementById('time-selector-content'); 
            pickerState.dates = generateDates(); pickerState.hour = null; pickerState.minute = null;
            document.getElementById('hour-selection-view').classList.remove('hidden'); document.getElementById('hour-selection-view').classList.add('flex');
            document.getElementById('minute-selection-view').classList.add('hidden'); document.getElementById('minute-selection-view').classList.remove('flex');
            renderDateTabs(); renderHourGrid(); 
            modal.style.display = 'flex'; setTimeout(() => { modal.style.opacity = '1'; content.style.transform = 'translateY(0)'; }, 10); 
        }

        function closeModernTimeSelector(e) { 
            if(e && e.target.id !== 'time-selector-modal' && !e.target.closest('button')) return; 
            const modal = document.getElementById('time-selector-modal'); const content = document.getElementById('time-selector-content'); 
            modal.style.opacity = '0'; content.style.transform = 'translateY(100%)'; 
            setTimeout(() => { modal.style.display = 'none'; }, 300); 
        }

        function renderDateTabs() { 
            const container = document.getElementById('date-tabs-list'); 
            container.innerHTML = pickerState.dates.map((d, idx) => ` 
                <div onclick="selectPickerDate(${idx})" class="date-tab ${idx === pickerState.dateIndex ? 'active' : ''}"> 
                    <div class="text-center leading-tight"> 
                        <div>${d.label}</div> ${d.sub ? `<div class="text-[10px] opacity-80 mt-1">${d.sub}</div>` : ''} 
                    </div> 
                </div> `).join(''); 
        }

        window.selectPickerDate = function(idx) { pickerState.dateIndex = idx; pickerState.hour = null; renderDateTabs(); renderHourGrid(); }

        function renderHourGrid() { 
            const container = document.getElementById('hour-grid'); 
            const minTime = new Date(new Date().getTime() + 30 * 60000); 
            const selectedDateObj = pickerState.dates[pickerState.dateIndex];
            let html = ''; 
            for(let h=0; h<24; h++) { 
                let disabled = ''; const testTime = new Date(selectedDateObj.rawDate); testTime.setHours(h, 59, 59); 
                if (testTime < minTime) { disabled = 'disabled'; }
                const selected = (pickerState.hour === h) ? 'selected' : ''; 
                html += `<button type="button" onclick="selectPickerHour(${h})" class="time-btn ${disabled} ${selected}">${h.toString().padStart(2, '0')}:00</button>`; 
            } container.innerHTML = html; 
        }

        window.selectPickerHour = function(h) { 
            pickerState.hour = h; 
            document.getElementById('hour-selection-view').classList.add('hidden'); document.getElementById('hour-selection-view').classList.remove('flex');
            document.getElementById('minute-selection-view').classList.remove('hidden'); document.getElementById('minute-selection-view').classList.add('flex');
            const dateObj = pickerState.dates[pickerState.dateIndex];
            document.getElementById('selected-date-display').innerText = dateObj.fullDate;
            document.getElementById('selected-hour-display').innerText = h.toString().padStart(2, '0');
            renderMinuteGrid(); document.getElementById('minute-selection-view').scrollTop = 0;
        }

        window.backToHourView = function() {
            document.getElementById('minute-selection-view').classList.add('hidden'); document.getElementById('minute-selection-view').classList.remove('flex');
            document.getElementById('hour-selection-view').classList.remove('hidden'); document.getElementById('hour-selection-view').classList.add('flex');
        }

        function renderMinuteGrid() { 
            const container = document.getElementById('minute-grid-container'); 
            const minTime = new Date(new Date().getTime() + 30 * 60000);
            const selectedDateObj = pickerState.dates[pickerState.dateIndex];
            let html = ''; 
            for(let m=0; m<60; m+=5) { 
                let disabled = ''; const testTime = new Date(selectedDateObj.rawDate); testTime.setHours(pickerState.hour, m, 0);
                if (testTime < minTime) { disabled = 'disabled'; }
                html += `<button type="button" onclick="selectMinute('${m.toString().padStart(2, '0')}')" class="time-btn text-lg ${disabled}">${m.toString().padStart(2, '0')} 分</button>`; 
            } container.innerHTML = html; 
        }

        window.selectMinute = function(m) { pickerState.minute = m; applyBookingTime(); closeModernTimeSelector(); }
        
        function applyBookingTime() { 
            const dateObj = pickerState.dates[pickerState.dateIndex]; 
            const hStr = pickerState.hour.toString().padStart(2, '0'); 
            
            // 🚀 畫面上給客人看的中文格式
            const timeStr = `${dateObj.fullDate} ${hStr}:${pickerState.minute}`; 
            
            // 🚀 送給 GAS 後台的 AI 判讀格式 (MM/DD)
            const gasTimeStr = `${dateObj.gasDate} ${hStr}:${pickerState.minute}`; 
            
            document.getElementById('booking-time-val').value = gasTimeStr; 
            
            const display = document.getElementById('time-display'); 
            display.innerText = timeStr; 
            display.classList.remove('text-slate-400'); display.classList.add('text-blue-700'); 
            document.getElementById('time-icon').className = "fa-solid fa-calendar-check input-icon text-blue-600 text-xl"; 
        }

        function generateOrderId() {
            const now = new Date();
            const md = String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
            const rnd = Math.floor(1000 + Math.random() * 9000);
            return `TDP-${md}-${rnd}`;
        }

        function cancelOrder() {
            // 從畫面上抓取中文時間顯示給客人看
            const displayTimeNode = document.getElementById('time-display').innerText;
            Swal.fire({
                title: '確定取消預約？', text: '取消後將同步通知司機。', icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#e3242b', cancelButtonColor: '#94a3b8',
                confirmButtonText: '確定取消', cancelButtonText: '保留預約'
            }).then((res) => {
                if(res.isConfirmed) {
                    Swal.fire({title: '處理中', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
                    fetch(BOOKING_GAS_URL, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ orderId: editOrderId, status: 'cancelled', timestamp: new Date().toISOString() })
                    }).then(() => {
                        if(liff.isInClient()) {
                            liff.sendMessages([{
                                type: 'text',
                                text: `❌ 已取消預約\n(原定時間：${displayTimeNode})`
                            }]).then(() => {
                                Swal.fire('已取消', '預約已成功取消。', 'success').then(() => liff.closeWindow());
                            });
                        } else {
                            Swal.fire('已取消', '預約已成功取消。', 'success');
                        }
                    }).catch(e => {
                        Swal.fire('發生錯誤', '取消失敗，請稍後再試。', 'error');
                    });
                }
            });
        }

        async function submitOrder() {
            if (!liff.isLoggedIn() && !liff.isInClient()) {
                return Swal.fire('尚未連線', '請重新整理頁面或在 LINE 內部開啟', 'error');
            }

            const phone = document.getElementById('phone').value;
            const pickup = document.getElementById('pickup').value.trim();
            let dropoff = document.getElementById('dropoff').value.trim();
            if (!dropoff) dropoff = "上車告知 / 未指定";
            const payment = document.getElementById('payment-value').value;
            const bookingTime = document.getElementById('booking-time-val').value;

            if(!pickup) return Swal.fire('請填寫上車點', '系統需要知道去哪接您', 'warning');
            if(!bookingTime) return Swal.fire('請選擇時間', '此專案為預約叫車，請指定用車時間', 'warning');
            if(!phone || phone.length < 8) return Swal.fire('請輸入電話', '請留下聯絡方式', 'warning');

            localStorage.setItem('taxi_user_phone', phone);
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loader mr-3 w-5 h-5 border-2 border-white border-t-transparent"></div> 處理中...';

            const currentOrderId = editOrderId || generateOrderId();
            const orderStatus = editOrderId ? "updated" : "new";
            const headerText = editOrderId ? "🔄 預約已更新" : "📅 預約確認";
            const headerColor = editOrderId ? "#EA580C" : "#1d4ed8";

            const orderPayload = {
                orderId: currentOrderId, userId: passengerId, userName: userName, phone: phone,
                pickup: pickup, dropoff: dropoff, payment: payment, bookingTime: bookingTime,
                status: orderStatus, timestamp: new Date().toISOString()
            };

            const mapBaseUrl = "https://www.google.com/maps/search/?api=1&query=";
            const googleMapUrl = mapBaseUrl + encodeURIComponent(pickup);
            const dropoffMapUrl = mapBaseUrl + encodeURIComponent(dropoff);
            
            // 給 LINE 卡片顯示的中文時間
            const displayTimeNode = document.getElementById('time-display').innerText;

            const flexMsg = {
                type: "flex",
                altText: `預約通知：${displayTimeNode}`,
                contents: {
                    type: "bubble",
                    styles: { header: { backgroundColor: "#FFFFFF" }, body: { backgroundColor: "#FFFFFF" }, footer: { backgroundColor: "#F8F8F8" } },
                    header: {
                        type: "box", layout: "horizontal", spacing: "sm", alignItems: "center",
                        contents: [ 
                            {
                                type: "box", layout: "vertical", flex: 1, spacing: "xs",
                                contents: [
                                    { type: "text", text: headerText, weight: "bold", size: "sm", color: headerColor },
                                    { type: "text", text: `${displayTimeNode}`, weight: "bold", size: "xl", color: "#111111", adjustMode: "shrink-to-fit" }
                                ]
                            },
                            {
                                type: "box", layout: "vertical", flex: 0, paddingAll: "8px", cornerRadius: "8px", backgroundColor: "#f1f5f9",
                                action: { type: "uri", label: "修改", uri: `https://liff.line.me/${LIFF_ID}?orderId=${currentOrderId}` },
                                contents: [
                                    { type: "text", text: "⚙️ 修改", size: "xs", color: "#64748b", weight: "bold", align: "center" }
                                ]
                            }
                        ],
                        paddingAll: "15px"
                    },
                    body: {
                        type: "box", layout: "vertical",
                        contents: [
                            {
                                type: "box", layout: "horizontal", margin: "md",
                                contents: [ { type: "text", text: "👤 乘客", flex: 2, color: "#888888", size: "md" }, { type: "text", text: userName, flex: 5, color: "#111111", size: "md", weight: "bold" } ]
                            },
                            { type: "separator", margin: "md", color: "#EEEEEE" },
                            {
                                type: "box", layout: "horizontal", margin: "md",
                                contents: [ { type: "text", text: "🟢 上車", flex: 2, color: "#888888", size: "md" }, { type: "text", text: pickup, flex: 5, color: "#111111", size: "md", wrap: true, action: { type: "uri", label: "導航", uri: googleMapUrl } } ]
                            },
                            { type: "separator", margin: "md", color: "#EEEEEE" },
                            {
                                type: "box", layout: "horizontal", margin: "md",
                                contents: [ { type: "text", text: "🔴 下車", flex: 2, color: "#888888", size: "md" }, { type: "text", text: dropoff, flex: 5, color: "#111111", size: "md", wrap: true, action: { type: "uri", label: "導航", uri: dropoffMapUrl } } ]
                            },
                            { type: "separator", margin: "lg", color: "#EEEEEE" },
                            {
                                type: "box", layout: "horizontal", margin: "lg",
                                contents: [ { type: "text", text: "📞 電話", flex: 2, color: "#888888", size: "md" }, { type: "text", text: phone, flex: 5, color: "#111111", size: "md", weight: "bold", action: { type: "uri", label: "撥號", uri: `tel:${phone}` } } ]
                            },
                            { type: "separator", margin: "lg", color: "#EEEEEE" },
                            {
                                type: "box", layout: "horizontal", margin: "lg",
                                contents: [ { type: "text", text: "💰 付款", flex: 2, color: "#888888", size: "md" }, { type: "text", text: payment, flex: 5, color: "#111111", size: "md", weight: "bold" } ]
                            }
                        ]
                    },
                    footer: {
                        type: "box", layout: "vertical", spacing: "sm", contents: [
                            {
                                type: "button", style: "primary", color: "#10B981", height: "sm",
                                action: { type: "uri", label: "👀 查看司機位置", uri: PROJECT_B_URL }
                            }
                        ]
                    }
                }
            };

            try {
                fetch(BOOKING_GAS_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderPayload)
                }).catch(e => console.error("GAS 寫入失敗", e));

                if (liff.isInClient()) {
                    await liff.sendMessages([flexMsg]);
                    liff.closeWindow(); 
                } else {
                    Swal.fire({ icon: 'info', title: '外部測試模式', text: `訂單已送出，請在 LINE 內開啟。` });
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i><span id="submit-btn-text">確認送出預約</span>';
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: '發送失敗', text: 'LINE API 回傳錯誤: ' + e.message });
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i><span id="submit-btn-text">確認送出預約</span>';
            }
        }
    </script>
</body>
</html>
