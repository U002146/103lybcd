<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>預估車資計算機</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script> 
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAIxc6PEhHgUs_A9lyRUg8dNbmwOpSamY8&libraries=places,geometry"></script>
  
  <style>
    body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
    
    .header-overlay { position: absolute; top: 0; left: 0; width: 100%; padding: 25px 20px 50px; background: linear-gradient(180deg, rgba(15,23,42,0.85) 0%, rgba(15,23,42,0) 100%); z-index: 10; pointer-events: none; }
    
    /* 底部抽屜 (Bottom Sheet) */
    #bottom-sheet { 
        position: absolute; bottom: 0; left: 0; width: 100%; 
        background: white; border-top-left-radius: 28px; border-top-right-radius: 28px; 
        box-shadow: 0 -10px 40px rgba(0,0,0,0.1); z-index: 20; 
        transition: transform 0.3s ease;
        height: 50vh;
        display: flex; flex-direction: column; padding: 20px 24px 24px 24px;
    }
    
    .drag-handle { width: 40px; height: 5px; background: #cbd5e1; border-radius: 5px; margin: 0 auto 15px auto; flex-shrink: 0; }
    
    /* 視圖容器 */
    #views-container { flex: 1; display: flex; flex-direction: column; position: relative; }
    #input-view, #result-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; transition: opacity 0.3s ease; }
    #input-view.hidden, #result-view.hidden { opacity: 0; pointer-events: none; }
    
    .input-row { display: flex; align-items: center; background: #f8fafc; border-radius: 16px; padding: 12px 16px; border: 1px solid #e2e8f0; transition: border-color 0.2s; }
    .input-row:focus-within { border-color: #00C853; background: #fff; box-shadow: 0 0 0 3px rgba(0,200,83,0.1); }
    .input-row input { flex: 1; background: transparent; border: none; outline: none; font-size: 16px; font-weight: bold; color: #1e293b; width: 100%; }
    .input-row input::placeholder { color: #94a3b8; font-weight: normal; font-size: 15px; }
    
    /* 🚀 針對唯讀的上車點加入視覺回饋 */
    .input-row input:read-only { color: #00C853; font-weight: 900; cursor: default; }
    .input-row.locked { background: #f0fdf4; border-color: #bbf7d0; }

    .btn-calc { background: linear-gradient(135deg, #00C853, #1B5E20); color: white; width: 100%; padding: 16px; border-radius: 16px; font-weight: 900; font-size: 18px; box-shadow: 0 6px 20px rgba(0, 200, 83, 0.3); border: none; cursor: pointer; transition: transform 0.1s; flex-shrink: 0; }
    .btn-calc:active { transform: scale(0.96); }
    
    /* 車資結果卡片 */
    .fare-card { border: 2px solid #f1f5f9; border-radius: 16px; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; flex: 1; transition: all 0.2s; }
    .fare-title { font-size: 16px; font-weight: bold; color: #334155; display: flex; align-items: center; gap: 10px; }
    .fare-price { font-size: 24px; font-weight: 900; color: #0f172a; }
    
    .fc-yellow { border-color: #fef3c7; background: #fffbeb; }
    .fc-yellow .fare-price { color: #d97706; }
    
    .fc-multi12 { border-color: #e0f2fe; background: #f0f9ff; }
    .fc-multi12 .fare-price { color: #0284c7; }
    
    .fc-multi14 { border-color: #ede9fe; background: #f5f3ff; }
    .fc-multi14 .fare-price { color: #7c3aed; }
    
    .pac-container { border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); font-family: 'Noto Sans TC'; border: none; margin-top: 5px; padding: 5px; z-index: 1050; }
    .pac-item { padding: 12px 15px; cursor: pointer; font-size: 15px; border-top: 1px solid #f1f5f9; }
    .pac-item:hover { background-color: #f8fafc; }
    .swal2-popup { border-radius: 24px !important; font-family: 'Noto Sans TC', sans-serif !important; }
  </style>
</head>
<body>

  <div class="header-overlay">
    <h1 class="text-2xl font-black text-white drop-shadow-md flex items-center gap-2">
      <i class="fa-solid fa-calculator text-emerald-400"></i> 預估車資
    </h1>
    <p class="text-sm text-slate-200 mt-1 font-bold drop-shadow" id="quota-display">精準估算・透明費率 (載入中...)</p>
  </div>

  <div id="map"></div>

  <div id="bottom-sheet">
    <div class="drag-handle"></div>
    
    <div id="views-container">
        
        <div id="input-view">
            <div class="text-xs text-slate-400 font-bold text-center tracking-wide flex items-center justify-center gap-1.5 bg-slate-50 py-2 rounded-lg border border-slate-100">
                <i class="fa-solid fa-circle-info text-slate-300"></i> 預估車資僅供參考，實際收費以跳錶為準
            </div>
            
            <div class="my-auto space-y-3 w-full">
                <div class="input-row locked" onclick="triggerGpsWarning()">
                    <i class="fa-solid fa-location-crosshairs text-emerald-500 w-6 text-center mr-2 text-lg"></i>
                    <input type="text" id="pickup-input" placeholder="自動定位目前位置..." readonly>
                    <button onclick="useMyLocation(); event.stopPropagation();" class="text-emerald-600 p-2 active:scale-90 bg-emerald-100 rounded-xl ml-2"><i class="fa-solid fa-rotate-right"></i></button>
                </div>
                
                <div class="input-row">
                    <i class="fa-solid fa-location-dot text-rose-500 w-6 text-center mr-2 text-lg"></i>
                    <input type="text" id="dropoff-input" placeholder="請輸入下車地點 (跨縣市可)">
                </div>
            </div>
            
            <button onclick="calculateFare()" class="btn-calc mt-auto">開始計算車資</button>
        </div>

        <div id="result-view" class="hidden">
            <div class="flex justify-between items-start mb-3 border-b border-slate-100 pb-3 flex-shrink-0">
                <div>
                    <div class="text-xs text-slate-400 font-bold mb-1">預估距離與時間</div>
                    <div class="text-xl font-black text-slate-800" id="route-meta">-- 公里 / -- 分鐘</div>
                </div>
                <button onclick="resetView()" class="text-slate-400 hover:text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-full w-10 h-10 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-arrow-down"></i>
                </button>
            </div>

            <div class="flex-1 flex flex-col gap-2.5 justify-center">
                <div class="fare-card fc-yellow">
                    <div class="fare-title"><i class="fa-solid fa-taxi text-amber-500 text-xl"></i> 標準小黃 (跳表)</div>
                    <div class="fare-price" id="fare-yellow">$--</div>
                </div>
                <div class="fare-card fc-multi12">
                    <div class="fare-title"><i class="fa-solid fa-car-side text-sky-500 text-xl"></i> 多元專車 (1.2倍)</div>
                    <div class="fare-price" id="fare-m12">$--</div>
                </div>
                <div class="fare-card fc-multi14">
                    <div class="fare-title"><i class="fa-solid fa-van-shuttle text-violet-500 text-xl"></i> 尊榮六座 (1.4倍)</div>
                    <div class="fare-price" id="fare-m14">$--</div>
                </div>
            </div>
        </div>

    </div>
  </div>

  <script>
    const VERSION = "v2.7"; // 🚀 鎖死上車點GPS + 解禁長途外縣市下車點
    const LIFF_ID = "2008907691-Faf4aET8"; 
    const DAILY_LIMIT = 5;
    
    const firebaseConfig = { projectId: "hualientaxi-bb32f" };
    firebase.initializeApp(firebaseConfig);
    const firestoreDb = firebase.firestore(); 

    let map, directionsService, directionsRenderer;
    let dropoffAutocomplete; // 🚀 拔除了上車點的自動完成
    let passengerId = "unknown";
    let isPickupValid = false; // 用來標記 GPS 鎖定的上車點是否合法

    window.onload = async function() {
        Swal.fire({ title: '系統載入中...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
        if(typeof google !== 'undefined') { initMap(); }
        
        try { 
            await liff.init({ liffId: LIFF_ID }); 
            if(!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            passengerId = profile.userId;

            const blockDoc = await firestoreDb.collection('blacklists').doc(passengerId).get();
            if (blockDoc.exists) { 
                document.body.innerHTML = ''; document.body.style.backgroundColor = '#f8d7da';
                Swal.fire({ icon: 'error', title: '服務暫停', html: '您的帳號目前無法使用車隊系統。', confirmButtonText: '確定', confirmButtonColor: '#e74c3c', allowOutsideClick: false }).then(() => { liff.closeWindow(); });
                return; 
            }
            
            updateQuotaDisplay();
            
            // 🚀 自動執行 GPS 定位 (無需客人手動按)
            useMyLocation();

        } catch(e) { 
            Swal.fire({ icon: 'error', title: '系統錯誤', text: 'LINE 授權失敗，請重新開啟網頁' }); 
        } 
    };

    function triggerGpsWarning() {
        if (!isPickupValid) {
            Swal.fire({ icon: 'info', title: '上車點鎖定', text: '為確保系統安全與防護，上車點僅限由 GPS 自動定位，無法手動輸入喔！', confirmButtonColor: '#00C853' });
        }
    }

    function getRemainingQuota() {
        const today = new Date().toISOString().split('T')[0]; 
        let usageData = JSON.parse(localStorage.getItem('fareCalcUsage')) || { date: today, count: 0 };
        if (usageData.date !== today) { usageData = { date: today, count: 0 }; localStorage.setItem('fareCalcUsage', JSON.stringify(usageData)); }
        return Math.max(0, DAILY_LIMIT - usageData.count);
    }

    function recordUsage() {
        const today = new Date().toISOString().split('T')[0];
        let usageData = JSON.parse(localStorage.getItem('fareCalcUsage')) || { date: today, count: 0 };
        usageData.count++; localStorage.setItem('fareCalcUsage', JSON.stringify(usageData));
        updateQuotaDisplay();
    }

    function updateQuotaDisplay() {
        const remaining = getRemainingQuota();
        document.getElementById('quota-display').innerText = `精準估算・透明費率 (今日剩餘 ${remaining} 次)`;
    }

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 23.991, lng: 121.601 }, zoom: 14, disableDefaultUI: true, mapTypeControl: false
        });
        
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({
            map: map, suppressMarkers: false, preserveViewport: true, 
            polylineOptions: { strokeColor: '#00C853', strokeWeight: 6, strokeOpacity: 0.8 }
        });

        const options = { componentRestrictions: { country: "tw" } };
        // 🚀 只有下車點保留自動完成功能
        dropoffAutocomplete = new google.maps.places.Autocomplete(document.getElementById('dropoff-input'), options);
        dropoffAutocomplete.setFields(['formatted_address', 'geometry']);
    }

    function useMyLocation() {
        if (navigator.geolocation) {
            Swal.fire({ title: '定位中...', text: '正在鎖定您的上車位置', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const geocoder = new google.maps.Geocoder();
                    geocoder.geocode({ location: { lat, lng } }, (results, status) => {
                        if (status === "OK" && results[0]) {
                            const addr = results[0].formatted_address.replace("台灣", "").replace(/[0-9]{3}/, "");
                            
                            // 🚀 防禦機制：強制檢查 GPS 位置是否在花蓮
                            if (!addr.includes("花蓮")) {
                                isPickupValid = false;
                                document.getElementById('pickup-input').value = "您不在花蓮服務範圍內";
                                document.getElementById('pickup-input').style.color = "#e74c3c";
                                Swal.fire({ icon: 'error', title: '超出服務範圍', html: '本車隊上車地點僅限<b style="color:#e74c3c;">花蓮縣境內</b>。<br>您目前的 GPS 位置似乎不在花蓮喔！', confirmButtonColor: '#e74c3c' });
                                return;
                            }

                            isPickupValid = true;
                            document.getElementById('pickup-input').value = addr;
                            document.getElementById('pickup-input').style.color = "#00C853";
                            Swal.close();
                            map.panTo({lat, lng}); map.setZoom(16);
                        } else {
                            isPickupValid = false;
                            Swal.fire('定位失敗', '無法解析您的地址，請確認網路連線。', 'error');
                        }
                    });
                },
                () => { 
                    isPickupValid = false;
                    Swal.fire({icon: 'error', title: '未授權定位', text: '您必須允許 LINE / 網頁取得 GPS 定位權限，才能鎖定上車地點。', confirmButtonColor: '#00C853'}); 
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            Swal.fire('錯誤', '您的裝置不支援 GPS 定位。', 'error');
        }
    }

    function calculateFare() {
        if (getRemainingQuota() <= 0) {
            Swal.fire({ icon: 'warning', title: '額度用盡', text: '您今日的估算次數已達上限。請直接點擊「一鍵叫車」由司機為您服務！', confirmButtonColor: '#00C853', confirmButtonText: '我知道了' }); return;
        }

        const pickup = document.getElementById('pickup-input').value;
        const dropoff = document.getElementById('dropoff-input').value;

        // 🚀 如果 GPS 定位失敗或不在花蓮，阻擋計算
        if (!isPickupValid || !pickup || pickup === "自動定位目前位置..." || pickup === "您不在花蓮服務範圍內") {
            Swal.fire({ icon: 'warning', title: '請先完成定位', text: '上車地點必須先透過 GPS 自動定位鎖定在花蓮境內！', confirmButtonColor: '#00C853' }); return;
        }
        if (!dropoff) {
            Swal.fire({ icon: 'warning', title: '請填寫下車地點', text: '請輸入您的目的地 (跨縣市包車亦可)！', confirmButtonColor: '#00C853' }); return;
        }

        Swal.fire({ title: '規劃路線中...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

        const request = { origin: pickup, destination: dropoff, travelMode: 'DRIVING' };

        directionsService.route(request, (result, status) => {
            Swal.close();
            if (status == 'OK') {
                recordUsage();
                directionsRenderer.setDirections(result);
                const route = result.routes[0].legs[0];
                
                const distanceMeters = route.distance.value; 
                const durationSeconds = route.duration.value; 
                
                const currentHour = new Date().getHours();
                const isNight = (currentHour >= 22 || currentHour < 6);
                const modeTag = isNight ? '<span class="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded ml-2">夜間費率</span>' : '';
                
                document.getElementById('route-meta').innerHTML = `${route.distance.text} / ${route.duration.text} ${modeTag}`;
                
                const yellowFare = calculateOfficialFare(distanceMeters, durationSeconds, isNight);
                
                document.getElementById('fare-yellow').innerText = `~NT$ ${yellowFare}`;
                document.getElementById('fare-m12').innerText = `~NT$ ${roundToTaxiStandard(yellowFare * 1.2)}`;
                document.getElementById('fare-m14').innerText = `~NT$ ${roundToTaxiStandard(yellowFare * 1.4)}`;

                document.getElementById('input-view').classList.add('hidden');
                document.getElementById('result-view').classList.remove('hidden');

                const bounds = result.routes[0].bounds;
                const bottomSheetHeight = document.getElementById('bottom-sheet').offsetHeight + 30;
                map.fitBounds(bounds, { top: 110, bottom: bottomSheetHeight, left: 50, right: 50 });

            } else {
                Swal.fire('找不到路線', '無法計算此兩點間的路線，請嘗試輸入更準確的地址。', 'error');
            }
        });
    }
    
    function calculateOfficialFare(meters, seconds, isNight) {
        let fare = 100; 
        const idleSeconds = seconds * 0.2; 
        if (isNight) {
            if (meters > 834) { fare += Math.ceil((meters - 834) / 192) * 5; }
            fare += Math.floor(idleSeconds / 100) * 5;
        } else {
            if (meters > 1000) { fare += Math.ceil((meters - 1000) / 230) * 5; }
            fare += Math.floor(idleSeconds / 120) * 5;
        }
        return roundToTaxiStandard(fare);
    }
    
    function roundToTaxiStandard(num) { return Math.round(num / 5) * 5; }

    function resetView() {
        document.getElementById('result-view').classList.add('hidden');
        document.getElementById('input-view').classList.remove('hidden');
        centerMap(); 
    }

    function centerMap(){ map.panTo({ lat: 23.991, lng: 121.601 }); map.setZoom(14); }
  </script>
</body>
</html>
