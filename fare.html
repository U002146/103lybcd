<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>花蓮專屬-預估車資查詢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .pac-container { border-radius: 8px; margin-top: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 18px; }
        .pac-item { padding: 12px; cursor: pointer; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <div class="bg-blue-600 text-white p-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold">預估車資查詢</h1>
        <p class="text-sm mt-1 opacity-90">⚠️ 實際金額以車上計費錶為準</p>
    </div>

    <div class="p-4 max-w-md mx-auto">
        <div class="bg-white rounded-xl shadow-md p-5 space-y-4">
            <div>
                <label class="block text-gray-500 text-sm mb-1 font-bold">上車地點</label>
                <div class="flex gap-2">
                    <input id="start_address" type="text" placeholder="輸入起點或點擊右側定位" 
                           class="flex-1 border-2 border-gray-200 rounded-lg p-3 text-lg focus:border-blue-500 outline-none">
                    <button onclick="getCurrentLocation()" class="bg-blue-100 text-blue-600 px-3 rounded-lg active:bg-blue-200">
                        📍
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-gray-500 text-sm mb-1 font-bold">下車地點</label>
                <input id="end_address" type="text" placeholder="你要去哪裡？" 
                       class="w-full border-2 border-gray-200 rounded-lg p-3 text-lg focus:border-blue-500 outline-none">
            </div>

            <button onclick="calculateFare()" 
                    class="w-full bg-yellow-400 hover:bg-yellow-500 text-black font-black text-2xl py-4 rounded-xl shadow-inner transition-transform active:scale-95">
                💰 開始預估車資
            </button>
        </div>

        <div id="result_card" class="hidden mt-6 bg-white rounded-xl shadow-md p-6 border-t-8 border-green-500 animate-bounce-in">
            <div class="text-center">
                <p class="text-gray-500 font-bold text-lg">預估金額區間</p>
                <h2 id="fare_range" class="text-4xl font-black text-green-600 my-2">NT$ 100 - 120</h2>
                <div class="flex justify-around text-gray-600 mt-4 border-t pt-4">
                    <div>
                        <p class="text-xs">預估距離</p>
                        <p id="res_distance" class="font-bold text-xl">0.0 km</p>
                    </div>
                    <div>
                        <p class="text-xs">預估時間</p>
                        <p id="res_duration" class="font-bold text-xl">0 分鐘</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8 space-y-3">
            <p class="text-center text-gray-400 text-sm font-bold">— 覺得合適？立即出發 —</p>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="redirectToAction('fav')" class="bg-white border-2 border-green-600 text-green-700 font-bold py-4 rounded-xl flex items-center justify-center gap-2 active:bg-green-50">
                    🏠 常用地址
                </button>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="redirectToAction('loc')" class="bg-green-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 active:bg-green-700 shadow-md">
                        📍 定位叫車
                    </button>
                    <button onclick="redirectToAction('quick')" class="bg-orange-500 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 active:bg-orange-600 shadow-md">
                        ⚡ 一鍵叫車
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>

    <script>
        let userId = "guest";
        let startAutocomplete, endAutocomplete;

        // 初始化 LIFF
        async function initLiff() {
            try {
                await liff.init({ liffId: "YOUR_LIFF_ID" });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    userId = profile.userId;
                    initAutocomplete();
                }
            } catch (err) {
                console.error("LIFF Init Error", err);
                initAutocomplete(); // 即使失敗也允許測試
            }
        }

        function initAutocomplete() {
            const options = { componentRestrictions: { country: "tw" } };
            startAutocomplete = new google.maps.places.Autocomplete(document.getElementById('start_address'), options);
            endAutocomplete = new google.maps.places.Autocomplete(document.getElementById('end_address'), options);
        }

        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    const geocoder = new google.maps.Geocoder();
                    geocoder.geocode({ location: latlng }, (results, status) => {
                        if (status === "OK" && results[0]) {
                            document.getElementById('start_address').value = results[0].formatted_address;
                        }
                    });
                });
            }
        }

        async function calculateFare() {
            const start = document.getElementById('start_address').value;
            const end = document.getElementById('end_address').value;

            if (!start || !end) {
                Swal.fire("請輸入起訖點", "", "warning");
                return;
            }

            // 防禦：每日次數限制
            if (!checkDailyLimit()) return;

            const service = new google.maps.DirectionsService();
            service.route({
                origin: start,
                destination: end,
                travelMode: google.maps.TravelMode.DRIVING
            }, (response, status) => {
                if (status === "OK") {
                    const route = response.routes[0].legs[0];
                    const distanceMeter = route.distance.value;
                    const durationSec = route.duration.value;
                    
                    const fare = computeHualienFare(distanceMeter, durationSec);
                    
                    document.getElementById('result_card').classList.remove('hidden');
                    document.getElementById('fare_range').innerText = `NT$ ${fare.min} - ${fare.max}`;
                    document.getElementById('res_distance').innerText = (distanceMeter / 1000).toFixed(1) + " km";
                    document.getElementById('res_duration').innerText = Math.round(durationSec / 60) + " 分鐘";
                    
                    window.scrollTo({ top: 300, behavior: 'smooth' });
                } else {
                    Swal.fire("路徑計算失敗", "請確認地址是否正確", "error");
                }
            });
        }

        function computeHualienFare(meters, seconds) {
            const now = new Date();
            const hour = now.getHours();
            const isNight = (hour >= 22 || hour < 6);

            // 花蓮費率邏輯
            let baseFare = isNight ? 120 : 100; // 起跳
            let distance = meters;
            
            // 扣除起程 1000m
            distance = Math.max(0, distance - 1000);
            
            // 續程：每 230m $5
            let extraFare = Math.ceil(distance / 230) * 5;
            
            // 延滯計時模擬：預估會有 10% 的等紅燈/塞車費
            let total = baseFare + extraFare;
            return {
                min: Math.floor(total),
                max: Math.floor(total * 1.15) // 給予 15% 浮動區間
            };
        }

        function checkDailyLimit() {
            const today = new Date().toDateString();
            const countKey = userId + '_count';
            const dateKey = userId + '_date';
            
            let count = parseInt(localStorage.getItem(countKey) || "0");
            let lastDate = localStorage.getItem(dateKey);

            if (lastDate !== today) {
                count = 0;
                localStorage.setItem(dateKey, today);
            }

            if (count >= 10) {
                Swal.fire("查詢次數已達上限", "為了維持服務品質，每日限查 10 次。請直接點擊下方按鈕叫車！", "info");
                return false;
            }

            localStorage.setItem(countKey, count + 1);
            return true;
        }

        function redirectToAction(type) {
            // 這裡替換成你的主叫車 LINE 官方帳號連結或另一個 LIFF URL
            const mainLiffUrl = "https://line.me/R/ti/p/@your_id"; 
            liff.openWindow({ url: mainLiffUrl, external: false });
        }

        window.onload = initLiff;
    </script>
</body>
</html>
