<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>預估車資計算機</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script> 
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAIxc6PEhHgUs_A9lyRUg8dNbmwOpSamY8&libraries=places,geometry"></script>
  
  <style>
    body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
    
    /* 頂部懸浮控制台 */
    #top-panel { 
        position: absolute; top: 0; left: 0; width: 100%; 
        background: rgba(255, 255, 255, 0.98); 
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        border-bottom-left-radius: 28px; border-bottom-right-radius: 28px; 
        box-shadow: 0 10px 40px rgba(0,0,0,0.12); z-index: 20; 
        padding: max(env(safe-area-inset-top, 24px), 24px) 24px 24px 24px; 
        display: flex; flex-direction: column;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* 將頂部面板往上推離畫面外 */
    #top-panel.hide-top { transform: translateY(-120%); }

    /* 懸浮返回按鈕 */
    #back-btn {
        position: absolute;
        top: max(env(safe-area-inset-top, 20px), 20px); left: 20px;
        z-index: 30;
        transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #back-btn.hidden-btn { opacity: 0; pointer-events: none; transform: scale(0.8); }

    .input-row { display: flex; align-items: center; background: #f8fafc; border-radius: 16px; padding: 12px 16px; border: 1px solid #e2e8f0; transition: border-color 0.2s; }
    .input-row:focus-within { border-color: #00C853; background: #fff; box-shadow: 0 0 0 3px rgba(0,200,83,0.1); }
    .input-row input { flex: 1; background: transparent; border: none; outline: none; font-size: 16px; font-weight: bold; color: #1e293b; width: 100%; }
    .input-row input::placeholder { color: #94a3b8; font-weight: normal; font-size: 15px; }
    .input-row input:read-only { color: #00C853; font-weight: 900; cursor: default; }
    .input-row.locked { background: #f0fdf4; border-color: #bbf7d0; }

    .btn-calc { background: linear-gradient(135deg, #00C853, #1B5E20); color: white; width: 100%; padding: 16px; border-radius: 16px; font-weight: 900; font-size: 18px; box-shadow: 0 6px 20px rgba(0, 200, 83, 0.3); border: none; cursor: pointer; transition: transform 0.1s; margin-top: 16px; }
    .btn-calc:active { transform: scale(0.96); }
    
    /* 底部結果懸浮卡片動畫 */
    #result-floating-card {
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    }
    #result-floating-card.hidden-card {
        transform: translateY(150%); opacity: 0; pointer-events: none;
    }
    
    /* Google Maps 自動完成選單美化 */
    .pac-container { border-radius: 0 0 16px 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); font-family: 'Noto Sans TC'; border: 1px solid #e2e8f0; border-top: none; margin-top: 0; padding: 5px; z-index: 9999 !important; }
    .pac-item { padding: 12px 15px; cursor: pointer; font-size: 15px; border-top: 1px solid #f1f5f9; }
    .pac-item:hover { background-color: #f8fafc; }
    .pac-item-query { font-size: 16px; color: #1e293b; font-weight: bold; }
    
    .swal2-popup { border-radius: 24px !important; font-family: 'Noto Sans TC', sans-serif !important; }
  </style>
</head>
<body>

  <button id="back-btn" onclick="resetView()" class="hidden-btn bg-white text-slate-700 shadow-lg border border-slate-100 rounded-full w-12 h-12 flex items-center justify-center text-xl active:scale-90">
    <i class="fa-solid fa-arrow-left"></i>
  </button>

  <div id="top-panel">
    <div class="flex justify-between items-end mb-4">
        <div>
            <h1 class="text-2xl font-black text-slate-800 flex items-center gap-2">
              <i class="fa-solid fa-calculator text-emerald-500"></i> 預估車資
            </h1>
            <p class="text-sm text-slate-500 mt-1 font-bold" id="quota-display">精準估算・透明費率 (載入中...)</p>
        </div>
        <button onclick="window.location.href='https://liff.line.me/2008907691-zTgIQ9Oa'" class="bg-slate-100 hover:bg-slate-200 active:scale-95 border border-slate-200 px-3 py-2 rounded-xl flex items-center justify-center transition-all shadow-sm">
            <div class="flex flex-col items-center">
                <i class="fa-solid fa-route text-indigo-500 text-[18px] mb-1"></i>
                <span class="text-[10px] text-slate-600 font-bold tracking-wider">包車精算</span>
            </div>
        </button>
    </div>
    
    <div id="input-view">
        <div class="text-xs text-slate-500 font-bold text-center tracking-wide flex items-center justify-center gap-1.5 bg-slate-100 py-2 rounded-lg border border-slate-200 mb-3">
            <i class="fa-solid fa-circle-info text-slate-400"></i> 預估車資僅供參考，實際收費以跳錶為準
        </div>
        
        <div class="space-y-3 w-full">
            <div class="input-row locked" onclick="triggerGpsWarning()">
                <i class="fa-solid fa-location-crosshairs text-emerald-500 w-6 text-center mr-2 text-lg"></i>
                <input type="text" id="pickup-input" placeholder="自動定位目前位置..." readonly>
                <button onclick="useMyLocation(); event.stopPropagation();" class="text-emerald-600 p-2 active:scale-90 bg-emerald-100 hover:bg-emerald-200 rounded-xl ml-2 transition-colors"><i class="fa-solid fa-rotate-right"></i></button>
            </div>
            
            <div class="input-row shadow-sm">
                <i class="fa-solid fa-location-dot text-rose-500 w-6 text-center mr-2 text-lg"></i>
                <input type="text" id="dropoff-input" placeholder="請點此輸入下車地點 (跨縣市可)">
            </div>
        </div>
        
        <button onclick="calculateFare()" class="btn-calc">開始計算車資</button>
    </div>
  </div>

  <div id="result-floating-card" class="hidden-card fixed bottom-6 left-4 right-4 mx-auto max-w-[500px] bg-white rounded-[28px] shadow-[0_20px_50px_rgba(0,0,0,0.15)] z-40 flex-col p-5 font-sans border border-slate-100">
      <div class="flex items-center gap-1.5 text-slate-400 font-bold text-sm mb-2">
          <i class="fa-solid fa-flag-checkered"></i> 預估抵達
      </div>
      <div class="text-[26px] font-black text-slate-800 mb-4 tracking-tight" id="card-meta">
          -- 公里 / -- 分鐘
      </div>
      
      <div class="bg-amber-50 border-2 border-amber-100 rounded-2xl p-4 flex justify-between items-center shadow-sm mb-3">
          <span class="text-amber-700 font-black text-lg"><i class="fa-solid fa-taxi mr-2 text-amber-500"></i>小黃</span>
          <span class="text-amber-600 font-black text-[26px]" id="card-yellow">~NT$ --</span>
      </div>

      <button onclick="sendOrderMessage()" class="w-full bg-emerald-600 hover:bg-emerald-700 active:scale-[0.98] text-white font-black py-4 rounded-2xl transition-all flex items-center justify-center gap-2 text-[18px] shadow-[0_8px_20px_rgba(5,150,105,0.25)] mb-3">
          <i class="fa-solid fa-paper-plane"></i> 將此行程送出叫車
      </button>
      
      <div id="extra-fares" class="hidden flex-col gap-3 mb-3">
          <div class="bg-sky-50 border border-sky-100 rounded-2xl p-4 flex justify-between items-center shadow-sm">
              <span class="text-sky-700 font-bold text-md"><i class="fa-solid fa-car-side mr-2 text-sky-500"></i>多元專車 (1.2x)</span>
              <span class="text-sky-600 font-black text-xl" id="card-m12">~NT$ --</span>
          </div>
          <div class="bg-violet-50 border border-violet-100 rounded-2xl p-4 flex justify-between items-center shadow-sm">
              <span class="text-violet-700 font-bold text-md"><i class="fa-solid fa-van-shuttle mr-2 text-violet-500"></i>尊榮六座 (1.4x)</span>
              <span class="text-violet-600 font-black text-xl" id="card-m14">~NT$ --</span>
          </div>
      </div>
      
      <button onclick="window.toggleFares()" id="toggle-btn" class="w-full bg-slate-50 hover:bg-slate-100 active:scale-[0.98] text-slate-500 font-bold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2 text-[15px]">
          展開更多車型 <i class="fa-solid fa-chevron-down text-sm"></i>
      </button>
  </div>

  <div id="map"></div>

  <script>
    const VERSION = "v3.6"; 
    const LIFF_ID = "2008907691-Faf4aET8"; 
    const DAILY_LIMIT = 5;
    
    const firebaseConfig = { projectId: "hualientaxi-bb32f" };
    firebase.initializeApp(firebaseConfig);
    const firestoreDb = firebase.firestore(); 

    let map, directionsService, directionsRenderer;
    let dropoffAutocomplete; 
    let passengerId = "unknown";
    let userName = "乘客"; 
    let isPickupValid = false; 
    let currentRouteBounds = null; 

    // 全域變數用來儲存當次計算結果，供發送叫車單使用
    let currentOrderData = {
        pickup: '',
        dropoff: '',
        duration: '',
        yellowFare: 0
    };

    window.onload = async function() {
        Swal.fire({ title: '系統載入中...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
        if(typeof google !== 'undefined') { initMap(); }
        
        try { 
            await liff.init({ liffId: LIFF_ID }); 
            if(!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            passengerId = profile.userId;
            userName = profile.displayName; 

            const blockDoc = await firestoreDb.collection('blacklists').doc(passengerId).get();
            if (blockDoc.exists) { 
                document.body.innerHTML = ''; document.body.style.backgroundColor = '#f8d7da';
                Swal.fire({ icon: 'error', title: '服務暫停', html: '您的帳號目前無法使用車隊系統。', confirmButtonText: '確定', confirmButtonColor: '#e74c3c', allowOutsideClick: false }).then(() => { liff.closeWindow(); });
                return; 
            }
            
            updateQuotaDisplay();
            useMyLocation();

        } catch(e) { 
            Swal.fire({ icon: 'error', title: '系統錯誤', text: 'LINE 授權失敗，請重新開啟網頁' }); 
        } 
    };

    function triggerGpsWarning() {
        if (!isPickupValid) {
            Swal.fire({ icon: 'info', title: '上車點鎖定', text: '為確保系統安全與防護，上車點僅限由 GPS 自動定位，無法手動輸入喔！', confirmButtonColor: '#00C853' });
        }
    }

    function getRemainingQuota() {
        const today = new Date().toISOString().split('T')[0]; 
        let usageData = JSON.parse(localStorage.getItem('fareCalcUsage')) || { date: today, count: 0 };
        if (usageData.date !== today) { usageData = { date: today, count: 0 }; localStorage.setItem('fareCalcUsage', JSON.stringify(usageData)); }
        return Math.max(0, DAILY_LIMIT - usageData.count);
    }

    function recordUsage() {
        const today = new Date().toISOString().split('T')[0];
        let usageData = JSON.parse(localStorage.getItem('fareCalcUsage')) || { date: today, count: 0 };
        usageData.count++; localStorage.setItem('fareCalcUsage', JSON.stringify(usageData));
        updateQuotaDisplay();
    }

    function updateQuotaDisplay() {
        const remaining = getRemainingQuota();
        document.getElementById('quota-display').innerText = `精準估算・透明費率 (今日剩餘 ${remaining} 次)`;
    }

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 23.991, lng: 121.601 }, zoom: 14, disableDefaultUI: true, mapTypeControl: false
        });
        
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({
            map: map, suppressMarkers: false, preserveViewport: true, 
            polylineOptions: { strokeColor: '#00C853', strokeWeight: 6, strokeOpacity: 0.8 }
        });

        const options = { componentRestrictions: { country: "tw" } };
        dropoffAutocomplete = new google.maps.places.Autocomplete(document.getElementById('dropoff-input'), options);
        dropoffAutocomplete.setFields(['formatted_address', 'geometry']);
    }

    function useMyLocation() {
        if (navigator.geolocation) {
            Swal.fire({ title: '定位中...', text: '正在鎖定您的上車位置', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const geocoder = new google.maps.Geocoder();
                    geocoder.geocode({ location: { lat, lng } }, (results, status) => {
                        if (status === "OK" && results[0]) {
                            const addr = results[0].formatted_address.replace("台灣", "").replace(/[0-9]{3}/, "");
                            
                            if (!addr.includes("花蓮")) {
                                isPickupValid = false;
                                document.getElementById('pickup-input').value = "您不在花蓮服務範圍內";
                                document.getElementById('pickup-input').style.color = "#e74c3c";
                                Swal.fire({ icon: 'error', title: '超出服務範圍', html: '本車隊上車地點僅限<b style="color:#e74c3c;">花蓮縣境內</b>。<br>您目前的 GPS 位置似乎不在花蓮喔！', confirmButtonColor: '#e74c3c' });
                                return;
                            }

                            isPickupValid = true;
                            document.getElementById('pickup-input').value = addr;
                            document.getElementById('pickup-input').style.color = "#00C853";
                            Swal.close();
                            
                            map.setZoom(16);
                            map.setCenter({lat, lng});
                            
                            if (window.pickupMarker) window.pickupMarker.setMap(null);
                            window.pickupMarker = new google.maps.Marker({
                                position: {lat, lng}, map: map, zIndex: 999,
                                icon: { path: google.maps.SymbolPath.CIRCLE, scale: 9, fillColor: '#00C853', fillOpacity: 1, strokeColor: '#ffffff', strokeWeight: 3 }
                            });

                            setTimeout(() => {
                                const topPanelHeight = document.getElementById('top-panel').offsetHeight;
                                map.panBy(0, -(topPanelHeight / 2));
                            }, 100);

                        } else {
                            isPickupValid = false;
                            Swal.fire('定位失敗', '無法解析您的地址，請確認網路連線。', 'error');
                        }
                    });
                },
                () => { 
                    isPickupValid = false;
                    Swal.fire({icon: 'error', title: '未授權定位', text: '您必須允許 LINE / 網頁取得 GPS 定位權限，才能鎖定上車地點。', confirmButtonColor: '#00C853'}); 
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            Swal.fire('錯誤', '您的裝置不支援 GPS 定位。', 'error');
        }
    }

    window.toggleFares = function() {
        const extra = document.getElementById('extra-fares');
        const btn = document.getElementById('toggle-btn');
        if (extra.classList.contains('hidden')) {
            extra.classList.remove('hidden');
            extra.classList.add('flex');
            btn.innerHTML = '收起詳細車資 <i class="fa-solid fa-chevron-up"></i>';
        } else {
            extra.classList.add('hidden');
            extra.classList.remove('flex');
            btn.innerHTML = '展開更多車型 <i class="fa-solid fa-chevron-down"></i>';
        }
        
        if (currentRouteBounds) {
            setTimeout(() => {
                const cardHeight = document.getElementById('result-floating-card').offsetHeight;
                map.fitBounds(currentRouteBounds, { top: 100, bottom: cardHeight + 40, left: 40, right: 40 });
            }, 50);
        }
    };

    function calculateFare() {
        if (getRemainingQuota() <= 0) {
            Swal.fire({ icon: 'warning', title: '額度用盡', text: '您今日的估算次數已達上限。請直接點擊「一鍵叫車」由司機為您服務！', confirmButtonColor: '#00C853', confirmButtonText: '我知道了' }); return;
        }

        const pickup = document.getElementById('pickup-input').value;
        const dropoff = document.getElementById('dropoff-input').value;

        if (!isPickupValid || !pickup || pickup === "自動定位目前位置..." || pickup === "您不在花蓮服務範圍內") {
            Swal.fire({ icon: 'warning', title: '請先完成定位', text: '上車地點必須先透過 GPS 自動定位鎖定在花蓮境內！', confirmButtonColor: '#00C853' }); return;
        }
        if (!dropoff) {
            Swal.fire({ icon: 'warning', title: '請填寫下車地點', text: '請輸入您的目的地 (跨縣市包車亦可)！', confirmButtonColor: '#00C853' }); return;
        }

        Swal.fire({ title: '規劃路線中...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

        const request = { origin: pickup, destination: dropoff, travelMode: 'DRIVING' };

        directionsService.route(request, (result, status) => {
            Swal.close();
            if (status == 'OK') {
                recordUsage();
                
                if (window.pickupMarker) window.pickupMarker.setMap(null);
                
                directionsRenderer.setDirections(result);
                const route = result.routes[0].legs[0];
                currentRouteBounds = result.routes[0].bounds; 
                
                const distanceMeters = route.distance.value; 
                const durationSeconds = route.duration.value; 
                
                const currentHour = new Date().getHours();
                const isNight = (currentHour >= 22 || currentHour < 6);
                const modeTag = isNight ? '<span class="text-[12px] bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded ml-2 align-middle">夜間</span>' : '';
                
                const yellowFare = calculateOfficialFare(distanceMeters, durationSeconds, isNight);
                const m12Fare = roundToTaxiStandard(yellowFare * 1.2);
                const m14Fare = roundToTaxiStandard(yellowFare * 1.4);

                // 記錄至全域變數，供送出叫車單使用
                currentOrderData.pickup = pickup;
                currentOrderData.dropoff = dropoff;
                currentOrderData.duration = route.duration.text;
                currentOrderData.yellowFare = yellowFare;

                document.getElementById('card-meta').innerHTML = `${route.distance.text} / ${route.duration.text} ${modeTag}`;
                document.getElementById('card-yellow').innerText = `~NT$ ${yellowFare}`;
                document.getElementById('card-m12').innerText = `~NT$ ${m12Fare}`;
                document.getElementById('card-m14').innerText = `~NT$ ${m14Fare}`;

                document.getElementById('top-panel').classList.add('hide-top');
                document.getElementById('back-btn').classList.remove('hidden-btn');
                
                const floatingCard = document.getElementById('result-floating-card');
                floatingCard.classList.remove('hidden-card');
                floatingCard.classList.add('flex');

                setTimeout(() => {
                    const cardHeight = floatingCard.offsetHeight;
                    map.fitBounds(currentRouteBounds, { 
                        top: 100, 
                        bottom: cardHeight + 40, 
                        left: 40, right: 40 
                    });
                }, 100);

            } else {
                Swal.fire('找不到路線', '無法計算此兩點間的路線，請嘗試輸入更準確的地址。', 'error');
            }
        });
    }

    // 🚀 一鍵發送叫車單功能 (升級為獨立紫羅蘭色標籤)
    function sendOrderMessage() {
        if (!liff.isInClient()) {
            Swal.fire('無法傳送', '請在 LINE APP 中使用此功能發送叫車單。', 'warning');
            return;
        }

        Swal.fire({ title: '發送叫車單中...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

        const nowTimeStr = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12:false});
        const pickupMapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(currentOrderData.pickup)}`;
        const dropoffMapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(currentOrderData.dropoff)}`;

        const flexMsg = {
            type: "flex",
            altText: "🚕 預估車資叫車",
            contents: {
                type: "bubble",
                styles: { header: { backgroundColor: "#FFFFFF" }, body: { backgroundColor: "#FFFFFF" } },
                header: {
                    type: "box", layout: "horizontal", spacing: "sm", alignItems: "center", paddingAll: "15px",
                    contents: [
                        {
                            type: "box", layout: "vertical", flex: 1, spacing: "xs",
                            contents: [
                                // 🚀 將字體顏色改為紫羅蘭色 (#8B5CF6)，與排班(藍)及名片(綠)產生視覺區隔
                                { type: "text", text: "🚕 預估車資叫車", weight: "bold", size: "sm", color: "#8B5CF6" },
                                { type: "text", text: `即時單 ${nowTimeStr}`, weight: "bold", size: "xl", color: "#111111", adjustMode: "shrink-to-fit" }
                            ]
                        }
                    ]
                },
                body: {
                    type: "box", layout: "vertical",
                    contents: [
                        {
                            type: "box", layout: "horizontal", margin: "md",
                            contents: [ { type: "text", text: "👤 乘客", flex: 2, color: "#888888", size: "md" }, { type: "text", text: userName, flex: 5, color: "#111111", size: "md", weight: "bold" } ]
                        },
                        { type: "separator", margin: "md", color: "#EEEEEE" },
                        {
                            type: "box", layout: "horizontal", margin: "md",
                            contents: [ { type: "text", text: "🟢 上車", flex: 2, color: "#888888", size: "md" }, { type: "text", text: currentOrderData.pickup, flex: 5, color: "#111111", size: "md", wrap: true, action: { type: "uri", label: "導航", uri: pickupMapUrl } } ]
                        },
                        { type: "separator", margin: "md", color: "#EEEEEE" },
                        {
                            type: "box", layout: "horizontal", margin: "md",
                            contents: [ { type: "text", text: "🔴 下車", flex: 2, color: "#888888", size: "md" }, { type: "text", text: currentOrderData.dropoff, flex: 5, color: "#111111", size: "md", wrap: true, action: { type: "uri", label: "導航", uri: dropoffMapUrl } } ]
                        },
                        { type: "separator", margin: "lg", color: "#EEEEEE" },
                        {
                            type: "box", layout: "horizontal", margin: "lg",
                            contents: [ { type: "text", text: "⏱️ 預估", flex: 2, color: "#888888", size: "md" }, { type: "text", text: currentOrderData.duration, flex: 5, color: "#111111", size: "md", weight: "bold" } ]
                        },
                        { type: "separator", margin: "lg", color: "#EEEEEE" },
                        {
                            type: "box", layout: "horizontal", margin: "lg",
                            contents: [ { type: "text", text: "💰 車資", flex: 2, color: "#888888", size: "md" }, { type: "text", text: `約 NT$ ${currentOrderData.yellowFare}`, flex: 5, color: "#F59E0B", size: "md", weight: "bold" } ]
                        }
                    ]
                }
            }
        };

        liff.sendMessages([flexMsg]).then(() => {
            Swal.close();
            liff.closeWindow(); // 傳送成功後立即關閉網頁，退回聊天室
        }).catch((err) => {
            Swal.fire('發送失敗', '請確定您已授權傳送訊息，或稍後再試。', 'error');
        });
    }
    
    function calculateOfficialFare(meters, seconds, isNight) {
        let fare = 100; 
        const idleSeconds = seconds * 0.2; 
        if (isNight) {
            if (meters > 834) { fare += Math.ceil((meters - 834) / 192) * 5; }
            fare += Math.floor(idleSeconds / 100) * 5;
        } else {
            if (meters > 1000) { fare += Math.ceil((meters - 1000) / 230) * 5; }
            fare += Math.floor(idleSeconds / 120) * 5;
        }
        return roundToTaxiStandard(fare);
    }
    
    function roundToTaxiStandard(num) { return Math.round(num / 5) * 5; }

    function resetView() {
        document.getElementById('top-panel').classList.remove('hide-top');
        document.getElementById('back-btn').classList.add('hidden-btn');
        
        const floatingCard = document.getElementById('result-floating-card');
        floatingCard.classList.add('hidden-card');
        setTimeout(() => floatingCard.classList.remove('flex'), 300); 
        
        const extra = document.getElementById('extra-fares');
        if (!extra.classList.contains('hidden')) {
            window.toggleFares();
        }
        
        directionsRenderer.set('directions', null);
        currentRouteBounds = null;
        useMyLocation(); 
    }
  </script>
