<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>預估車資計算機</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAIxc6PEhHgUs_A9lyRUg8dNbmwOpSamY8&libraries=places,geometry"></script>
  
  <style>
    body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    .header-bg { background: linear-gradient(135deg, #1e3a8a, #0f172a); color: white; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; }
    
    .input-card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 16px; margin: -10px 15px 15px 15px; position: relative; z-index: 20; }
    .input-row { display: flex; align-items: center; background: #f1f5f9; border-radius: 12px; padding: 10px 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
    .input-row input { flex: 1; background: transparent; border: none; outline: none; font-size: 15px; font-weight: bold; color: #334155; width: 100%; }
    .input-row input::placeholder { color: #94a3b8; font-weight: normal; }
    
    .btn-calc { background: linear-gradient(135deg, #00C853, #1B5E20); color: white; width: 100%; padding: 14px; border-radius: 12px; font-weight: 900; font-size: 16px; box-shadow: 0 4px 15px rgba(0, 200, 83, 0.3); transition: transform 0.1s; }
    .btn-calc:active { transform: scale(0.96); }
    
    #map { flex: 1; width: 100%; background: #e2e8f0; }
    
    /* 結果面板 */
    #result-panel { position: absolute; bottom: 0; left: 0; right: 0; background: white; border-top-left-radius: 24px; border-top-right-radius: 24px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); padding: 20px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 30; max-height: 60vh; overflow-y: auto; }
    #result-panel.show { transform: translateY(0); }
    
    .drag-handle { width: 40px; height: 5px; background: #cbd5e1; border-radius: 5px; margin: 0 auto 15px auto; }
    
    .fare-card { border: 2px solid #f1f5f9; border-radius: 16px; padding: 12px 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; transition: border-color 0.2s; }
    .fare-card:active { border-color: #cbd5e1; background: #f8fafc; }
    
    .fare-title { font-size: 15px; font-weight: bold; color: #334155; display: flex; align-items: center; gap: 8px; }
    .fare-price { font-size: 22px; font-weight: 900; color: #0f172a; }
    
    /* 特定車型顏色 */
    .fc-yellow .fare-price { color: #d97706; }
    .fc-multi12 .fare-price { color: #0284c7; }
    .fc-multi14 .fare-price { color: #7c3aed; }
    
    .pac-container { border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); font-family: 'Noto Sans TC'; border: none; margin-top: 5px; }
    .pac-item { padding: 10px 15px; cursor: pointer; }
    .pac-item:hover { background-color: #f1f5f9; }
  </style>
</head>
<body>

  <div class="header-bg">
    <h1 class="text-xl font-black flex items-center gap-2">
      <i class="fa-solid fa-calculator text-blue-300"></i> 預估車資計算
    </h1>
    <p class="text-xs text-blue-200 mt-1 opacity-80">輸入地址立即比較多種車型費率</p>
  </div>

  <div class="input-card">
    <div class="input-row">
      <i class="fa-solid fa-circle-dot text-emerald-500 w-6 text-center mr-2"></i>
      <input type="text" id="pickup-input" placeholder="請輸入上車地點">
      <button onclick="useMyLocation()" class="text-blue-500 p-2 active:scale-90"><i class="fa-solid fa-crosshairs"></i></button>
    </div>
    
    <div class="input-row mb-4">
      <i class="fa-solid fa-location-dot text-rose-500 w-6 text-center mr-2"></i>
      <input type="text" id="dropoff-input" placeholder="請輸入下車地點">
    </div>
    
    <button onclick="calculateFare()" class="btn-calc">開始計算車資</button>
  </div>

  <div id="map"></div>

  <div id="result-panel">
    <div class="drag-handle" onclick="closeResult()"></div>
    
    <div class="flex justify-between items-end mb-4 border-b border-slate-100 pb-3">
        <div>
            <div class="text-xs text-slate-400 font-bold mb-1">預估距離與時間</div>
            <div class="text-lg font-black text-slate-800" id="route-meta">-- 公里 / -- 分鐘</div>
        </div>
        <button onclick="closeResult()" class="text-slate-400 bg-slate-100 rounded-full w-8 h-8 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div class="fare-card fc-yellow">
        <div class="fare-title"><i class="fa-solid fa-taxi text-amber-500"></i> 🚕 標準小黃 (跳表)</div>
        <div class="fare-price" id="fare-yellow">$--</div>
    </div>
    
    <div class="fare-card fc-multi12">
        <div class="fare-title"><i class="fa-solid fa-car-side text-sky-500"></i> 🚘 多元專車 (1.2倍)</div>
        <div class="fare-price" id="fare-m12">$--</div>
    </div>
    
    <div class="fare-card fc-multi14">
        <div class="fare-title"><i class="fa-solid fa-van-shuttle text-violet-500"></i> 🚐 尊榮六座 (1.4倍)</div>
        <div class="fare-price" id="fare-m14">$--</div>
    </div>

    <div class="text-xs text-slate-400 text-center mt-4 font-bold">
        * 預估車資僅供參考，實際車資以最終行駛路線與路況為準。
    </div>
  </div>

  <script>
    let map, directionsService, directionsRenderer;
    let pickupAutocomplete, dropoffAutocomplete;

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 23.991, lng: 121.601 }, zoom: 13,
            disableDefaultUI: true, mapTypeControl: false
        });
        
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({
            map: map, suppressMarkers: false,
            polylineOptions: { strokeColor: '#3b82f6', strokeWeight: 5 }
        });

        // 綁定地址輸入框自動完成
        const options = { componentRestrictions: { country: "tw" } };
        pickupAutocomplete = new google.maps.places.Autocomplete(document.getElementById('pickup-input'), options);
        dropoffAutocomplete = new google.maps.places.Autocomplete(document.getElementById('dropoff-input'), options);
    }

    function useMyLocation() {
        if (navigator.geolocation) {
            Swal.fire({ title: '定位中...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const geocoder = new google.maps.Geocoder();
                    geocoder.geocode({ location: { lat, lng } }, (results, status) => {
                        Swal.close();
                        if (status === "OK" && results[0]) {
                            const addr = results[0].formatted_address.replace("台灣", "").replace(/[0-9]{3}/, "");
                            document.getElementById('pickup-input').value = addr;
                            map.panTo({lat, lng});
                            map.setZoom(16);
                        }
                    });
                },
                () => { Swal.fire('錯誤', '無法取得您的位置，請確認是否開啟 GPS 權限。', 'error'); },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            Swal.fire('錯誤', '您的裝置不支援 GPS 定位。', 'error');
        }
    }

    function calculateFare() {
        const pickup = document.getElementById('pickup-input').value;
        const dropoff = document.getElementById('dropoff-input').value;

        if (!pickup || !dropoff) {
            Swal.fire({ icon: 'warning', title: '請填寫完整', text: '上車與下車地點都必須填寫喔！', confirmButtonColor: '#3b82f6' });
            return;
        }

        Swal.fire({ title: '計算路線中...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

        const request = {
            origin: pickup,
            destination: dropoff,
            travelMode: 'DRIVING'
        };

        directionsService.route(request, (result, status) => {
            Swal.close();
            if (status == 'OK') {
                directionsRenderer.setDirections(result);
                const route = result.routes[0].legs[0];
                
                const distanceMeters = route.distance.value; // 公尺
                const durationSeconds = route.duration.value; // 秒
                
                document.getElementById('route-meta').innerText = `${route.distance.text} / ${route.duration.text}`;
                
                // 🚀 執行花蓮計程車費率概算演算法
                const yellowFare = estimateHualienTaxiFare(distanceMeters, durationSeconds);
                
                document.getElementById('fare-yellow').innerText = `~NT$ ${yellowFare}`;
                document.getElementById('fare-m12').innerText = `~NT$ ${Math.ceil(yellowFare * 1.2)}`;
                document.getElementById('fare-m14').innerText = `~NT$ ${Math.ceil(yellowFare * 1.4)}`;

                document.getElementById('result-panel').classList.add('show');
            } else {
                Swal.fire('找不到路線', '無法計算此兩點間的路線，請嘗試輸入更準確的地址。', 'error');
            }
        });
    }
    
    // 🚀 花蓮計程車計費概算 (起跳100元/1km，續跳5元/230m)
    function estimateHualienTaxiFare(meters, seconds) {
        let fare = 100; // 起跳價
        if (meters > 1000) {
            fare += Math.ceil((meters - 1000) / 230) * 5;
        }
        // 加上 10% 左右的延滯時間/紅綠燈緩衝估算，讓價格更貼近現實
        fare = Math.ceil(fare * 1.1); 
        return fare;
    }

    function closeResult() {
        document.getElementById('result-panel').classList.remove('show');
    }

    // 初始化 Google Maps
    window.addEventListener('load', () => {
        if(typeof google === 'undefined') {
            setTimeout(initMap, 500);
        } else {
            initMap();
        }
    });
  </script>
</body>
</html>
