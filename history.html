<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>乘車紀錄 - 敬老愛心接送</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script> 
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* 🚀 綠色車隊漸層配色 */
        .header-bg { background: linear-gradient(135deg, #00C853 0%, #1B5E20 100%); border-bottom-left-radius: 32px; border-bottom-right-radius: 32px; padding: 24px 20px 40px 20px; color: white; position: relative; overflow: hidden; box-shadow: 0 10px 25px rgba(0, 200, 83, 0.2); }
        .header-icon { position: absolute; right: -20px; top: -10px; font-size: 120px; opacity: 0.1; transform: rotate(-10deg); color: #fff;}
        
        .main-container { flex: 1; padding: 0 20px 40px 20px; max-width: 600px; margin: -20px auto 0 auto; width: 100%; z-index: 10; position: relative; }
        
        .history-card { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); padding: 18px 16px; margin-bottom: 16px; border: 1px solid #e2e8f0; transition: transform 0.2s; }
        .history-card:active { transform: scale(0.98); }
        
        .status-badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: bold; letter-spacing: 0.5px; }
        .status-active { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-cancelled { background-color: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; text-decoration: line-through; }
        
        .loader-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #00C853; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .swal2-popup { border-radius: 24px !important; font-family: 'Noto Sans TC', sans-serif !important; }
    </style>
</head>
<body>

    <div id="app-header" class="header-bg">
        <i class="fa-solid fa-taxi header-icon"></i>
        <div class="flex items-center justify-between relative z-10">
            <div>
                <h1 class="text-2xl font-black tracking-wide flex items-center">
                    <img id="user-avatar" src="https://via.placeholder.com/50" class="w-10 h-10 rounded-full border-2 border-white mr-3 hidden shadow-md">
                    <span id="user-name-display">載入中...</span>
                </h1>
                <p class="text-green-100 text-sm mt-1 font-bold">近期乘車紀錄</p>
            </div>
            <div id="total-count-badge" class="hidden flex-col items-center bg-white/20 px-3 py-1.5 rounded-xl backdrop-blur-sm border border-white/30">
                <span class="text-[10px] text-green-100 font-bold uppercase">Total</span>
                <span id="total-trips" class="text-xl font-black text-white leading-none">0</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div id="loading-state" class="loader-container bg-white rounded-3xl shadow-sm border border-gray-100 mt-2">
            <div class="loader mb-4"></div>
            <p class="text-slate-500 font-bold text-sm tracking-widest animate-pulse">撈取歷史資料中...</p>
        </div>

        <div id="empty-state" class="hidden flex-col items-center justify-center bg-white rounded-3xl shadow-sm border border-gray-100 p-8 mt-2 text-center">
            <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mb-4 text-green-500 text-4xl">
                <i class="fa-solid fa-car-side"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-700 mb-1">尚無乘車紀錄</h3>
            <p class="text-sm text-slate-400 mb-6">您目前還沒有搭乘過我們的車喔！</p>
            <button onclick="goToBooking()" class="bg-green-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg active:scale-95 transition-transform flex items-center">
                <i class="fa-solid fa-taxi mr-2"></i> 立刻開啟雷達叫車
            </button>
        </div>

        <div id="history-list" class="hidden flex-col gap-3">
            <!-- 歷史卡片會透過 JS 動態產生於此 -->
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const VERSION = "v10.3"; // 🚀 綠色高質感地址版
        
        const LIFF_ID = "2008907691-fVLGsJtK"; 
        const BOOKING_LIFF_URL = 'https://liff.line.me/2008907691-CzDqd7mm'; 
        const OFFICIAL_PHONE = "0976981123"; 

        const firebaseConfig = { 
            databaseURL: "https://hualientaxi-bb32f-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "hualientaxi-bb32f" 
        };
        firebase.initializeApp(firebaseConfig);
        
        const db = firebase.database(); 
        const firestoreDb = firebase.firestore(); 
        
        let passengerId = "";

        window.onload = function() {
            liff.init({ liffId: LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
                liff.getProfile().then(profile => {
                    passengerId = profile.userId;
                    
                    document.getElementById('user-name-display').innerText = profile.displayName;
                    if(profile.pictureUrl) {
                        const avatar = document.getElementById('user-avatar');
                        avatar.src = profile.pictureUrl;
                        avatar.classList.remove('hidden');
                    }
                    
                    fetchHistory();
                }).catch(err => showError('無法取得使用者資料'));
            }).catch(err => showError('LIFF 初始化失敗'));
        };

        async function fetchHistory() {
            try {
                const snapshot = await firestoreDb.collection('trips')
                                                  .where('passengerId', '==', passengerId)
                                                  .orderBy('timestamp', 'desc')
                                                  .limit(10)
                                                  .get();

                document.getElementById('loading-state').classList.add('hidden');

                if (snapshot.empty) {
                    document.getElementById('empty-state').classList.remove('hidden');
                    document.getElementById('empty-state').classList.add('flex');
                    return;
                }

                let trips = [];
                snapshot.forEach(doc => trips.push(doc.data()));
                renderHistory(trips);

            } catch (error) {
                console.error("讀取歷史紀錄失敗:", error);
                document.getElementById('loading-state').classList.add('hidden');
                showError('伺服器連線異常，請稍後再試。');
            }
        }

        async function renderHistory(data) {
            const listContainer = document.getElementById('history-list');
            const countBadge = document.getElementById('total-count-badge');
            const countText = document.getElementById('total-trips');
            
            listContainer.innerHTML = '';
            
            let activeTripsCount = 0;

            for (let trip of data) {
                if(trip.isBlacklist === true) continue; 
                activeTripsCount++;

                let driverName = trip.driverName || "車隊司機";
                let driverCar = trip.carNo || "專屬座車";
                let contactPhone = trip.driverPhone || OFFICIAL_PHONE;
                
                // 🛡️ 兼容舊版：如果沒有名字，去 RTDB 撈
                if (!trip.driverName && trip.driverId) {
                    try {
                        let dSnap = await db.ref('drivers/' + trip.driverId).once('value');
                        if (dSnap.exists()) {
                            let dData = dSnap.val();
                            if (dData.name) driverName = dData.name;
                            if (dData.carNo || dData.car) driverCar = dData.carNo || dData.car;
                            if (dData.phone) contactPhone = dData.phone;
                        }
                    } catch (err) {}
                }

                let timeString = "未知時間";
                if (trip.timestamp) {
                    let d = trip.timestamp.toDate();
                    let mo = (d.getMonth() + 1).toString().padStart(2, '0');
                    let da = d.getDate().toString().padStart(2, '0');
                    let hr = d.getHours().toString().padStart(2, '0');
                    let mi = d.getMinutes().toString().padStart(2, '0');
                    timeString = `${mo}月${da}日 ${hr}:${mi}`;
                }

                const isCancelled = trip.status === 'cancelled' || trip.status === 'rejected';
                const badgeClass = isCancelled ? 'status-cancelled' : 'status-active';
                const statusIcon = isCancelled ? '<i class="fa-solid fa-xmark mr-1"></i>' : '<i class="fa-solid fa-check mr-1"></i>';
                const displayText = isCancelled ? '已取消' : '已完成';
                const cardOpacity = isCancelled ? 'opacity-60' : 'opacity-100';
                
                // 🚀 v10.3 讀取剛寫入的地址，沒有就給預設值
                const pickupAddr = trip.pickup || "上車點未紀錄";
                const dropoffAddr = trip.dropoff || "依乘客指示";

                let driverContactHtml = '';
                if (!isCancelled) {
                     driverContactHtml = `
                        <div class="mt-3 pt-3 border-t border-slate-100 flex justify-between items-center">
                            <div class="text-xs text-slate-400 font-bold flex items-center">
                                <i class="fa-solid fa-shield-halved mr-1 text-green-500"></i> 敬老愛心計程車
                            </div>
                            <a href="tel:${contactPhone}" class="bg-orange-50 hover:bg-orange-100 text-orange-600 font-bold py-1.5 px-4 rounded-xl transition-colors text-sm flex items-center justify-center border border-orange-200">
                                <i class="fa-solid fa-phone mr-1.5"></i> 尋找遺失物
                            </a>
                        </div>
                     `;
                }

                const cardHtml = `
                    <div class="history-card ${cardOpacity}">
                        <div class="flex justify-between items-start mb-3 border-b border-slate-100 pb-3">
                            <div>
                                <div class="text-[10px] text-slate-400 font-mono mb-1">車號：${driverCar}</div>
                                <div class="text-lg font-black text-slate-800">${timeString}</div>
                            </div>
                            <span class="status-badge ${badgeClass}">${statusIcon}${displayText}</span>
                        </div>
                        
                        <div class="flex items-center text-sm font-bold text-slate-700 mb-2">
                            <i class="fa-solid fa-circle-dot text-emerald-500 w-5 text-center mr-2"></i> ${pickupAddr}
                        </div>
                        <div class="flex items-center text-sm font-bold text-slate-700 mb-4">
                            <i class="fa-solid fa-location-dot text-rose-500 w-5 text-center mr-2"></i> ${dropoffAddr}
                        </div>
                        
                        <div class="flex items-center bg-slate-50 p-2 rounded-lg text-xs font-bold text-slate-500 mb-1">
                            <div class="w-6 text-center text-slate-400"><i class="fa-solid fa-user-tie"></i></div> 
                            <span class="text-slate-700">司機：${driverName}</span>
                        </div>
                        
                        ${driverContactHtml}
                    </div>
                `;
                listContainer.innerHTML += cardHtml;
            }
            
            countText.innerText = activeTripsCount;
            countBadge.classList.remove('hidden');
            countBadge.classList.add('flex');

            if (activeTripsCount > 0) {
                listContainer.classList.remove('hidden');
                listContainer.classList.add('flex');
            } else {
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('empty-state').classList.add('flex');
            }
        }

        function goToBooking() {
            window.location.href = BOOKING_LIFF_URL;
        }

        function showError(msg) {
            Swal.fire({
                icon: 'error', title: '讀取失敗', text: msg,
                confirmButtonColor: '#00C853', confirmButtonText: '確定'
            });
        }
    </script>
</body>
</html>
