<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <title>我的乘車紀錄 - 敬老愛心計程車</title> <meta name="apple-mobile-web-app-capable" content="yes">
  
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script> 
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { 
        margin: 0; padding: 0; 
        font-family: 'Noto Sans TC', -apple-system, sans-serif; 
        background-color: #f0f2f5; color: #333;
    }
    
    .header {
        background: linear-gradient(135deg, #00C853, #1B5E20);
        color: white; padding: 35px 20px 45px 20px;
        border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        box-shadow: 0 6px 20px rgba(0,200,83,0.3);
        text-align: center; position: relative;
    }
    
    .header h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: 1px; }
    .header p { margin: 8px 0 0 0; font-size: 16px; opacity: 0.9; font-weight: bold; }
    
    .history-container { padding: 0 20px 40px 20px; margin-top: -25px; position: relative; z-index: 10; }
    
    .trip-card {
        background: white; border-radius: 16px; padding: 18px; margin-bottom: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eee;
        display: flex; flex-direction: column; gap: 12px;
    }
    
    .trip-top { display: flex; justify-content: space-between; align-items: flex-start; }
    
    .trip-date {
        font-size: 14px; color: #888; font-weight: bold;
        display: flex; align-items: center; gap: 6px;
    }
    
    .trip-status {
        background: #e8f5e9; color: #2E7D32; padding: 4px 10px;
        border-radius: 20px; font-size: 12px; font-weight: 900; border: 1px solid #4CAF50;
    }
    
    .driver-info { display: flex; align-items: center; gap: 12px; }
    .driver-avatar {
        width: 55px; height: 55px; background: #eee; border-radius: 50%;
        display: flex; justify-content: center; align-items: center;
        color: #00C853; font-size: 24px; border: 2px solid #E0F2F1;
    }
    
    .driver-details h3 { margin: 0 0 4px 0; font-size: 20px; color: #222; font-weight: 900; }
    .driver-details p { margin: 0; font-size: 14px; color: #666; font-weight: bold; }
    
    .trip-bottom {
        border-top: 1px dashed #eee; padding-top: 12px;
        display: flex; justify-content: space-between; align-items: center;
    }
    
    .btn-lost {
        background: white; color: #E65100; border: 1px solid #FF9800;
        padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: bold;
        text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
        transition: background 0.2s;
    }
    .btn-lost:active { background: #FFF3E0; }
    
    .empty-state { text-align: center; padding: 50px 20px; color: #999; }
    .empty-state i { font-size: 60px; color: #ddd; margin-bottom: 15px; }
    .empty-state h3 { color: #555; font-size: 20px; margin-bottom: 8px; }
  </style>
</head>
<body>

  <div id="app" style="display: none;">
    <div class="header">
      <h1>🗂️ 近期乘車紀錄</h1>
      <p id="user-name">載入中...</p>
    </div>

    <div class="history-container" id="history-list">
      <div style="text-align: center; padding: 40px; color: #00C853;">
        <i class="fa-solid fa-circle-notch fa-spin fa-3x"></i>
        <p style="margin-top: 15px; font-weight: bold;">正在為您撈取近期紀錄...</p>
      </div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const VERSION = "v10.2"; 
    // ⚠️ 確保此 LIFF ID 是正確的歷史紀錄專用 ID
    const LIFF_ID = "2008907691-fVLGsJtK"; 
    
    // 官方客服電話 (當新快照機制找不到司機電話時的備用保命方案)
    const OFFICIAL_PHONE = "0976981123"; 

    const firebaseConfig = { 
        databaseURL: "https://hualientaxi-bb32f-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "hualientaxi-bb32f" 
    };
    firebase.initializeApp(firebaseConfig);
    
    const db = firebase.database(); 
    const firestoreDb = firebase.firestore(); 
    
    let passengerId = "";

    window.onload = async function() {
        await initLiff(); 
    };

    async function initLiff() { 
        try { 
            await liff.init({ liffId: LIFF_ID }); 
            if(!liff.isLoggedIn()) { 
                liff.login(); 
                return; 
            }

            const profile = await liff.getProfile();
            passengerId = profile.userId;
            document.getElementById('user-name').innerText = profile.displayName || "乘客您好";
            document.getElementById('app').style.display = 'block';

            fetchHistory();

        } catch(e) {
            console.error("LIFF 初始化錯誤:", e);
            Swal.fire({ icon: 'error', title: '系統錯誤', text: '請重新開啟網頁' });
        } 
    }

    async function fetchHistory() {
        try {
            const snapshot = await firestoreDb.collection('trips')
                                              .where('passengerId', '==', passengerId)
                                              .orderBy('timestamp', 'desc')
                                              .limit(10)
                                              .get();

            const container = document.getElementById('history-list');

            if (snapshot.empty) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-receipt"></i>
                        <h3>目前尚無紀錄</h3>
                        <p>您還沒有搭乘過我們的車喔！<br>期待為您服務。</p>
                    </div>
                `;
                return;
            }

            let trips = [];
            snapshot.forEach(doc => trips.push(doc.data()));

            let html = '';
            for (let trip of trips) {
                // 如果是黑名單紀錄，對乘客隱藏
                if(trip.isBlacklist === true) continue; 

                // 🚀 v10.2 核心改動：優先讀取 Firestore 裡的歷史快照 (Snapshot)
                let driverName = trip.driverName || "敬老計程車司機";
                let driverCar = trip.carNo || "專屬座車";
                let contactPhone = trip.driverPhone || OFFICIAL_PHONE;
                
                // 🛡️ 向下相容防呆：如果是以前舊版本產生的紀錄 (沒有快照)，才去 RTDB 查詢補救
                if (!trip.driverName && trip.driverId) {
                    try {
                        let dSnap = await db.ref('drivers/' + trip.driverId).once('value');
                        if (dSnap.exists()) {
                            let dData = dSnap.val();
                            if (dData.name) driverName = dData.name;
                            if (dData.carNo || dData.car) driverCar = dData.carNo || dData.car;
                            if (dData.phone) contactPhone = dData.phone;
                        }
                    } catch (err) { console.error("無法取得司機舊資料", err); }
                }

                // 格式化時間 (MM/DD HH:mm)
                let timeString = "未知時間";
                if (trip.timestamp) {
                    let d = trip.timestamp.toDate();
                    let mo = (d.getMonth() + 1).toString().padStart(2, '0');
                    let da = d.getDate().toString().padStart(2, '0');
                    let hr = d.getHours().toString().padStart(2, '0');
                    let mi = d.getMinutes().toString().padStart(2, '0');
                    timeString = `${mo}/${da} ${hr}:${mi}`;
                }

                html += `
                    <div class="trip-card">
                        <div class="trip-top">
                            <div class="trip-date"><i class="fa-regular fa-clock"></i> ${timeString}</div>
                            <div class="trip-status">已完成</div>
                        </div>
                        <div class="driver-info">
                            <div class="driver-avatar"><i class="fa-solid fa-taxi"></i></div>
                            <div class="driver-details">
                                <h3>${driverName}</h3>
                                <p>車號：${driverCar}</p>
                            </div>
                        </div>
                        <div class="trip-bottom">
                            <span style="font-size: 13px; color: #999;">由 敬老愛心計程車 服務</span>
                            <!-- 🚀 v10.2 尋找遺失物直接撥打該司機電話 -->
                            <a href="tel:${contactPhone}" class="btn-lost">
                                <i class="fa-solid fa-phone"></i> 尋找遺失物
                            </a>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html || `
                <div class="empty-state">
                    <i class="fa-solid fa-receipt"></i>
                    <h3>目前尚無有效紀錄</h3>
                </div>
            `;

        } catch (error) {
            console.error("讀取歷史紀錄失敗:", error);
            document.getElementById('history-list').innerHTML = `
                <div class="empty-state">
                    <i class="fa-solid fa-triangle-exclamation" style="color: #FF9800;"></i>
                    <h3>讀取失敗</h3>
                    <p>伺服器正在升級索引中<br>請稍後再試</p>
                </div>
            `;
        }
    }
  </script>
</body>
</html>
