<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的數位看板 (Pro)</title> // v8.2 個人輕量回傳版
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAIxc6PEhHgUs_A9lyRUg8dNbmwOpSamY8&libraries=geometry"></script>
    
    <style>
        .gmnoprint, .gm-control-active { display: none !important; }
        body { overflow: hidden; font-family: 'Noto Sans TC', sans-serif; } 

        .center-marker {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, calc(-100% + 2px));
            z-index: 20; pointer-events: none;
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
        }
        .center-marker.lifting { transform: translate(-50%, calc(-100% - 15px)); }

        .target-crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 16px; height: 16px; background-color: rgba(225, 29, 72, 0.15);
            border: 2px solid rgba(225, 29, 72, 0.5); border-radius: 50%;
            z-index: 19; pointer-events: none; display: flex; align-items: center; justify-content: center;
        }
        .target-crosshair::after { content: ''; width: 4px; height: 4px; background-color: #e11d48; border-radius: 50%; display: block; }

        #passenger-panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: white;
            border-top-left-radius: 24px; border-top-right-radius: 24px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1); z-index: 30; padding: 20px; padding-bottom: 30px;
            transform: translateY(0); transition: transform 0.3s ease-out; display: flex; flex-direction: column; gap: 10px;
        }

        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .btn-pulse { animation: pulse-green 2s infinite; }

        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
        .dot-online { background-color: #10B981; animation: pulse-opacity 1.5s infinite; }
        .dot-offline { background-color: #F59E0B; }
        @keyframes pulse-opacity { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .swal2-container { z-index: 99999 !important; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <div id="status-bar" class="bg-gray-800 text-white p-4 shadow-md z-50 flex items-center justify-between transition-all duration-500">
        <div class="flex items-center flex-grow" id="status-info-area">
            <img id="user-avatar" src="https://via.placeholder.com/40" class="w-12 h-12 rounded-full border-2 border-white mr-3 hidden">
            <div>
                <h2 id="welcome-text" class="text-lg font-bold leading-tight">資料載入中...</h2>
                <div class="flex items-center mt-1">
                    <p id="status-text" class="text-sm font-medium opacity-90">正在連線至車輛系統</p>
                    <span class="ml-2 px-2 py-0.5 bg-black/20 rounded-md text-[11px] border border-white/20 flex items-center">
                        <span id="conn-dot" class="status-dot dot-online"></span><span id="conn-text">即時連線</span>
                    </span>
                </div>
            </div>
        </div>
        
        <div id="distance-display" class="flex flex-col items-end justify-center bg-white/20 px-3 py-1.5 rounded-xl border border-white/30 ml-2 whitespace-nowrap min-w-[80px] shadow-inner">
            <span class="text-[10px] uppercase tracking-wider opacity-90 font-bold"><i class="fa-solid fa-location-arrow mr-1"></i>距離</span>
            <span id="dist-text" class="text-lg font-bold font-mono leading-none mt-0.5">計算中...</span>
        </div>
    </div>

    <div id="map" class="flex-grow w-full relative"></div>

    <div id="passenger-pin" class="center-marker">
        <div class="bg-slate-800 text-white text-[10px] font-bold px-3 py-1 rounded-full mb-1 shadow-lg tracking-wide opacity-90">上車地點</div>
        <i class="fa-solid fa-location-dot text-5xl text-rose-600 drop-shadow-xl filter contrast-125 leading-none m-0 p-0 block"></i>
    </div>
    <div id="passenger-shadow" class="target-crosshair"></div>

    <button id="btn-my-loc" onclick="panToCurrentLocation()" class="flex absolute bottom-48 right-4 bg-white w-12 h-12 rounded-full shadow-lg z-30 text-slate-700 active:bg-slate-100 active:scale-95 transition-all items-center justify-center border border-gray-100">
        <i class="fa-solid fa-crosshairs text-xl"></i>
    </button>

    <div id="passenger-panel">
        <div class="flex items-start space-x-3 mb-2">
            <i class="fa-solid fa-map-pin text-rose-500 text-xl mt-1"></i>
            <div>
                <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">目前定位地址</p>
                <h3 id="address-display" class="text-lg font-bold text-slate-800 leading-tight">讀取中...</h3>
            </div>
        </div>
        <div class="border-t border-gray-100 my-1"></div>
        <button onclick="summonDriver()" id="btn-send-loc" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-lg active:scale-[0.98] transition-all text-xl flex items-center justify-center space-x-2 btn-pulse">
            <i class="fa-solid fa-paper-plane"></i>
            <span>傳送位置至聊天室</span>
        </button>
    </div>

    <script>
        // ========= CONFIG 設定區 =========
        const VERSION = "v8.2"; // 個人輕量回傳版 - 脫離車隊系統，改為 LIFF 直接回傳聊天室
        const DRIVER_USER_ID = 'U467348846c6b1fa433990d7b75c935b5'; 
        const LIFF_ID = '2008907691-1mAjwojZ'; 
        // ====================================================

        let map, carMarker, geocoder;
        let passengerAddress = "定位中...";
        let passengerLatLng = null;
        let currentStatus = 'init';
        let lastGeocodePos = null;

        const firebaseConfig = { databaseURL: "https://hualientaxi-bb32f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const getPinIcon = (status) => {
            let color = '#7f8c8d'; 
            if (status === 'available') color = '#00C853'; 
            else if (status === 'queue') color = '#00B0FF'; 
            else if (status === 'busy') color = '#FF9800'; 
            return {
                path: "M0-48c-9.8 0-17.7 7.8-17.7 17.4 0 15.5 17.7 30.6 17.7 30.6s17.7-15.4 17.7-30.6c0-9.6-7.9-17.4-17.7-17.4z",
                fillColor: color, fillOpacity: 1, strokeColor: "#fff", strokeWeight: 2, scale: 1.1,
                labelOrigin: new google.maps.Point(0, -28) 
            };
        };

        const getPinLabel = (status) => {
            if (status === 'available') return { text: "空", color: "white", fontSize: "14px", fontWeight: "bold" };
            if (status === 'queue') return { text: "排", color: "white", fontSize: "14px", fontWeight: "bold" };
            if (status === 'busy') return { text: "載", color: "white", fontSize: "14px", fontWeight: "bold" };
            return { text: "休", color: "white", fontSize: "14px", fontWeight: "bold" };
        };

        window.onload = async function() {
            initMap();
            await initLiff();
            setupConnectionManager(); 
            startRealtimeRadar();     
        };

        function setupConnectionManager() {
            document.addEventListener("visibilitychange", () => {
                const dot = document.getElementById('conn-dot');
                const text = document.getElementById('conn-text');
                
                if (document.visibilityState === "visible") {
                    firebase.database().goOnline();
                    dot.className = "status-dot dot-online";
                    text.innerText = "即時連線";
                } else {
                    firebase.database().goOffline();
                    dot.className = "status-dot dot-offline";
                    text.innerText = "暫停同步";
                }
            });
        }

        function initMap() {
            geocoder = new google.maps.Geocoder();
            const hualienStation = { lat: 23.9933, lng: 121.6011 };
            
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 17, center: hualienStation, disableDefaultUI: true, gestureHandling: 'greedy'
            });

            carMarker = new google.maps.Marker({
                position: hualienStation, map: map, icon: getPinIcon('offline'), label: getPinLabel('offline'), title: "司機位置"
            });

            map.addListener('dragstart', () => {
                document.getElementById('passenger-pin').classList.add('lifting');
                document.getElementById('address-display').innerHTML = '<span class="text-gray-400">定位中...</span>';
                document.getElementById('btn-send-loc').disabled = true;
                document.getElementById('btn-send-loc').classList.add('opacity-50');
            });

            map.addListener('idle', () => {
                document.getElementById('passenger-pin').classList.remove('lifting');
                const center = map.getCenter();
                passengerLatLng = { lat: center.lat(), lng: center.lng() };
                
                updateDistanceDisplay();

                if (!lastGeocodePos || google.maps.geometry.spherical.computeDistanceBetween(lastGeocodePos, center) > 50) {
                    geocodePosition(center);
                    lastGeocodePos = center;
                } else {
                    document.getElementById('address-display').innerText = passengerAddress;
                    document.getElementById('btn-send-loc').disabled = false;
                    document.getElementById('btn-send-loc').classList.remove('opacity-50');
                }
            });

            panToCurrentLocation(); 
        }

        function geocodePosition(pos) {
            geocoder.geocode({ location: pos }, (results, status) => {
                if (status === "OK" && results[0]) {
                    let addr = results[0].formatted_address.replace(/^\d+\s*/, '').replace(/台灣/, '').replace(/花蓮縣/, '');
                    passengerAddress = addr;
                    document.getElementById('address-display').innerText = addr;
                } else {
                    document.getElementById('address-display').innerText = "未知的位置";
                }
                document.getElementById('btn-send-loc').disabled = false;
                document.getElementById('btn-send-loc').classList.remove('opacity-50');
            });
        }

        function panToCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const newPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    map.panTo(newPos);
                });
            }
        }

        function startRealtimeRadar() {
            db.ref('drivers/' + DRIVER_USER_ID).on('value', snapshot => {
                updateDriverUI(snapshot.val());
            }, err => console.error("Sync Error:", err));
        }

        function updateDriverUI(data) {
            let status = 'offline'; 

            if (data && data.status === 'online') { 
                if (data.workStatus === 'busy') status = 'busy';
                else if (data.workStatus === 'queue') status = 'queue';
                else status = 'available'; 
                
                const newPos = { lat: parseFloat(data.lat), lng: parseFloat(data.lng) };
                carMarker.setPosition(newPos);
            }

            if (currentStatus !== status) {
                currentStatus = status;
                carMarker.setIcon(getPinIcon(status));
                carMarker.setLabel(getPinLabel(status));
                updateStatusUI(status);
            }
            
            updateDistanceDisplay();
        }

        function updateDistanceDisplay() {
            const distSpan = document.getElementById('dist-text');
            if (currentStatus === 'offline' || !carMarker.getPosition() || !passengerLatLng) {
                distSpan.innerText = '---';
                return;
            }
            
            const dist = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(passengerLatLng.lat, passengerLatLng.lng),
                carMarker.getPosition()
            );
            
            if (dist < 1000) {
                distSpan.innerText = Math.round(dist) + ' m';
            } else {
                distSpan.innerText = (dist / 1000).toFixed(1) + ' km';
            }
        }

        function updateStatusUI(status) {
            const bar = document.getElementById('status-bar');
            const sub = document.getElementById('status-text');
            
            if (status === 'available') {
                bar.className = "bg-green-600 text-white p-4 shadow-md z-50 flex items-center justify-between transition-colors duration-500";
                sub.innerText = "🚕 空車，歡迎搭乘！";
            } else if (status === 'queue') {
                bar.className = "bg-blue-600 text-white p-4 shadow-md z-50 flex items-center justify-between transition-colors duration-500";
                sub.innerText = "🚕 排班中，歡迎預約！";
            } else if (status === 'busy') {
                bar.className = "bg-yellow-500 text-black p-4 shadow-md z-50 flex items-center justify-between transition-colors duration-500";
                sub.innerText = "🚫 載客中，請稍候。";
            } else {
                bar.className = "bg-gray-600 text-white p-4 shadow-md z-50 flex items-center justify-between transition-colors duration-500";
                sub.innerText = "💤 司機休息中";
            }
        }

        // 🚀 v8.2 核心改造：拔除 Firebase 寫入，改用 liff.sendMessages 直接回傳聊天室
        async function summonDriver() {
            if (!passengerLatLng) {
                Swal.fire({ icon: 'info', title: '請稍候', text: '正在為您精準定位中...', confirmButtonColor: '#10B981', timer: 2000 });
                return;
            }

            const btn = document.getElementById('btn-send-loc');
            const originalContent = btn.innerHTML;
            
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span>處理中...</span>';
            btn.disabled = true;

            try {
                if (!liff.isLoggedIn() || !liff.isInClient()) {
                    Swal.fire({ icon: 'warning', title: '無法發送', text: '請在 LINE 聊天室內開啟此網頁，才能自動回傳地址喔！', confirmButtonColor: '#F59E0B' });
                    return;
                }

                // 組合要傳送到聊天室的文字訊息
                const messageText = `🚕 司機大哥您好，我要叫車！\n\n📍 我的上車點：\n${passengerAddress}\n\n🌐 點此開啟 Google 導航：\nhttps://www.google.com/maps/search/?api=1&query=${passengerLatLng.lat},${passengerLatLng.lng}`;

                // 透過 LIFF 代替使用者在聊天室發言
                await liff.sendMessages([
                    {
                        type: 'text',
                        text: messageText
                    }
                ]);

                // 傳送成功後，提示並直接關閉網頁
                Swal.fire({
                    icon: 'success',
                    title: '定位已傳送！',
                    text: '請在聊天室與司機確認叫車細節。',
                    showConfirmButton: false,
                    timer: 1500
                }).then(() => {
                    liff.closeWindow(); // 瞬間回到 LINE 聊天室
                });

            } catch (error) {
                console.error("發送失敗:", error);
                Swal.fire({ icon: 'error', title: '傳送失敗', text: '請手動複製地址，或直接在聊天室留言。', confirmButtonColor: '#EF4444' });
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('user-avatar').src = profile.pictureUrl;
                    document.getElementById('user-avatar').style.display = 'block';
                    document.getElementById('welcome-text').innerText = `你好，${profile.displayName}`;
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error('LIFF Init Error', err);
            }
        }
    </script>
</body>
</html>
