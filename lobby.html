<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>花蓮敬老車隊 // v10.7 搶單大廳 (通訊回傳版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2MRjJ50mEZ7McwcHPKqq1IQU-mlJKczk",
            authDomain: "hualientaxi-bb32f.firebaseapp.com",
            databaseURL: "https://hualientaxi-bb32f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hualientaxi-bb32f",
            storageBucket: "hualientaxi-bb32f.firebasestorage.app",
            messagingSenderId: "553275317473",
            appId: "1:553275317473:web:ae33f273c97c5c309ceba0"
        };
        
        // 🔥 請確認這是你最新部署的 GAS 網址！
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzVTtBzYxPy9g-WnaJPS_Q_8GnzmWDf4Kaw7nA8VeDfe6ykM5rV3C2MmMddMh3AG6c9/exec"; 

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>

    <style>
        html, body { width: 100%; height: 100%; background-color: #121212; color: #ffffff; font-family: -apple-system, Roboto, sans-serif; margin: 0; padding: 0; overflow: hidden; touch-action: none; }
        #app-container { max-width: 480px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }
        .app-header { background: #1A1A1A; padding: 15px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; z-index: 50; flex-shrink: 0; }
        .radar-ping { width: 12px; height: 12px; background-color: #00C853; border-radius: 50%; box-shadow: 0 0 10px #00C853; animation: ping 2s infinite; }
        
        #order-list { flex: 1; padding: 15px; display: flex; flex-direction: row; gap: 15px; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; align-items: center; }
        #order-list::-webkit-scrollbar { display: none; } 

        .order-card { background: #1A1A1A; border-radius: 20px; padding: 20px; border: 2px solid #00B0FF; box-shadow: 0 10px 30px rgba(0, 176, 255, 0.15); animation: slideIn 0.3s ease-out; position: relative; overflow: hidden; flex: 0 0 88%; scroll-snap-align: center; max-height: 90%; display: flex; flex-direction: column; justify-content: space-between;}
        .order-card.taken { border-color: #555; opacity: 0.5; filter: grayscale(100%); pointer-events: none; }
        .address-big { color: #00B0FF; font-size: 24px; font-weight: 900; letter-spacing: 1px; margin: 10px 0; line-height: 1.3; word-break: break-all;}

        .btn-snatch { background: linear-gradient(135deg, #00C853, #1B5E20); color: white; width: 100%; padding: 16px; border-radius: 15px; font-size: 20px; font-weight: 900; border: 2px solid #00E676; box-shadow: 0 6px 20px rgba(0, 200, 83, 0.4); display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; margin-top: 15px; }
        .btn-snatch:active { transform: scale(0.95); }
        .btn-snatch.disabled { background: #333; border-color: #555; box-shadow: none; cursor: not-allowed; color: #888; }

        @keyframes ping { 0% { transform: scale(1); opacity: 1; } 75%, 100% { transform: scale(2.5); opacity: 0; } }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .swal2-popup { background-color: #1E1E1E !important; color: white !important; border-radius: 24px !important; }
        .swal2-title { color: white !important; font-weight: 900 !important; }
        .swal2-html-container { color: #aaa !important; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="app-header">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-bolt text-purple-400 text-xl"></i>
            <div class="flex flex-col">
                <span class="text-lg font-black tracking-wider text-white" id="header-title">📋 搶單大廳</span>
                <span id="swipe-hint" class="text-[10px] text-yellow-400 font-bold hidden animate-pulse">👉 左右滑動可看更多訂單</span>
            </div>
        </div>
        <div class="flex items-center gap-2 bg-gray-800 px-3 py-1.5 rounded-full border border-gray-700">
            <div class="radar-ping"></div>
            <span class="text-xs font-bold text-green-400">連線中</span>
        </div>
    </div>

    <div id="order-list">
        <div id="empty-state" class="flex flex-col items-center justify-center w-full h-full opacity-50">
            <i class="fa-solid fa-radar text-6xl mb-4 text-gray-600"></i>
            <p class="text-lg font-bold text-gray-400">目前大廳無任務</p>
            <p class="text-sm text-gray-500 mt-2">所有訂單皆已被承接</p>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const myDriverId = urlParams.get('driverId') || 'TDP-TESTER';
    const myDriverName = urlParams.get('driverName') || myDriverId; 
    // 🚀 v10.7：讀取司機電話
    const myDriverPhone = urlParams.get('driverPhone') || ''; 
    
    document.getElementById('header-title').innerHTML = `📋 搶單大廳 <span class="text-xs text-gray-500 ml-1">(${myDriverName})</span>`;

    const orderList = document.getElementById('order-list');
    const emptyState = document.getElementById('empty-state');
    const swipeHint = document.getElementById('swipe-hint');

    let audioCtx = null;
    let knownOrderIds = new Set();

    function playDingDong() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc1 = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc1.type = 'sine'; osc2.type = 'sine';
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
            osc1.frequency.setValueAtTime(880, audioCtx.currentTime); osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.3); 
            osc1.start(audioCtx.currentTime); osc1.stop(audioCtx.currentTime + 0.3);
            osc2.start(audioCtx.currentTime + 0.3); osc2.stop(audioCtx.currentTime + 1);
        } catch (e) { console.log(e); }
    }

    document.body.addEventListener('click', () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }, { once: true });

    const ordersRef = database.ref('fleet_orders');
    
    ordersRef.on('value', (snapshot) => {
        if (!snapshot.exists()) {
            orderList.innerHTML = ''; orderList.appendChild(emptyState);
            emptyState.style.display = 'flex'; swipeHint.classList.add('hidden');
            knownOrderIds.clear(); return;
        }

        const orders = snapshot.val();
        let pendingCount = 0;
        orderList.innerHTML = ''; 

        Object.keys(orders).reverse().forEach(orderId => {
            const order = orders[orderId];
            if (order.status === 'pending') {
                pendingCount++;
                if (!knownOrderIds.has(orderId)) { knownOrderIds.add(orderId); playDingDong(); }
                renderOrderCard(orderId, order);
            }
        });

        if (pendingCount > 0) {
            emptyState.style.display = 'none';
            if (pendingCount > 1) { swipeHint.classList.remove('hidden'); } 
            else { swipeHint.classList.add('hidden'); }
        } else {
            orderList.appendChild(emptyState); emptyState.style.display = 'flex'; swipeHint.classList.add('hidden');
        }
    });

    function renderOrderCard(orderId, data) {
        const card = document.createElement('div');
        card.className = `order-card`;
        card.id = `card-${orderId}`;

        const noteHtml = data.note ? `<span class="text-xs bg-gray-700 px-2 py-1 rounded text-white ml-2 border border-gray-600">${data.note}</span>` : '';

        card.innerHTML = `
            <div>
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-2">
                        <span class="bg-red-600 text-white text-[11px] px-2 py-1 rounded shadow-sm border border-red-500 animate-pulse font-black"><i class="fa-solid fa-fire mr-1"></i>總台派單</span>
                        <span class="text-gray-400 text-xs font-bold font-mono">#${orderId.substring(0, 6)}</span>
                    </div>
                    <span class="text-yellow-400 text-sm font-bold bg-yellow-400/10 px-2 py-1 rounded-lg border border-yellow-400/20"><i class="fa-solid fa-clock mr-1"></i>${data.time || '即時單'}</span>
                </div>

                <div class="address-big">🚕 ${data.pickup || '上車點未提供'}</div>

                <div class="flex flex-col gap-3 mt-4 text-gray-300 font-bold text-sm bg-gray-800/50 p-3 rounded-xl border border-gray-700/50">
                    <div class="flex items-start gap-2">
                        <div class="w-6 text-center mt-0.5"><i class="fa-solid fa-flag-checkered text-red-400"></i></div>
                        <span class="leading-tight">下車：<span class="text-white">${data.dropoff || '依乘客指示'}</span></span>
                    </div>
                    <div class="flex items-start gap-2">
                        <div class="w-6 text-center mt-0.5"><i class="fa-solid fa-user text-blue-400"></i></div>
                        <span class="leading-tight">乘客：<span class="text-white">${data.passengerName || '總台派發'}</span> ${noteHtml}</span>
                    </div>
                </div>
            </div>

            <button class="btn-snatch" id="btn-${orderId}" onclick="snatchOrder('${orderId}', this)">
                <i class="fa-solid fa-bolt"></i> ⚡ 立即搶單
            </button>
        `;
        orderList.appendChild(card);
    }

    function snatchOrder(orderId, btn) {
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 系統判定中...';
        btn.classList.add('disabled'); btn.disabled = true;
        const orderRef = database.ref(`fleet_orders/${orderId}`);

        orderRef.transaction((currentData) => {
            if (currentData === null || currentData.status !== 'pending') return; 
            currentData.status = 'taken'; currentData.takenBy = myDriverId; currentData.takenAt = firebase.database.ServerValue.TIMESTAMP;
            return currentData; 
        }, (error, committed, snapshot) => {
            if (error) { showErrorSwal("網路異常", "系統連線錯誤，請重試！"); } 
            else if (!committed) {
                const card = document.getElementById(`card-${orderId}`);
                if(card) { card.classList.add('taken'); btn.innerHTML = '<i class="fa-solid fa-ban"></i> 已被其他司機搶走'; setTimeout(() => card.remove(), 2000); }
                showErrorSwal("手速太慢！", "該訂單剛好被其他司機搶先一步接走了！");
            } else {
                Swal.fire({
                    icon: 'success', title: '⚡ 搶單成功！',
                    html: '<div style="font-size:18px; font-weight:bold; color:#00C853; margin-bottom:10px;">任務已同步至主機！</div><div style="color:#aaa;">請<b style="color:white;">向下滑動</b>關閉大廳，<br>回地圖直接聯繫乘客！</div>',
                    confirmButtonText: '⬇️ 往下滑動關閉', confirmButtonColor: '#00C853', allowOutsideClick: false
                });
                
                const orderData = snapshot.val();
                
                // 🚀 v10.7 回傳給試算表：一併加上 driverPhone
                if (GAS_WEB_APP_URL && GAS_WEB_APP_URL.includes('script.google.com')) {
                    fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'orderTaken',
                            orderId: orderId,
                            driverId: myDriverId,
                            driverName: myDriverName,
                            driverPhone: myDriverPhone // <-- 傳回司機電話
                        })
                    }).catch(e => console.log("回報試算表失敗", e));
                }

                database.ref(`drivers/${myDriverId}/request`).set({
                    userId: "fleet_order", 
                    userName: orderData.passengerName || "總台派單",
                    userPhone: orderData.phone || "",
                    lat: 0, lng: 0,
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    note: (orderData.pickup || "指定地點") + "｜總台單", 
                    fleetOrderId: orderId
                });
                database.ref(`drivers/${myDriverId}`).update({ workStatus: 'busy' });
            }
        });
    }

    function showErrorSwal(title, text) { Swal.fire({ icon: 'error', title: title, text: text, confirmButtonText: '確定', confirmButtonColor: '#555' }); }
</script>
</body>
</html>
