<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 支援系統深色模式設定 -->
    <meta name="color-scheme" content="light dark">
    <title>花蓮路名對照表</title>
    <!-- v1.7 終極實戰版：一鍵導航、盲打容錯與夜間模式 -->
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* 禁止文字雙擊選取，避免高齡者誤觸 */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* 隱藏捲軸但保留捲動功能 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .scroll-smooth {
            scroll-behavior: smooth;
        }

        /* SweetAlert2 深色模式適配 */
        @media (prefers-color-scheme: dark) {
            .swal2-popup {
                background-color: #1f2937 !important; /* bg-gray-800 */
                color: #f9fafb !important; /* text-gray-50 */
            }
            .swal2-title, .swal2-html-container {
                color: #f9fafb !important;
            }
            .swal2-icon.swal2-success [class^=swal2-success-line] {
                background-color: #34d399 !important; /* emerald-400 */
            }
            .swal2-icon.swal2-success .swal2-success-ring {
                border-color: rgba(52, 211, 153, 0.3) !important;
            }
        }
    </style>
</head>
<body class="font-sans antialiased h-screen flex flex-col bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <!-- 頂部固定搜尋區 -->
    <header class="shadow-sm z-10 sticky top-0 px-4 pt-3 pb-2 border-b-2 border-blue-500 dark:border-blue-400 bg-white dark:bg-gray-900 transition-colors duration-300">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-[20px] font-bold text-center text-blue-800 dark:text-blue-400 mb-2 tracking-wide flex items-center justify-center gap-1">
                🚕 花蓮路名快速翻譯
            </h1>
            <div class="relative">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="w-full pl-10 pr-10 py-3 text-lg border-2 border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:border-blue-600 dark:focus:border-blue-400 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-900/50 transition-all shadow-sm placeholder-gray-400 dark:placeholder-gray-500"
                    placeholder="輸入英文或中文路名..."
                    autocomplete="off"
                >
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-6 w-6 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <button id="clearBtn" class="absolute inset-y-0 right-0 pr-3 flex items-center hidden text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
                     <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- 橫向字首快選列 -->
            <div class="relative mt-2 -mx-4 px-4">
                <nav class="overflow-x-auto scroll-smooth hide-scrollbar">
                    <div id="alphabetFilter" class="flex gap-2 pb-2 min-w-max pr-8">
                        <!-- JS 動態生成字首按鈕 -->
                    </div>
                </nav>
                <!-- 漸層遮罩，適應深淺色模式 -->
                <div class="absolute right-0 top-0 bottom-2 w-8 bg-gradient-to-l from-white dark:from-gray-900 to-transparent pointer-events-none transition-colors duration-300"></div>
            </div>
        </div>
    </header>

    <!-- 列表顯示區 -->
    <main class="flex-1 overflow-y-auto p-4 hide-scrollbar">
        <div id="roadList" class="max-w-3xl mx-auto space-y-3 pb-8">
            <!-- 道路卡片將由 JavaScript 動態生成於此 -->
        </div>
        
        <div id="noResult" class="hidden text-center py-10">
            <p class="text-xl text-gray-500 dark:text-gray-400 font-bold">找不到符合的路名 😢</p>
            <p class="text-base text-gray-400 dark:text-gray-500 mt-2">請嘗試輸入其他拼音或中文</p>
        </div>
    </main>

    <script>
        // 1. 資料庫 (v1.2 擴充版)
        const rawData = [
            "Beibu北埔", "Beian北安", "Bo’ai博愛", "Beichang北昌", "Beixing北興",
            "Chang’an長安", "Cihui慈惠", "Ciyun慈雲", "Chenghong城中", "Dade大德",
            "Dean德安", "Dongxing東興", "Fu’an富安", "Fuyu富裕", "Fuji富吉",
            "Fuyang富陽", "Fuqiang富強", "Fuxiang富翔", "Fengcun豐村", "Fuxing復興",
            "Fuhou府後", "Fuqian府前", "Fuguang福光", "Yancheng干城", "Guoxing國興",
            "Guosheng國盛", "Guomin國民", "Guolian國聯", "Guofu國富", "Guofu國福",
            "Guangfu光復", "Gangkou港口", "Gangbin港濱", "Guanghua光華", "Hai’an海岸",
            "Heping和平", "Huadao化道", "Huamin華民", "Huaxia華夏", "Huaxing華興",
            "Huade華德", "Huaxi華西", "Huafu華富", "Huayang華陽", "Huacheng華城",
            "Ji’an吉安", "Jilin吉林", "Jici濟慈", "Jianguo建國", "Jianhua建華",
            "Jianxing建興", "Jian’an建安", "Jielin介林", "Jiezhi介智", "Jiande建德",
            "Jianxin建信", "Jiancheng建成", "Jingmei精美", "Linyuan林園", "Minguo民國",
            "Minzhi民治", "Minxiao民孝", "Minyou民有", "Minzu民族", "Minqin民勤",
            "Minsheng民生", "Minquan民權", "Minxiang民享", "Mingtan明潭", "Mingyi明義",
            "Mingren明仁", "Meigong美工", "Nanhai南海", "Nanhua南華", "Qiulun球崙",
            "Qixing七星", "Qingnan慶南", "Qingbei慶北", "Qingfeng慶豐", "Ren’ai仁愛",
            "Shengan勝安", "Shangzhi尚志", "Shunxing順興", "Yumin裕民", "Xinxing新興",
            "Xingang新港", "Xinyi信義", "Zhongshan中山", "Zhongyang中央", "Zhongfu中福",
            "Zhonghe中和", "Zhongqiang中強", "Zhongyuan中原", "Zhongshun中順", "Zhongmei中美",
            "Ziyou自由", "Changchun長春", "Zuocang佐倉",
            "Zhongzheng中正", "Zhonghua中華", "Linsen林森", "Chongqing重慶", "Nanbin南濱",
            "Beibin北濱", "Haibin海濱", "Datong大同", "Jinfeng進豐", "Xuanyuan軒轅",
            "Ziqiang自強", "Zili自立", "Taichang太昌", "Zhijiaxuan知卡宣", "Nanshan南山",
            "Jiali嘉里", "Jialin佳林", "Xincheng新城", "Suhua蘇花"
        ];

        const roads = rawData.map(item => {
            const cleanItem = item.trim().replace(/\s/g, ''); 
            const match = cleanItem.match(/^([a-zA-Z’]+)([\u4e00-\u9fa5]+)$/);
            
            if (match) {
                return { pinyin: match[1], zh: match[2] };
            } else {
                console.warn("無法解析的路名格式:", item);
                return { pinyin: cleanItem, zh: cleanItem }; 
            }
        });

        roads.sort((a, b) => a.pinyin.localeCompare(b.pinyin));

        // 2. DOM 綁定
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const roadList = document.getElementById('roadList');
        const noResult = document.getElementById('noResult');
        const alphabetFilterContainer = document.getElementById('alphabetFilter');
        
        let currentAlphabet = 'ALL';
        const alphabets = [...new Set(roads.map(r => r.pinyin.charAt(0).toUpperCase()))].sort();

        // 3. 渲染字首列
        function renderAlphabets() {
            alphabetFilterContainer.innerHTML = '';
            
            const allBtn = document.createElement('button');
            allBtn.textContent = '全部';
            allBtn.className = getAlphabetBtnClass('ALL');
            allBtn.onclick = () => filterByAlphabet('ALL');
            alphabetFilterContainer.appendChild(allBtn);

            alphabets.forEach(letter => {
                const btn = document.createElement('button');
                btn.textContent = letter;
                btn.className = getAlphabetBtnClass(letter);
                btn.onclick = () => filterByAlphabet(letter);
                alphabetFilterContainer.appendChild(btn);
            });
        }

        function getAlphabetBtnClass(letter) {
            const baseClass = "px-5 py-2 rounded-xl text-xl font-bold transition-colors flex-shrink-0 border-2 ";
            if (currentAlphabet === letter) {
                return baseClass + "bg-blue-600 text-white border-blue-600 shadow-md";
            } else {
                // 適應深色模式的按鈕狀態
                return baseClass + "bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400 border-gray-300 dark:border-gray-600 active:bg-gray-200 dark:active:bg-gray-700";
            }
        }

        function filterByAlphabet(letter) {
            currentAlphabet = letter;
            searchInput.value = ''; 
            clearBtn.classList.add('hidden');
            renderAlphabets(); 

            if (letter === 'ALL') {
                renderList(roads);
            } else {
                const filtered = roads.filter(r => r.pinyin.toUpperCase().startsWith(letter));
                renderList(filtered);
            }
        }

        // 4. 渲染列表 (AgeTech 三按鈕設計：發音、複製、地圖)
        function renderList(dataToRender) {
            roadList.innerHTML = ''; 

            if (dataToRender.length === 0) {
                noResult.classList.remove('hidden');
            } else {
                noResult.classList.add('hidden');
                
                dataToRender.forEach(road => {
                    const card = document.createElement('div');
                    card.className = "road-card bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm border border-gray-200 dark:border-gray-700 flex justify-between items-center transition-colors";
                    
                    card.innerHTML = `
                        <div class="flex-1 pr-1">
                            <div class="text-[26px] font-black text-blue-900 dark:text-blue-400 tracking-wide leading-tight">${road.pinyin}</div>
                            <div class="text-[20px] font-bold text-gray-700 dark:text-gray-300 mt-1">${road.zh}</div>
                        </div>
                        <div class="flex gap-2">
                            <!-- 語音按鈕 (綠色) -->
                            <button class="w-[44px] h-[44px] rounded-full border-[2px] border-green-200 dark:border-green-800 bg-green-50 dark:bg-green-900/30 flex items-center justify-center text-green-600 dark:text-green-400 flex-shrink-0 active:bg-green-200 dark:active:bg-green-800 transition-colors" onclick="speakText('${road.zh}', event)">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                                </svg>
                            </button>
                            <!-- 複製按鈕 (紫色/灰藍) -->
                            <button class="w-[44px] h-[44px] rounded-full border-[2px] border-indigo-200 dark:border-indigo-800 bg-indigo-50 dark:bg-indigo-900/30 flex items-center justify-center text-indigo-600 dark:text-indigo-400 flex-shrink-0 active:bg-indigo-200 dark:active:bg-indigo-800 transition-colors" onclick="copyToClipboard('${road.zh}', event)">
                                <svg class="w-5 h-5 ml-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                                </svg>
                            </button>
                            <!-- 導航按鈕 (紅色) : 終極殺手鐧 -->
                            <a href="https://www.google.com/maps/search/?api=1&query=花蓮+${road.zh}" target="_blank" rel="noopener noreferrer" class="w-[44px] h-[44px] rounded-full border-[2px] border-red-200 dark:border-red-800 bg-red-50 dark:bg-red-900/30 flex items-center justify-center text-red-600 dark:text-red-400 flex-shrink-0 active:bg-red-200 dark:active:bg-red-800 transition-colors" onclick="event.stopPropagation()">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                            </a>
                        </div>
                    `;
                    roadList.appendChild(card);
                });
            }
        }

        // 5. 語音播報功能
        function speakText(text, event) {
            event.stopPropagation();
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.9; 
                window.speechSynthesis.speak(utterance);
            } else {
                Swal.fire('系統提示', '您的裝置不支援語音功能', 'warning');
            }
        }

        // 6. 複製到剪貼簿功能
        function copyToClipboard(text, event) {
            event.stopPropagation();
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                Swal.fire({
                    title: '已複製',
                    text: text, 
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false,
                    position: 'center',
                    customClass: {
                        title: 'text-3xl font-bold',
                        popup: 'rounded-3xl',
                        htmlContainer: 'text-2xl font-bold mt-2'
                    }
                });
            } catch (err) {
                Swal.fire({
                    title: '複製失敗',
                    text: '請手動輸入',
                    icon: 'error',
                    confirmButtonText: '我知道了',
                    confirmButtonColor: '#3b82f6',
                    customClass: {
                        title: 'text-2xl font-bold',
                        popup: 'rounded-3xl'
                    }
                });
            } finally {
                document.body.removeChild(textArea);
            }
        }

        // 7. 搜尋邏輯 (加入正規表達式盲打容錯)
        function handleSearch() {
            // 將輸入文字去除所有空白與單引號 (容錯處理)
            const rawQuery = searchInput.value.toLowerCase();
            const safeQuery = rawQuery.replace(/['’\s]/g, '');
            
            if (rawQuery.length > 0) {
                clearBtn.classList.remove('hidden');
                if (currentAlphabet !== 'ALL') {
                    currentAlphabet = 'ALL';
                    renderAlphabets();
                }
            } else {
                clearBtn.classList.add('hidden');
            }

            const filteredRoads = roads.filter(road => {
                // 資料庫中的拼音也去除引號做比對
                const safePinyin = road.pinyin.toLowerCase().replace(/['’\s]/g, '');
                return safePinyin.includes(safeQuery) || road.zh.includes(safeQuery);
            });

            renderList(filteredRoads);
        }

        searchInput.addEventListener('input', handleSearch);
        
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            handleSearch();
            searchInput.focus(); 
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                searchInput.blur(); 
            }
        });

        // 8. 初始化
        renderAlphabets();
        renderList(roads);

    </script>
</body>
</html>
