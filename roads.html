<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>花蓮路名對照表</title>
    <!-- v1.5 介面優化與雙效按鈕（語音＋複製） -->
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* 禁止文字雙擊選取，避免高齡者誤觸 */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background-color: #f3f4f6; 
        }

        /* 隱藏捲軸但保留捲動功能 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .scroll-smooth {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased h-screen flex flex-col">

    <!-- 頂部固定搜尋區 (瘦身版) -->
    <header class="bg-white shadow-sm z-10 sticky top-0 px-4 pt-3 pb-2 border-b-2 border-blue-500">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-[20px] font-bold text-center text-blue-800 mb-2 tracking-wide flex items-center justify-center gap-1">
                🚕 花蓮路名快速翻譯
            </h1>
            <div class="relative">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="w-full pl-10 pr-10 py-3 text-lg border-2 border-gray-300 rounded-xl focus:outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition-all shadow-sm"
                    placeholder="輸入英文或中文路名..."
                    autocomplete="off"
                >
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-6 w-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <button id="clearBtn" class="absolute inset-y-0 right-0 pr-3 flex items-center hidden text-gray-400 hover:text-gray-600">
                     <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- 橫向字首快選列 (含右側漸層暗示) -->
            <div class="relative mt-2 -mx-4 px-4">
                <nav class="overflow-x-auto scroll-smooth hide-scrollbar">
                    <div id="alphabetFilter" class="flex gap-2 pb-2 min-w-max pr-8">
                        <!-- JS 動態生成字首按鈕 -->
                    </div>
                </nav>
                <!-- 漸層遮罩，提示右側還有內容 -->
                <div class="absolute right-0 top-0 bottom-2 w-8 bg-gradient-to-l from-white to-transparent pointer-events-none"></div>
            </div>
        </div>
    </header>

    <!-- 列表顯示區 -->
    <main class="flex-1 overflow-y-auto p-4 hide-scrollbar">
        <div id="roadList" class="max-w-3xl mx-auto space-y-3 pb-8">
            <!-- 道路卡片將由 JavaScript 動態生成於此 -->
        </div>
        
        <div id="noResult" class="hidden text-center py-10">
            <p class="text-xl text-gray-500 font-bold">找不到符合的路名 😢</p>
            <p class="text-base text-gray-400 mt-2">請嘗試輸入其他拼音或中文</p>
        </div>
    </main>

    <script>
        // 1. 資料庫 (v1.2 擴充版)
        const rawData = [
            "Beibu北埔", "Beian北安", "Bo’ai博愛", "Beichang北昌", "Beixing北興",
            "Chang’an長安", "Cihui慈惠", "Ciyun慈雲", "Chenghong城中", "Dade大德",
            "Dean德安", "Dongxing東興", "Fu’an富安", "Fuyu富裕", "Fuji富吉",
            "Fuyang富陽", "Fuqiang富強", "Fuxiang富翔", "Fengcun豐村", "Fuxing復興",
            "Fuhou府後", "Fuqian府前", "Fuguang福光", "Yancheng干城", "Guoxing國興",
            "Guosheng國盛", "Guomin國民", "Guolian國聯", "Guofu國富", "Guofu國福",
            "Guangfu光復", "Gangkou港口", "Gangbin港濱", "Guanghua光華", "Hai’an海岸",
            "Heping和平", "Huadao化道", "Huamin華民", "Huaxia華夏", "Huaxing華興",
            "Huade華德", "Huaxi華西", "Huafu華富", "Huayang華陽", "Huacheng華城",
            "Ji’an吉安", "Jilin吉林", "Jici濟慈", "Jianguo建國", "Jianhua建華",
            "Jianxing建興", "Jian’an建安", "Jielin介林", "Jiezhi介智", "Jiande建德",
            "Jianxin建信", "Jiancheng建成", "Jingmei精美", "Linyuan林園", "Minguo民國",
            "Minzhi民治", "Minxiao民孝", "Minyou民有", "Minzu民族", "Minqin民勤",
            "Minsheng民生", "Minquan民權", "Minxiang民享", "Mingtan明潭", "Mingyi明義",
            "Mingren明仁", "Meigong美工", "Nanhai南海", "Nanhua南華", "Qiulun球崙",
            "Qixing七星", "Qingnan慶南", "Qingbei慶北", "Qingfeng慶豐", "Ren’ai仁愛",
            "Shengan勝安", "Shangzhi尚志", "Shunxing順興", "Yumin裕民", "Xinxing新興",
            "Xingang新港", "Xinyi信義", "Zhongshan中山", "Zhongyang中央", "Zhongfu中福",
            "Zhonghe中和", "Zhongqiang中強", "Zhongyuan中原", "Zhongshun中順", "Zhongmei中美",
            "Ziyou自由", "Changchun長春", "Zuocang佐倉",
            "Zhongzheng中正", "Zhonghua中華", "Linsen林森", "Chongqing重慶", "Nanbin南濱",
            "Beibin北濱", "Haibin海濱", "Datong大同", "Jinfeng進豐", "Xuanyuan軒轅",
            "Ziqiang自強", "Zili自立", "Taichang太昌", "Zhijiaxuan知卡宣", "Nanshan南山",
            "Jiali嘉里", "Jialin佳林", "Xincheng新城", "Suhua蘇花"
        ];

        const roads = rawData.map(item => {
            const cleanItem = item.trim().replace(/\s/g, ''); 
            const match = cleanItem.match(/^([a-zA-Z’]+)([\u4e00-\u9fa5]+)$/);
            
            if (match) {
                return { pinyin: match[1], zh: match[2] };
            } else {
                console.warn("無法解析的路名格式:", item);
                return { pinyin: cleanItem, zh: cleanItem }; 
            }
        });

        roads.sort((a, b) => a.pinyin.localeCompare(b.pinyin));

        // 2. DOM 綁定
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const roadList = document.getElementById('roadList');
        const noResult = document.getElementById('noResult');
        const alphabetFilterContainer = document.getElementById('alphabetFilter');
        
        let currentAlphabet = 'ALL';
        const alphabets = [...new Set(roads.map(r => r.pinyin.charAt(0).toUpperCase()))].sort();

        // 3. 渲染字首列
        function renderAlphabets() {
            alphabetFilterContainer.innerHTML = '';
            
            const allBtn = document.createElement('button');
            allBtn.textContent = '全部';
            allBtn.className = getAlphabetBtnClass('ALL');
            allBtn.onclick = () => filterByAlphabet('ALL');
            alphabetFilterContainer.appendChild(allBtn);

            alphabets.forEach(letter => {
                const btn = document.createElement('button');
                btn.textContent = letter;
                btn.className = getAlphabetBtnClass(letter);
                btn.onclick = () => filterByAlphabet(letter);
                alphabetFilterContainer.appendChild(btn);
            });
        }

        function getAlphabetBtnClass(letter) {
            const baseClass = "px-5 py-2 rounded-xl text-xl font-bold transition-colors flex-shrink-0 border-2 ";
            if (currentAlphabet === letter) {
                return baseClass + "bg-blue-600 text-white border-blue-600 shadow-md";
            } else {
                return baseClass + "bg-white text-gray-500 border-gray-300 active:bg-gray-200";
            }
        }

        function filterByAlphabet(letter) {
            currentAlphabet = letter;
            searchInput.value = ''; 
            clearBtn.classList.add('hidden');
            renderAlphabets(); 

            if (letter === 'ALL') {
                renderList(roads);
            } else {
                const filtered = roads.filter(r => r.pinyin.toUpperCase().startsWith(letter));
                renderList(filtered);
            }
        }

        // 4. 渲染列表 (AgeTech 雙按鈕設計)
        function renderList(dataToRender) {
            roadList.innerHTML = ''; 

            if (dataToRender.length === 0) {
                noResult.classList.remove('hidden');
            } else {
                noResult.classList.add('hidden');
                
                dataToRender.forEach(road => {
                    const card = document.createElement('div');
                    // 移除整張卡片的 onclick，改為按鈕獨立觸發防誤觸
                    card.className = "road-card bg-white rounded-2xl p-4 shadow-sm border border-gray-200 flex justify-between items-center transition-colors";
                    
                    card.innerHTML = `
                        <div class="flex-1 pr-2">
                            <div class="text-[26px] font-black text-blue-900 tracking-wide leading-tight">${road.pinyin}</div>
                            <!-- 移除「街/路」贅字，利於複製後無縫導航 -->
                            <div class="text-[20px] font-bold text-gray-700 mt-1">${road.zh}</div>
                        </div>
                        <div class="flex gap-3">
                            <!-- 語音按鈕 (綠色) -->
                            <button class="w-12 h-12 rounded-full border-[2px] border-green-200 bg-green-50 flex items-center justify-center text-green-600 flex-shrink-0 active:bg-green-200 transition-colors" onclick="speakText('${road.zh}', event)">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                                </svg>
                            </button>
                            <!-- 複製按鈕 (藍色) -->
                            <button class="w-12 h-12 rounded-full border-[2px] border-blue-200 bg-blue-50 flex items-center justify-center text-blue-600 flex-shrink-0 active:bg-blue-200 transition-colors" onclick="copyToClipboard('${road.zh}', event)">
                                <svg class="w-6 h-6 ml-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                                </svg>
                            </button>
                        </div>
                    `;
                    roadList.appendChild(card);
                });
            }
        }

        // 5. 語音播報功能 (原生 Web Speech API)
        function speakText(text, event) {
            event.stopPropagation(); // 阻擋事件冒泡
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // 停止先前的語音
                // 為了聽覺自然，自動加上「路」
                const utterance = new SpeechSynthesisUtterance(text + '路');
                utterance.lang = 'zh-TW';
                utterance.rate = 0.9; // 放慢語速，高齡與外國客更易懂
                window.speechSynthesis.speak(utterance);
            } else {
                Swal.fire('系統提示', '您的裝置不支援語音功能', 'warning');
            }
        }

        // 6. 複製到剪貼簿功能
        function copyToClipboard(text, event) {
            event.stopPropagation(); // 阻擋事件冒泡
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                Swal.fire({
                    title: '已複製',
                    text: text, // 複製純路名，丟導航最準
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false,
                    position: 'center',
                    customClass: {
                        title: 'text-3xl font-bold',
                        popup: 'rounded-3xl',
                        htmlContainer: 'text-2xl text-blue-700 font-bold mt-2'
                    }
                });
            } catch (err) {
                Swal.fire({
                    title: '複製失敗',
                    text: '請手動輸入',
                    icon: 'error',
                    confirmButtonText: '我知道了',
                    confirmButtonColor: '#3b82f6',
                    customClass: {
                        title: 'text-2xl font-bold',
                        popup: 'rounded-3xl'
                    }
                });
            } finally {
                document.body.removeChild(textArea);
            }
        }

        // 7. 搜尋邏輯
        function handleSearch() {
            const query = searchInput.value.toLowerCase().trim();
            
            if (query.length > 0) {
                clearBtn.classList.remove('hidden');
                if (currentAlphabet !== 'ALL') {
                    currentAlphabet = 'ALL';
                    renderAlphabets();
                }
            } else {
                clearBtn.classList.add('hidden');
            }

            const filteredRoads = roads.filter(road => {
                return road.pinyin.toLowerCase().includes(query) || 
                       road.zh.includes(query);
            });

            renderList(filteredRoads);
        }

        searchInput.addEventListener('input', handleSearch);
        
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            handleSearch();
            searchInput.focus(); 
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                searchInput.blur(); 
            }
        });

        // 8. 初始化
        renderAlphabets();
        renderList(roads);

    </script>
</body>
</html>
